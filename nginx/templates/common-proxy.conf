# Proxy Settings - Common Configuration
# Included in all upstream proxy configurations

# Use HTTP/1.1 for upstream connections
proxy_http_version 1.1;

# Enable keepalive connections to upstream
proxy_set_header Connection "";

# Forward client information
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;

# WebSocket upgrade headers are set per-location in /ws/ blocks only.
# Do NOT set Upgrade/Connection here — it breaks keepalive for non-WebSocket requests.

# Buffering settings for large file uploads
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;

# Timeouts
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# Don't buffer file uploads/downloads
proxy_request_buffering off;
proxy_max_temp_file_size 0;
