# Docker Compose configuration aligned with GitHub Actions CI/CD
# This mirrors the service configuration from .github/workflows/test.yml

services:
  postgres-ci:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: athena_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d athena_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ci-network

  redis-ci:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  ipfs-ci:
    image: ipfs/kubo:latest
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "ipfs version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge
