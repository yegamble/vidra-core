# Docker Compose configuration for CI/CD environments
# Single source of truth for all GitHub Actions workflow service definitions
# Used by: .github/workflows/test.yml, .github/workflows/virus-scanner-tests.yml

services:
  postgres-ci:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: athena_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d athena_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ci-network

  redis-ci:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  ipfs-ci:
    image: ipfs/kubo:latest
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "ipfs version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - ci-network

  clamav-ci:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - ci-network

networks:
  ci-network:
    driver: bridge
