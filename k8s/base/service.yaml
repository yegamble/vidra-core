apiVersion: v1
kind: Service
metadata:
  name: vidra-api
  labels:
    app: vidra
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: vidra
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: vidra-api-headless
  labels:
    app: vidra
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: vidra
    component: api
