apiVersion: apps/v1
kind: Deployment
metadata:
  name: vidra-api
  labels:
    app: vidra
    component: api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vidra
      component: api
  template:
    metadata:
      labels:
        app: vidra
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: vidra
        image: ghcr.io/yegamble/vidra-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vidra-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vidra-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vidra-secrets
              key: jwt-secret
        - name: IPFS_API
          valueFrom:
            configMapKeyRef:
              name: vidra-config
              key: ipfs-api
        - name: IPFS_CLUSTER_API
          valueFrom:
            configMapKeyRef:
              name: vidra-config
              key: ipfs-cluster-api
        - name: CLAMAV_ADDRESS
          valueFrom:
            configMapKeyRef:
              name: vidra-config
              key: clamav-address
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: vidra-config
              key: log-level
        - name: LOG_FORMAT
          value: "json"
        - name: ENABLE_ENCODING_SCHEDULER
          value: "true"
        - name: ENABLE_IPFS_CLUSTER
          value: "true"
        - name: REQUIRE_IPFS
          value: "true"
        - name: METRICS_ADDR
          value: ":9090"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            ephemeral-storage: "5Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: storage
          mountPath: /app/storage
        - name: quarantine
          mountPath: /var/quarantine
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: vidra-storage
      - name: quarantine
        persistentVolumeClaim:
          claimName: vidra-quarantine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vidra-encoding-worker
  labels:
    app: vidra
    component: encoding-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vidra
      component: encoding-worker
  template:
    metadata:
      labels:
        app: vidra
        component: encoding-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: encoding-worker
        image: ghcr.io/yegamble/vidra-core:latest
        command: ["/app/vidra-encoding-worker"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vidra-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vidra-secrets
              key: redis-url
        - name: ENABLE_ENCODING
          value: "true"
        - name: ENCODING_WORKERS
          value: "4"
        - name: FFMPEG_PATH
          value: "ffmpeg"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: storage
          mountPath: /app/storage
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: vidra-storage
