apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: athena-storage
  labels:
    app: athena
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods need access
  resources:
    requests:
      storage: 500Gi
  storageClassName: standard  # Change based on cloud provider
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: athena-quarantine
  labels:
    app: athena
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
