# IOTA Rebased fullnode configuration for local development (testnet)
# Mounted read-only into the iota-node container at /opt/iota/config/fullnode.yaml
# Verified against IOTA Rebased documentation: https://docs.iota.org/operator/iota-full-node

network: "testnet"

# JSON-RPC API
json-rpc-address: "0.0.0.0:9000"

# Database path (mounted volume)
db-path: "/opt/iota/db"

# P2P configuration
p2p-config:
  listen-address: "0.0.0.0:8084"
  external-address: null  # Set to your public IP/hostname in production

# Genesis configuration for testnet
genesis:
  genesis-file-location: "/opt/iota/config/genesis.blob"

# Metrics (Prometheus) — internal only, not exposed via docker-compose
metrics-address: "0.0.0.0:9184"

# Checkpoint sync from remote store (speeds up initial sync significantly).
# Genesis snapshot is pre-downloaded by entrypoint.sh before node start
# (see docker/iota/entrypoint.sh). The snapshot URL is TESTNET_GENESIS_URL
# in the entrypoint script.
state-sync:
  checkpoint-content-timeout-ms: 10000

# Enable REST API (used by iota_getLatestCheckpointSequenceNumber and other RPCs)
enable-experimental-rest-api: false
