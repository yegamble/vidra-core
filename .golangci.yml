version: 2

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - bin
    - tmp
    - uploads
  skip-files:
    - "^internal/generated/.*$"

output:
  format: colored-line-number

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  disable-all: false

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    ignore: fmt:.*,io/ioutil:^Read.*

issues:
  exclude-dirs:
    - internal/generated
  exclude-rules:
    # Exclude defer close errors which are common and usually safe to ignore
    - source: "defer.*\\.Close\\(\\)"
      linters:
        - errcheck
    # Exclude os.Setenv/Unsetenv in tests
    - source: "os\\.(Setenv|Unsetenv)"
      linters:
        - errcheck
    # Exclude HTTP response body close errors
    - source: "defer.*Body\\.Close\\(\\)"
      linters:
        - errcheck
    # Exclude transaction rollback errors (expected pattern)
    - source: "defer.*Rollback\\(\\)"
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10