run:
  tests: false
  timeout: 10m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocyclo
    - dupl
    - misspell
    - unconvert
    - whitespace
    - goimports
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
