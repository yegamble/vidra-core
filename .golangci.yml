version: "2"

run:
  tests: false
  timeout: 10m
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocyclo
    - dupl
    - misspell
    - unconvert
    - whitespace
    - gosec
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # Exclude G401 (weak crypto) in torrent package - SHA1 is required by BitTorrent protocol
      - path: internal/torrent/
        linters:
          - gosec
        text: "G401"
      # Exclude G505 (blocklisted sha1 import) in torrent package - required by BitTorrent protocol
      - path: internal/torrent/
        linters:
          - gosec
        text: "G505"
      # Exclude G107 (SSRF) in import package - URLs are validated by security layer
      - path: internal/usecase/import/
        linters:
          - gosec
        text: "G107"
      # Exclude G107 in redundancy package - federated instance discovery requires variable URLs
      - path: internal/usecase/redundancy/
        linters:
          - gosec
        text: "G107"
      # Exclude G107 in activitypub package - federation requires external HTTP requests
      - path: internal/activitypub/
        linters:
          - gosec
        text: "G107"
      - path: internal/usecase/activitypub/
        linters:
          - gosec
        text: "G107"
      # Exclude G107 in importer package - yt-dlp import requires external URLs
      - path: internal/importer/
        linters:
          - gosec
        text: "G107"
      # Exclude G304 (file inclusion) warnings - paths are validated at input boundaries
      - linters:
          - gosec
        text: "G304"
      # Exclude G204 (subprocess) - required for ffmpeg/whisper/yt-dlp integration
      - linters:
          - gosec
        text: "G204"
      # Exclude G301 (directory permissions) - 0755 is standard for server directories
      - linters:
          - gosec
        text: "G301"
      # Exclude G306 (file permissions) - 0644 is acceptable for non-secret files
      - linters:
          - gosec
        text: "G306"
      # Exclude G110 (decompression bomb) - handled at application layer
      - linters:
          - gosec
        text: "G110"
      # Exclude G305 (file traversal) - validated in plugin handler
      - linters:
          - gosec
        text: "G305"
      # Exclude G402 (TLS MinVersion) - required for IPFS cluster compatibility
      - linters:
          - gosec
        text: "G402"
      # Exclude G602 (slice bounds) - false positives with validated input
      - linters:
          - gosec
        text: "G602"
      # Exclude G115 (integer overflow) - often false positives in Go 1.22+
      - linters:
          - gosec
        text: "G115"
      # Exclude G104 (unhandled errors) - errcheck handles this; duplicate with gosec
      - linters:
          - gosec
        text: "G104"
      # Exclude G302 (file permissions) - 0644 is acceptable for log/data files
      - linters:
          - gosec
        text: "G302"
      # Exclude issues in test helper utilities
      - path: internal/testutil/
        linters:
          - gosec
          - errcheck
          - unused
      # Exclude dupl in repository layer - query patterns are intentionally similar
      - path: internal/repository/
        linters:
          - dupl
          - errcheck
      # Exclude dupl in activitypub service - federation delivery patterns are intentionally similar
      - path: internal/usecase/activitypub/service\.go
        linters:
          - dupl
      # Exclude errcheck for http.ResponseWriter.Write - standard Go HTTP pattern
      - text: "Error return value of `w.Write` is not checked"
        linters:
          - errcheck
      # Exclude unused functions in livestream scheduler - planned for future use
      - path: internal/livestream/scheduler\.go
        linters:
          - unused
      # Exclude unused helper in views service - retained for potential per-video fallback
      - path: internal/usecase/views/service\.go
        linters:
          - unused
    paths:
      - vendor
      - internal/generated
      - testdata
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - ".*_gen\\.go$"
      - tests/e2e/
  settings:
    gosec:
      # Gosec security scanner configuration
      severity: medium
      confidence: medium
      excludes:
        # G101: Hardcoded credentials - excluded, handled by secret scanning in CI
        - G101
        # G104: Audit errors not checked - too noisy, errcheck handles this better
        - G104
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 150

formatters:
  exclusions:
    paths:
      - vendor
      - internal/generated
      - testdata
