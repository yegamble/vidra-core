version: "2"
run:
  tests: false
linters:
  enable:
    - bodyclose
    - dupl
    - gocyclo
    - gosec
    - misspell
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
