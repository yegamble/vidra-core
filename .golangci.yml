version: "2"

run:
  tests: false
  timeout: 10m
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocyclo
    - dupl
    - misspell
    - unconvert
    - whitespace
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
