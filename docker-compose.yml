version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: athena_user
      POSTGRES_PASSWORD: athena_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-shared-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena_user -d athena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - athena-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - athena-network

  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001" # API
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/v0/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - athena-network

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://athena_user:athena_password@postgres:5432/athena?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      IPFS_API: ${IPFS_API:-http://ipfs:5001}
      PORT: 8080
    volumes:
      - uploads:/app/uploads
      - processed:/app/processed
    networks:
      - athena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  processed:
    driver: local
  ipfs_staging:
    driver: local
  ipfs_data:
    driver: local

networks:
  athena-network:
    driver: bridge
