services:
  # ---------------------------------------------------------------------------
  # Development stack (default profile)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidra
      POSTGRES_USER: vidra_user
      POSTGRES_PASSWORD: vidra_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidra_user -d vidra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vidra-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vidra-network

  ipfs:
    profiles: ["full", "ipfs"]
    image: ipfs/kubo:v0.32.1
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    ports:
      - "4001:4001"      # Swarm TCP — required for p2p connectivity
      - "4001:4001/udp"  # Swarm QUIC — required for p2p connectivity
      - "5001:5001"      # API
      - "9090:8080"      # Gateway — local IPFS content retrieval (9090 avoids conflict with app:8080)
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
      - ./docker/ipfs/configure-node.sh:/container-init.d/001-configure-node.sh:ro
    healthcheck:
      test: ["CMD", "wget", "--post-data=''", "-qO-", "http://localhost:5001/api/v0/version"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - vidra-network

  clamav:
    profiles: ["full", "media"]
    image: clamav/clamav:stable
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_signatures:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    mem_limit: 2g
    networks:
      - vidra-network

  mailpit:
    profiles: ["full", "mail"]
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vidra-network

  whisper:
    profiles: ["full", "media"]
    # Using CPU-compatible image by default; use whisper-gpu profile for GPU variant
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    ports:
      - "9000:9000"
    volumes:
      - whisper_models:/root/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vidra-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Bitcoin node (regtest) for BTCPay Server.
  # Container-to-container: http://bitcoind:18443  |  No host port exposed (internal only)
  bitcoind:
    profiles: ["bitcoin", "full"]
    image: btcpayserver/bitcoin:27.1
    restart: on-failure:3
    environment:
      BITCOIN_NETWORK: regtest
      BITCOIN_WALLETDIR: /data/wallets
      BITCOIN_EXTRA_ARGS: |-
        rpcuser=vidra
        rpcpassword=vidra
        rpcallowip=0.0.0.0/0
        rpcbind=0.0.0.0
        server=1
        txindex=1
        fallbackfee=0.00001
        zmqpubrawblock=tcp://0.0.0.0:28332
        zmqpubrawtx=tcp://0.0.0.0:28333
    volumes:
      - bitcoin_data:/data
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=vidra", "-rpcpassword=vidra", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vidra-network

  # Lightning Network Daemon (regtest) — provides BOLT11 invoices to BTCPay.
  # BTCPay connects via gRPC at lnd:10009 with the macaroon + TLS cert
  # extracted by scripts/lnd-bootstrap.sh.
  # REST: 18080 (host) → 8080 (container). gRPC: container-internal only.
  lnd:
    profiles: ["bitcoin", "full"]
    image: lightninglabs/lnd:v0.17.4-beta
    restart: on-failure:3
    depends_on:
      bitcoind:
        condition: service_healthy
    environment:
      NETWORK: regtest
    command:
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=vidra
      - --bitcoind.rpcpass=vidra
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
      - --alias=vidra-dev-lnd
      - --tlsextraip=lnd
      - --tlsextradomain=lnd
      - --no-macaroons=false
      - --debuglevel=info
    ports:
      - "18080:8080"
    volumes:
      - lnd_data:/root/.lnd
    healthcheck:
      test: ["CMD-SHELL", "lncli --network=regtest getinfo >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vidra-network

  # NBXplorer indexes Bitcoin blockchain for BTCPay Server.
  nbxplorer:
    profiles: ["bitcoin", "full"]
    image: nicolasdorier/nbxplorer:2.5.12
    restart: on-failure:3
    environment:
      NBXPLORER_NETWORK: regtest
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://bitcoind:18443/
      NBXPLORER_BTCRPCUSER: vidra
      NBXPLORER_BTCRPCPASSWORD: vidra
      NBXPLORER_BTCNODEENDPOINT: bitcoind:18444
      NBXPLORER_POSTGRES: Host=postgres;Port=5432;Database=nbxplorer;Username=postgres;Password=postgres
    depends_on:
      bitcoind:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - vidra-network

  # BTCPay Server — self-hosted Bitcoin payment processor.
  # Container-to-container: http://btcpay-server:49392  |  Host access: http://localhost:14080
  btcpay-server:
    profiles: ["bitcoin", "full"]
    image: btcpayserver/btcpayserver:2.3.3
    restart: on-failure:3
    ports:
      - "14080:49392"
    environment:
      BTCPAY_NETWORK: regtest
      BTCPAY_BIND: 0.0.0.0:49392
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: Host=postgres;Port=5432;Database=btcpay;Username=postgres;Password=postgres
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838/
    depends_on:
      nbxplorer:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:49392/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vidra-network

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Service modes (docker or external)
      POSTGRES_MODE: ${POSTGRES_MODE:-docker}
      REDIS_MODE: ${REDIS_MODE:-docker}
      IPFS_MODE: ${IPFS_MODE:-docker}

      # Database
      DATABASE_URL: ${DATABASE_URL:-postgres://vidra_user:vidra_password@postgres:5432/vidra?sslmode=disable}

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      # Security
      JWT_SECRET: ${JWT_SECRET:-}

      # Optional services
      ENABLE_IPFS: ${ENABLE_IPFS:-false}
      IPFS_API: ${IPFS_API:-http://ipfs:5001}
      IPFS_LOCAL_GATEWAY_URL: ${IPFS_LOCAL_GATEWAY_URL:-http://ipfs:8080}
      REQUIRE_IPFS: ${REQUIRE_IPFS:-false}

      # BTCPay Server (container-to-container: http://btcpay-server:49392)
      ENABLE_BITCOIN: ${ENABLE_BITCOIN:-false}
      BTCPAY_SERVER_URL: ${BTCPAY_SERVER_URL:-http://btcpay-server:49392}
      BTCPAY_API_KEY: ${BTCPAY_API_KEY:-}
      BTCPAY_STORE_ID: ${BTCPAY_STORE_ID:-}
      BTCPAY_WEBHOOK_SECRET: ${BTCPAY_WEBHOOK_SECRET:-}

      ENABLE_CLAMAV: ${ENABLE_CLAMAV:-false}

      ENABLE_WHISPER: ${ENABLE_WHISPER:-false}
      ENABLE_CAPTION_GENERATION: ${ENABLE_CAPTION_GENERATION:-false}

      # Email / SMTP
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      SMTP_TRANSPORT: ${SMTP_TRANSPORT:-smtp}
      SMTP_SENDMAIL_PATH: ${SMTP_SENDMAIL_PATH:-/usr/sbin/sendmail}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_DISABLE_STARTTLS: ${SMTP_DISABLE_STARTTLS:-false}
      SMTP_CA_FILE: ${SMTP_CA_FILE:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@localhost}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Vidra Core}
      WHISPER_PROVIDER: ${WHISPER_PROVIDER:-local}
      WHISPER_API_URL: ${WHISPER_API_URL:-http://whisper:9000}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      CAPTION_GENERATION_WORKERS: ${CAPTION_GENERATION_WORKERS:-2}

      # Server
      PORT: 8080
    volumes:
      - storage:/app/storage
      - processed:/app/processed
    networks:
      - vidra-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_DOMAIN: ${NGINX_DOMAIN:-localhost}
      NGINX_PROTOCOL: ${NGINX_PROTOCOL:-http}
      NGINX_TLS_MODE: ${NGINX_TLS_MODE:-self-signed}
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - storage:/app/storage:ro
      - processed:/app/processed:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - vidra-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  certbot:
    profiles: ["letsencrypt"]
    image: certbot/certbot:latest
    restart: unless-stopped
    environment:
      NGINX_DOMAIN: ${NGINX_DOMAIN:-localhost}
      NGINX_LETSENCRYPT_EMAIL: ${NGINX_LETSENCRYPT_EMAIL:-}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      sh -c "
      if [ ! -f /etc/letsencrypt/live/$NGINX_DOMAIN/fullchain.pem ]; then
        echo 'Acquiring Let'\''s Encrypt certificate for $NGINX_DOMAIN...';
        certbot certonly --webroot -w /var/www/certbot -d $NGINX_DOMAIN --email $NGINX_LETSENCRYPT_EMAIL --agree-tos --non-interactive || echo 'WARNING: Certificate acquisition failed. Check that domain points to this server.';
      fi;
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --post-hook 'nginx -s reload' || true;
        sleep 12h & wait $!;
      done
      "
    networks:
      - vidra-network

  # ---------------------------------------------------------------------------
  # Local test stack (profile: test)
  # ---------------------------------------------------------------------------
  postgres-test:
    profiles: ["test"]
    image: postgres:15-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: vidra_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d vidra_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-network

  redis-test:
    profiles: ["test"]
    image: redis:7-alpine
    tmpfs:
      - /data
    ports:
      - "6380:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  ipfs-test:
    profiles: ["test"]
    image: ipfs/kubo:v0.32.1
    tmpfs:
      - /export
      - /data/ipfs
    environment:
      - IPFS_PROFILE=server
    ports:
      - "15001:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q -T 3 http://127.0.0.1:5001/api/v0/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - test-network

  clamav-test:
    profiles: ["test"]
    image: clamav/clamav:stable
    platform: linux/amd64
    environment:
      - CLAMD_STARTUP_TIMEOUT=300
    volumes:
      - clamav-test-signatures:/var/lib/clamav
      - ./testdata/virus_scanner:/testdata:ro
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s
    mem_limit: 2g
    networks:
      - test-network

  mock-atproto-pds-test:
    profiles: ["test"]
    build:
      context: tests/mocks/atproto-pds
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test-network

  app-test:
    profiles: ["test"]
    image: ${VIDRA_IMAGE:-vidra:latest}
    build: .
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      ipfs-test:
        condition: service_started
      clamav-test:
        condition: service_started
      mock-atproto-pds-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://test_user:test_password@postgres-test:5432/vidra_test?sslmode=disable
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: test-jwt-secret
      ENABLE_IPFS_STREAMING: "true"
      IPFS_API: http://ipfs-test:5001
      IPFS_GATEWAY_URLS: http://ipfs-test:8080
      REQUIRE_IPFS: "false"
      PUBLIC_BASE_URL: http://app-test:8080
      ENABLE_ACTIVITYPUB: "true"
      ACTIVITYPUB_DOMAIN: app-test
      ACTIVITYPUB_KEY_ENCRYPTION_KEY: test-activitypub-key-32-characters
      ENABLE_ATPROTO: "true"
      ATPROTO_PDS_URL: http://mock-atproto-pds-test:8080
      ATPROTO_HANDLE: test.handle
      ATPROTO_APP_PASSWORD: test-password
      ENABLE_BITCOIN: "false"
      PORT: 8080
      VALIDATION_TEST_MODE: "true"
      VALIDATION_TEST_ADMIN_USERNAME: admin
      VALIDATION_TEST_ADMIN_EMAIL: admin@example.com
      VALIDATION_TEST_ADMIN_PASSWORD: admin123
      LOG_LEVEL: debug
      STORAGE_DIR: /tmp/storage
      CLAMAV_ADDRESS: clamav-test:3310
      CLAMAV_TIMEOUT: "60"
      CLAMAV_FALLBACK_MODE: strict
      TEST_QUARANTINE_DIR: /tmp/quarantine
    tmpfs:
      - /tmp/storage:uid=1000,gid=1000
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    networks:
      - test-network

  newman:
    profiles: ["test"]
    image: postman/newman:alpine
    depends_on:
      app-test:
        condition: service_healthy
    volumes:
      - ./postman:/etc/newman
    entrypoint:
      [
        "/bin/sh", "/etc/newman/run-all-tests.sh", "/etc/newman/vidra.local.postman_environment.json"
      ]
    networks:
      - test-network

  # ---------------------------------------------------------------------------
  # CI stack (profile: ci)
  # ---------------------------------------------------------------------------
  postgres-ci:
    profiles: ["ci"]
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vidra_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d vidra_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  redis-ci:
    profiles: ["ci"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  ipfs-ci:
    profiles: ["ci"]
    image: ipfs/kubo:v0.32.1
    environment:
      - IPFS_PROFILE=server
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "ipfs version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - ci-network

  clamav-ci:
    profiles: ["ci"]
    image: clamav/clamav:stable
    platform: linux/amd64
    volumes:
      - clamav-ci-signatures:/var/lib/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - ci-network

  # ---------------------------------------------------------------------------
  # Integration test stack (profile: test-integration)
  # These services are used for integration testing against real external services.
  # Port range: 19xxx to avoid conflicts with all other profiles.
  # ---------------------------------------------------------------------------
  minio:
    profiles: ["test-integration"]
    image: minio/minio:latest
    tmpfs:
      - /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19100:9000"   # S3 API
      - "19101:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - test-integration-network

  minio-init:
    profiles: ["test-integration"]
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/vidra-test;
      mc anonymous set public local/vidra-test;
      echo 'MinIO bucket vidra-test created';
      "
    networks:
      - test-integration-network

  mock-atproto-pds:
    profiles: ["test-integration"]
    build:
      context: tests/mocks/atproto-pds
      dockerfile: Dockerfile
    ports:
      - "19200:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test-integration-network

  mock-activitypub:
    profiles: ["test-integration"]
    build:
      context: tests/mocks/activitypub
      dockerfile: Dockerfile
    ports:
      - "19300:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test-integration-network

  mailpit-integration:
    profiles: ["test-integration"]
    image: axllent/mailpit:latest
    ports:
      - "19400:8025"   # Web UI
      - "19401:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-integration-network

  postgres-integration:
    profiles: ["test-integration"]
    image: postgres:15-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: vidra_integration
      POSTGRES_USER: integration_user
      POSTGRES_PASSWORD: integration_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integration_user -d vidra_integration"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-integration-network

  redis-integration:
    profiles: ["test-integration"]
    image: redis:7-alpine
    tmpfs:
      - /data
    command: redis-server --save ""
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-integration-network

  peertube-source-db:
    profiles: ["test-integration"]
    image: postgres:15-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: peertube_prod
      POSTGRES_USER: peertube
      POSTGRES_PASSWORD: peertube_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15433:5432"
    volumes:
      - ./tests/migration/seed_peertube.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peertube -d peertube_prod"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-integration-network

  ipfs-integration:
    profiles: ["test-integration"]
    image: ipfs/kubo:v0.32.1
    tmpfs:
      - /export
      - /data/ipfs
    environment:
      - IPFS_PROFILE=server
    ports:
      - "15001:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q -T 3 http://127.0.0.1:5001/api/v0/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - test-integration-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage:
    driver: local
  processed:
    driver: local
  ipfs_staging:
    driver: local
  ipfs_data:
    driver: local
  whisper_models:
    driver: local
  bitcoin_data:
    driver: local
  lnd_data:
    driver: local
  clamav_signatures:
    driver: local
  clamav-ci-signatures:
    driver: local
  clamav-test-signatures:
    driver: local
  nginx_conf:
    driver: local
  nginx_ssl:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  vidra-network:
    driver: bridge
  test-network:
    driver: bridge
  ci-network:
    driver: bridge
  test-integration-network:
    driver: bridge
