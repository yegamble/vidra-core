version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: athena_user
      POSTGRES_PASSWORD: athena_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-shared-db.sql:/docker-entrypoint-initdb.d/init-shared-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena_user -d athena"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://athena_user:athena_password@postgres:5432/athena?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/app/uploads
      - processed:/app/processed

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  processed:
    driver: local

networks:
  athena-network:
    driver: bridge