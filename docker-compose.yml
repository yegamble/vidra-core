services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: peertube
      POSTGRES_PASSWORD: peertube
      POSTGRES_DB: peertube
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
  kubo:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001/tcp"
      - "5001:5001/tcp" # API
      - "8080:8080/tcp" # Gateway
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
  wallet-svc:
    build: ./wallet-svc
    environment:
      PORT: 8090
    ports:
      - "8090:8090"
volumes:
  ipfs_staging:
  ipfs_data:
