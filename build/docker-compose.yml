version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gotube
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: gotube
      MYSQL_PASSWORD: gotube
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ipfs:
    image: ipfs/go-ipfs:latest
    ports:
      - "5001:5001" # API port
      - "8080:8080" # Gateway port
    volumes:
      - ipfs_data:/data/ipfs

  app:
    build:
      context: ..
      dockerfile: build/Dockerfile
    depends_on:
      - mysql
      - redis
      - ipfs
    environment:
      PORT: 8080
      DB_DSN: gotube:gotube@tcp(mysql:3306)/gotube?parseTime=true
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: your-secret-key
      IPFS_API_URL: http://ipfs:5001
      IOTA_NODE_URL: https://api.shimmer.network
      IOTA_SEED: ""
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USERNAME: user
      SMTP_PASSWORD: pass
      SMTP_FROM: noreply@example.com
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
      - videos:/app/videos

volumes:
  db_data:
  redis_data:
  ipfs_data:
  uploads:
  videos: