openapi: 3.0.3
info:
  title: Athena Remote Runners API
  description: |
    PeerTube-compatible remote runner system for distributed video encoding.

    ## Authentication
    - **Admin endpoints** (listing runners, tokens, managing jobs): Bearer JWT with admin/moderator role
    - **Runner endpoints** (register, job lifecycle): Runner token via `X-Runner-Token` header or `runnerToken` in request body
  version: 1.0.0

tags:
  - name: Runner Registration Tokens
    description: Admin management of registration tokens for new runners
  - name: Runner Management
    description: Runner registration, listing, and deletion
  - name: Runner Jobs
    description: Job request, lifecycle, and file upload
  - name: Admin Runner Jobs
    description: Admin job management (list, cancel, delete)
  - name: PeerTube-Compat
    description: Endpoints intended to match PeerTube-style resource contracts.

paths:
  # ===== Registration Tokens (Admin) =====

  /api/v1/runners/registration-tokens/generate:
    post:
      tags:
        - Runner Registration Tokens
        - PeerTube-Compat
      summary: Generate a registration token
      description: Create a new registration token that runners can use to register. Admin/moderator only.
      operationId: runners_generateRunnerRegistrationToken
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration time for the token
      responses:
        '201':
          description: Registration token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/RegistrationToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/runners/registration-tokens:
    get:
      tags:
        - Runner Registration Tokens
        - PeerTube-Compat
      summary: List registration tokens
      description: List all registration tokens. Admin/moderator only.
      operationId: runners_listRunnerRegistrationTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registration tokens retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RegistrationToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/runners/registration-tokens/{id}:
    delete:
      tags:
        - Runner Registration Tokens
        - PeerTube-Compat
      summary: Delete a registration token
      description: Delete a registration token by ID. Admin/moderator only.
      operationId: runners_deleteRunnerRegistrationToken
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Registration token ID
      responses:
        '204':
          description: Token deleted
        '400':
          description: Invalid token ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Runner Management =====

  /api/v1/runners/register:
    post:
      tags:
        - Runner Management
        - PeerTube-Compat
      summary: Register a runner
      description: |
        Register a new remote runner using a valid registration token.
        Returns the runner's unique authentication token for subsequent API calls.
      operationId: runners_registerRunner
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRunnerRequest'
      responses:
        '201':
          description: Runner registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      description:
                        type: string
                      runnerToken:
                        type: string
                        description: Authentication token for subsequent API calls
                      status:
                        type: string
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration token not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Runner name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/unregister:
    post:
      tags:
        - Runner Management
        - PeerTube-Compat
      summary: Unregister a runner
      description: Unregister a runner using its runner token. Provided via X-Runner-Token header or request body.
      operationId: runners_unregisterRunner
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
                  description: Runner authentication token
      responses:
        '204':
          description: Runner unregistered
        '400':
          description: Runner token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Runner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners:
    get:
      tags:
        - Runner Management
        - PeerTube-Compat
      summary: List runners
      description: List all registered runners. Admin/moderator only. Runner tokens are redacted.
      operationId: runners_listRunners
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Runners retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Runner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/runners/{runnerId}:
    delete:
      tags:
        - Runner Management
        - PeerTube-Compat
      summary: Delete a runner
      description: Delete a registered runner by ID. Admin/moderator only.
      operationId: runners_deleteRunner
      security:
        - bearerAuth: []
      parameters:
        - name: runnerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Runner ID
      responses:
        '204':
          description: Runner deleted
        '400':
          description: Invalid runner ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Runner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Runner Jobs =====

  /api/v1/runners/jobs/request:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Request a job
      description: |
        Runner requests the next available encoding job. Authenticated via runner token.
        Returns 204 No Content if no jobs are available.
      operationId: runners_requestRunnerJob
      security: []
      parameters:
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
      responses:
        '200':
          description: Job assigned to runner
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/JobAssignment'
        '204':
          description: No jobs available
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}/accept:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Accept a job
      description: Runner accepts an assigned job, transitioning it to the accepted state
      operationId: runners_acceptRunnerJob
      security: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
      responses:
        '204':
          description: Job accepted
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Job not assigned to this runner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}/abort:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Abort a job
      description: Runner aborts an assigned job. The encoding job is re-queued for another runner.
      operationId: runners_abortRunnerJob
      security: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
      responses:
        '204':
          description: Job aborted and re-queued
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Job not assigned to this runner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}/update:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Update job progress
      description: Runner reports progress and metadata for an assigned job
      operationId: runners_updateRunnerJob
      security: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                state:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/JobAssignment'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}/error:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Report job error
      description: Runner reports that a job has failed with an error
      operationId: reportRunnerJobError
      security: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
                error:
                  type: string
                  description: Error message describing the failure
      responses:
        '204':
          description: Job error recorded
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}/success:
    post:
      tags:
        - Runner Jobs
        - PeerTube-Compat
      summary: Report job success
      description: Runner reports that a job has completed successfully
      operationId: reportRunnerJobSuccess
      security: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
        - $ref: '#/components/parameters/RunnerTokenHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runnerToken:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '204':
          description: Job marked as completed
        '401':
          description: Invalid runner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== Admin Runner Jobs =====

  /api/v1/runners/jobs:
    get:
      tags:
        - Admin Runner Jobs
        - PeerTube-Compat
      summary: List runner jobs
      description: List all runner job assignments with runner and encoding job details. Admin/moderator only.
      operationId: runners_listRunnerJobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Runner jobs retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/JobAssignment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/runners/jobs/{jobUUID}/cancel:
    post:
      tags:
        - Admin Runner Jobs
        - PeerTube-Compat
      summary: Cancel a runner job
      description: Admin cancels a runner job assignment. Admin/moderator only.
      operationId: runners_cancelRunnerJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
      responses:
        '204':
          description: Job cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Job assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/runners/jobs/{jobUUID}:
    delete:
      tags:
        - Admin Runner Jobs
        - PeerTube-Compat
      summary: Delete a runner job
      description: |
        Admin deletes a runner job assignment. If the encoding job is currently processing,
        it is reset to pending. Admin/moderator only.
      operationId: runners_deleteRunnerJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobUUID'
      responses:
        '204':
          description: Job assignment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Job assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JobUUID:
      name: jobUUID
      in: path
      required: true
      schema:
        type: string
      description: Encoding job UUID

    RunnerTokenHeader:
      name: X-Runner-Token
      in: header
      required: false
      schema:
        type: string
      description: Runner authentication token (alternative to runnerToken in body)

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions (admin/moderator required)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegistrationToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
        created_by:
          type: string
          format: uuid
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    RegisterRunnerRequest:
      type: object
      required:
        - registrationToken
        - name
      properties:
        registrationToken:
          type: string
          description: A valid registration token
        token:
          type: string
          description: Alternative field name for registrationToken (PeerTube compat)
        name:
          type: string
          description: Human-readable name for the runner
        description:
          type: string
          description: Optional description of the runner

    Runner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
        ip_address:
          type: string
        last_contact:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    JobAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runner_id:
          type: string
          format: uuid
        encoding_job:
          type: string
        state:
          type: string
          enum: [pending, accepted, running, completed, failed, aborted, cancelled]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        last_error:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        runner:
          $ref: '#/components/schemas/Runner'
        job:
          type: object
          description: Associated encoding job details

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: string
