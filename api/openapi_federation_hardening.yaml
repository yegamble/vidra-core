openapi: 3.0.3
info:
  title: Athena Federation Hardening API
  description: |
    Federation hardening features for managing reliability, security, and abuse prevention
    in the federated network. Includes dead letter queue management, blocklist administration,
    abuse reporting workflows, and health monitoring.
  version: 1.0.0

paths:
  # Dashboard & Health
  /api/v1/admin/federation/hardening/dashboard:
    get:
      tags:
        - Federation Hardening
      summary: Get federation dashboard
      description: |
        Retrieve comprehensive federation dashboard data including health summaries,
        DLQ statistics, instance blocks, pending abuse reports, and 24-hour success rates
      operationId: getFederationDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  health_summary:
                    type: array
                    items:
                      $ref: '#/components/schemas/FederationHealthSummary'
                  dlq_count:
                    type: integer
                    description: Total number of jobs in the dead letter queue
                    example: 5
                  dlq_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeadLetterJob'
                    description: Recent DLQ jobs (limited to 10)
                  instance_blocks:
                    type: array
                    items:
                      $ref: '#/components/schemas/InstanceBlock'
                    description: All currently active instance blocks
                  pending_reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/FederationAbuseReport'
                    description: Recent pending abuse reports (limited to 10)
                  success_rate_24h:
                    type: number
                    format: float
                    description: Job success rate over the last 24 hours (percentage)
                    example: 98.5
                  total_jobs_24h:
                    type: integer
                    description: Total number of jobs processed in the last 24 hours
                    example: 1250
                  metrics_enabled:
                    type: boolean
                    description: Whether metrics collection is enabled
                    example: true
              examples:
                dashboard:
                  value:
                    health_summary:
                      - hour: "2025-10-01T10:00:00Z"
                        metric_type: "job_success"
                        event_count: 150
                        avg_value: 1.0
                        min_value: 1.0
                        max_value: 1.0
                        median_value: 1.0
                        p95_value: 1.0
                    dlq_count: 3
                    dlq_jobs:
                      - id: "dlq-001"
                        job_type: "ingest_post"
                        error_count: 5
                        can_retry: true
                    instance_blocks:
                      - instance_domain: "spam.example.com"
                        severity: "block"
                        reason: "Spam source"
                    pending_reports: []
                    success_rate_24h: 98.5
                    total_jobs_24h: 1250
                    metrics_enabled: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/federation/hardening/health:
    get:
      tags:
        - Federation Hardening
      summary: Get health metrics
      description: |
        Retrieve aggregated federation health metrics including success/failure rates,
        latency statistics, queue depths, and security events
      operationId: getFederationHealthMetrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Health metrics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederationHealthSummary'
              examples:
                healthMetrics:
                  value:
                    - hour: "2025-10-01T10:00:00Z"
                      metric_type: "job_success"
                      event_count: 150
                      avg_value: 1.0
                      min_value: 1.0
                      max_value: 1.0
                      median_value: 1.0
                      p95_value: 1.0
                    - hour: "2025-10-01T10:00:00Z"
                      metric_type: "job_latency_ms"
                      event_count: 150
                      avg_value: 45.2
                      min_value: 12.3
                      max_value: 234.5
                      median_value: 38.7
                      p95_value: 156.8
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # DLQ Management
  /api/v1/admin/federation/hardening/dlq:
    get:
      tags:
        - Dead Letter Queue
      summary: Get DLQ jobs
      description: |
        Retrieve jobs from the dead letter queue. These are federation jobs that
        have failed multiple times and require manual intervention or retry.
      operationId: getDLQJobs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of jobs to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 20
        - name: can_retry
          in: query
          description: Filter to only jobs that can be retried
          schema:
            type: boolean
            default: false
          example: true
      responses:
        '200':
          description: DLQ jobs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeadLetterJob'
              examples:
                dlqJobs:
                  value:
                    - id: "dlq-123e4567-e89b-12d3-a456-426614174000"
                      original_job_id: "job-987fcdeb-51a2-43b1-c789-123456789012"
                      job_type: "ingest_post"
                      payload:
                        uri: "at://did:plc:abc123/app.bsky.feed.post/xyz789"
                        actor_did: "did:plc:abc123"
                      error_message: "Failed to validate signature"
                      error_count: 5
                      last_error_at: "2025-10-01T12:30:45Z"
                      created_at: "2025-10-01T10:15:30Z"
                      can_retry: true
                      metadata:
                        instance: "example.com"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/federation/hardening/dlq/{id}/retry:
    post:
      tags:
        - Dead Letter Queue
      summary: Retry a DLQ job
      description: |
        Retry a specific job from the dead letter queue. The job will be re-queued
        for processing if it is marked as retryable.
      operationId: retryDLQJob
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The DLQ job ID to retry
          schema:
            type: string
          example: "dlq-123e4567-e89b-12d3-a456-426614174000"
      responses:
        '200':
          description: Job queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [retry_queued]
                example:
                  status: "retry_queued"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Blocklist Management - Instances
  /api/v1/admin/federation/hardening/blocklist/instances:
    get:
      tags:
        - Blocklist
      summary: Get instance blocks
      description: |
        Retrieve all instance blocks. Instance blocks prevent federation with
        specific domains based on severity level (block, shadowban, quarantine, mute).
      operationId: getInstanceBlocks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Instance blocks retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstanceBlock'
              examples:
                instanceBlocks:
                  value:
                    - id: "block-123e4567-e89b-12d3-a456-426614174000"
                      instance_domain: "spam.example.com"
                      reason: "Persistent spam source"
                      severity: "block"
                      blocked_by: "admin-456"
                      created_at: "2025-09-15T08:30:00Z"
                      expires_at: null
                      metadata:
                        automated: false
                    - id: "block-987fcdeb-51a2-43b1-c789-123456789012"
                      instance_domain: "quarantine.test"
                      reason: "Under review for policy violations"
                      severity: "quarantine"
                      blocked_by: "moderator-789"
                      created_at: "2025-09-28T14:20:00Z"
                      expires_at: "2025-10-28T14:20:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Blocklist
      summary: Block an instance
      description: |
        Add a new instance block. Severity levels:
        - `block`: Complete block, no federation
        - `shadowban`: Silent filtering of content
        - `quarantine`: Content held for review
        - `mute`: Hide content from timelines
      operationId: blockInstance
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockInstanceRequest'
            examples:
              permanentBlock:
                summary: Permanent instance block
                value:
                  instance_domain: "spam.example.com"
                  reason: "Persistent spam and abuse"
                  severity: "block"
                  blocked_by: "admin-user-123"
              temporaryQuarantine:
                summary: Temporary quarantine
                value:
                  instance_domain: "review.example.com"
                  reason: "Under investigation for ToS violations"
                  severity: "quarantine"
                  blocked_by: "moderator-456"
                  duration: "168h"
      responses:
        '200':
          description: Instance blocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [blocked]
                example:
                  status: "blocked"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/federation/hardening/blocklist/instances/{domain}:
    delete:
      tags:
        - Blocklist
      summary: Unblock an instance
      description: Remove an instance block and restore federation with the domain
      operationId: unblockInstance
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          description: The instance domain to unblock
          schema:
            type: string
          example: "example.com"
      responses:
        '200':
          description: Instance unblocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unblocked]
                example:
                  status: "unblocked"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Blocklist Management - Actors
  /api/v1/admin/federation/hardening/blocklist/actors:
    post:
      tags:
        - Blocklist
      summary: Block an actor
      description: |
        Block a specific federated actor (user). The actor can be identified by
        DID or handle. Severity levels are the same as instance blocks.
      operationId: blockActor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockActorRequest'
            examples:
              blockByDID:
                summary: Block actor by DID
                value:
                  actor_did: "did:plc:abc123xyz789"
                  actor_handle: "spammer.example.com"
                  reason: "Spam and harassment"
                  severity: "block"
                  blocked_by: "moderator-123"
              temporaryMute:
                summary: Temporary actor mute
                value:
                  actor_did: "did:plc:user456"
                  actor_handle: "user.test.com"
                  reason: "Cooling off period"
                  severity: "mute"
                  blocked_by: "moderator-456"
                  duration: "72h"
      responses:
        '200':
          description: Actor blocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [blocked]
                example:
                  status: "blocked"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/federation/hardening/blocklist/check:
    get:
      tags:
        - Blocklist
      summary: Check if instance or actor is blocked
      description: |
        Check the block status of an instance domain and/or actor. Returns boolean
        flags indicating whether each is currently blocked.
      operationId: checkBlocked
      security:
        - bearerAuth: []
      parameters:
        - name: instance
          in: query
          description: Instance domain to check
          schema:
            type: string
          example: "example.com"
        - name: actor_did
          in: query
          description: Actor DID to check
          schema:
            type: string
          example: "did:plc:abc123"
        - name: actor_handle
          in: query
          description: Actor handle to check
          schema:
            type: string
          example: "user.example.com"
      responses:
        '200':
          description: Block status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance_blocked:
                    type: boolean
                    description: True if the instance is blocked
                  actor_blocked:
                    type: boolean
                    description: True if the actor is blocked
              examples:
                bothBlocked:
                  value:
                    instance_blocked: true
                    actor_blocked: true
                neitherBlocked:
                  value:
                    instance_blocked: false
                    actor_blocked: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Abuse Reporting
  /api/v1/admin/federation/hardening/abuse/reports:
    get:
      tags:
        - Abuse Reporting
      summary: Get abuse reports
      description: |
        Retrieve pending abuse reports for review. Reports can be for content,
        actors, or various types of violations.
      operationId: getAbuseReports
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of reports to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 20
      responses:
        '200':
          description: Abuse reports retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederationAbuseReport'
              examples:
                reports:
                  value:
                    - id: "report-123e4567-e89b-12d3-a456-426614174000"
                      reporter_did: "did:plc:reporter123"
                      reported_content_uri: "at://did:plc:bad123/app.bsky.feed.post/xyz"
                      reported_actor_did: "did:plc:bad123"
                      report_type: "spam"
                      description: "Mass spam posting"
                      evidence:
                        urls: ["https://example.com/screenshot1.png"]
                      status: "pending"
                      created_at: "2025-10-01T09:15:00Z"
                      updated_at: "2025-10-01T09:15:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/admin/federation/hardening/abuse/reports/{id}/resolve:
    post:
      tags:
        - Abuse Reporting
      summary: Resolve an abuse report
      description: |
        Resolve a pending abuse report. Optionally take action (such as blocking
        the reported actor or content) based on the resolution.
      operationId: resolveAbuseReport
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The abuse report ID to resolve
          schema:
            type: string
          example: "report-123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAbuseReportRequest'
            examples:
              acceptAndBlock:
                summary: Accept report and take action
                value:
                  resolution: "Confirmed spam, actor blocked"
                  resolved_by: "moderator-123"
                  take_action: true
              reject:
                summary: Reject report as false positive
                value:
                  resolution: "Reviewed, no violation found"
                  resolved_by: "moderator-456"
                  take_action: false
      responses:
        '200':
          description: Report resolved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [resolved]
                example:
                  status: "resolved"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Cleanup
  /api/v1/admin/federation/hardening/cleanup:
    post:
      tags:
        - Maintenance
      summary: Run cleanup tasks
      description: |
        Manually trigger cleanup tasks to remove expired signatures, idempotency
        records, rate limit entries, and expired blocks.
      operationId: runCleanup
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleanup completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cleanup_completed]
                example:
                  status: "cleanup_completed"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    # Core Domain Models
    DeadLetterJob:
      type: object
      description: A failed federation job in the dead letter queue
      properties:
        id:
          type: string
          description: Unique identifier for the DLQ entry
          example: "dlq-123e4567-e89b-12d3-a456-426614174000"
        original_job_id:
          type: string
          nullable: true
          description: Original job ID if available
          example: "job-987fcdeb-51a2-43b1-c789-123456789012"
        job_type:
          type: string
          description: Type of federation job
          example: "ingest_post"
        payload:
          type: object
          description: Job payload data
          example:
            uri: "at://did:plc:abc123/app.bsky.feed.post/xyz789"
            actor_did: "did:plc:abc123"
        error_message:
          type: string
          nullable: true
          description: Last error message
          example: "Failed to validate signature"
        error_count:
          type: integer
          description: Number of times this job has failed
          minimum: 0
          example: 5
        last_error_at:
          type: string
          format: date-time
          description: Timestamp of the last error
          example: "2025-10-01T12:30:45Z"
        created_at:
          type: string
          format: date-time
          description: When the job was first created
          example: "2025-10-01T10:15:30Z"
        can_retry:
          type: boolean
          description: Whether this job can be retried
          example: true
        metadata:
          type: object
          nullable: true
          description: Additional metadata about the job
          example:
            instance: "example.com"

    InstanceBlock:
      type: object
      description: A blocked federation instance
      properties:
        id:
          type: string
          description: Unique identifier for the block
          example: "block-123e4567-e89b-12d3-a456-426614174000"
        instance_domain:
          type: string
          description: Domain of the blocked instance
          example: "spam.example.com"
        reason:
          type: string
          nullable: true
          description: Reason for blocking
          example: "Persistent spam source"
        severity:
          $ref: '#/components/schemas/BlockSeverity'
        blocked_by:
          type: string
          nullable: true
          description: User ID who created the block
          example: "admin-123"
        created_at:
          type: string
          format: date-time
          description: When the block was created
          example: "2025-09-15T08:30:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the block expires (null for permanent)
          example: null
        metadata:
          type: object
          nullable: true
          description: Additional metadata about the block
          example:
            automated: false

    ActorBlock:
      type: object
      description: A blocked federation actor
      properties:
        id:
          type: string
          description: Unique identifier for the block
          example: "actor-block-123e4567"
        actor_did:
          type: string
          nullable: true
          description: DID of the blocked actor
          example: "did:plc:abc123xyz789"
        actor_handle:
          type: string
          nullable: true
          description: Handle of the blocked actor
          example: "spammer.example.com"
        reason:
          type: string
          nullable: true
          description: Reason for blocking
          example: "Spam and harassment"
        severity:
          $ref: '#/components/schemas/BlockSeverity'
        blocked_by:
          type: string
          nullable: true
          description: User ID who created the block
          example: "moderator-123"
        created_at:
          type: string
          format: date-time
          description: When the block was created
          example: "2025-09-28T11:45:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the block expires (null for permanent)
          example: "2025-10-28T11:45:00Z"
        metadata:
          type: object
          nullable: true
          description: Additional metadata about the block

    BlockSeverity:
      type: string
      description: |
        Severity level of a block:
        - `block`: Complete block, no federation
        - `shadowban`: Silent filtering of content
        - `quarantine`: Content held for review
        - `mute`: Hide content from timelines
      enum:
        - block
        - shadowban
        - quarantine
        - mute
      example: "block"

    FederationAbuseReport:
      type: object
      description: An abuse report for federated content or actors
      properties:
        id:
          type: string
          description: Unique identifier for the report
          example: "report-123e4567-e89b-12d3-a456-426614174000"
        reporter_did:
          type: string
          nullable: true
          description: DID of the user who filed the report
          example: "did:plc:reporter123"
        reported_content_uri:
          type: string
          nullable: true
          description: URI of the reported content
          example: "at://did:plc:bad123/app.bsky.feed.post/xyz789"
        reported_actor_did:
          type: string
          nullable: true
          description: DID of the reported actor
          example: "did:plc:bad123"
        report_type:
          type: string
          description: Type of abuse report
          enum:
            - spam
            - harassment
            - illegal
            - impersonation
            - violence
            - nsfw
            - other
          example: "spam"
        description:
          type: string
          nullable: true
          description: Detailed description of the abuse
          example: "User is posting mass spam across multiple threads"
        evidence:
          type: object
          nullable: true
          description: Evidence supporting the report (URLs, screenshots, etc.)
          example:
            urls: ["https://example.com/evidence1.png"]
            notes: "Additional context"
        status:
          type: string
          description: Current status of the report
          enum:
            - pending
            - reviewing
            - resolved
            - rejected
          example: "pending"
        resolution:
          type: string
          nullable: true
          description: Resolution notes (populated when resolved)
          example: "Confirmed spam, actor blocked"
        resolved_by:
          type: string
          nullable: true
          description: User ID who resolved the report
          example: "moderator-456"
        resolved_at:
          type: string
          format: date-time
          nullable: true
          description: When the report was resolved
          example: "2025-10-01T15:30:00Z"
        created_at:
          type: string
          format: date-time
          description: When the report was created
          example: "2025-10-01T09:15:00Z"
        updated_at:
          type: string
          format: date-time
          description: When the report was last updated
          example: "2025-10-01T15:30:00Z"

    FederationHealthSummary:
      type: object
      description: Aggregated health metrics for a time window
      properties:
        hour:
          type: string
          format: date-time
          description: Start of the time window (hourly aggregation)
          example: "2025-10-01T10:00:00Z"
        metric_type:
          type: string
          description: Type of metric
          enum:
            - job_success
            - job_failure
            - job_latency_ms
            - ingest_rate
            - ingest_latency_ms
            - queue_depth
            - dlq_size
            - rate_limit_hit
            - signature_reject
            - blocked_request
            - abuse_report
          example: "job_success"
        event_count:
          type: integer
          format: int64
          description: Total number of events in this window
          example: 150
        avg_value:
          type: number
          format: double
          description: Average metric value
          example: 45.2
        min_value:
          type: number
          format: double
          description: Minimum metric value
          example: 12.3
        max_value:
          type: number
          format: double
          description: Maximum metric value
          example: 234.5
        median_value:
          type: number
          format: double
          description: Median metric value
          example: 38.7
        p95_value:
          type: number
          format: double
          description: 95th percentile metric value
          example: 156.8

    # Request Schemas
    BlockInstanceRequest:
      type: object
      description: Request to block a federation instance
      required:
        - instance_domain
        - reason
        - severity
        - blocked_by
      properties:
        instance_domain:
          type: string
          description: Domain of the instance to block
          minLength: 1
          maxLength: 255
          example: "spam.example.com"
        reason:
          type: string
          description: Reason for blocking
          minLength: 1
          maxLength: 1000
          example: "Persistent spam and abuse"
        severity:
          $ref: '#/components/schemas/BlockSeverity'
        blocked_by:
          type: string
          description: User ID creating the block
          example: "admin-123"
        duration:
          type: string
          nullable: true
          description: |
            Duration for temporary blocks (Go duration format, e.g., "24h", "7d", "168h").
            Omit for permanent blocks.
          pattern: '^(\d+h|\d+m|\d+s)+$'
          example: "168h"

    BlockActorRequest:
      type: object
      description: Request to block a federation actor
      required:
        - actor_did
        - actor_handle
        - reason
        - severity
        - blocked_by
      properties:
        actor_did:
          type: string
          description: DID of the actor to block
          minLength: 1
          example: "did:plc:abc123xyz789"
        actor_handle:
          type: string
          description: Handle of the actor to block
          minLength: 1
          example: "spammer.example.com"
        reason:
          type: string
          description: Reason for blocking
          minLength: 1
          maxLength: 1000
          example: "Spam and harassment"
        severity:
          $ref: '#/components/schemas/BlockSeverity'
        blocked_by:
          type: string
          description: User ID creating the block
          example: "moderator-123"
        duration:
          type: string
          nullable: true
          description: |
            Duration for temporary blocks (Go duration format, e.g., "24h", "72h").
            Omit for permanent blocks.
          pattern: '^(\d+h|\d+m|\d+s)+$'
          example: "72h"

    ResolveAbuseReportRequest:
      type: object
      description: Request to resolve an abuse report
      required:
        - resolution
        - resolved_by
        - take_action
      properties:
        resolution:
          type: string
          description: Resolution notes and decision
          minLength: 1
          maxLength: 2000
          example: "Confirmed spam, actor blocked"
        resolved_by:
          type: string
          description: User ID resolving the report
          example: "moderator-123"
        take_action:
          type: boolean
          description: |
            Whether to take action (e.g., block actor/content).
            If true, status becomes "resolved"; if false, status becomes "rejected".
          example: true

  # Reusable Response Schemas
  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: "BAD_REQUEST"
                  message:
                    type: string
                    example: "Invalid request body"

    Unauthorized:
      description: Unauthorized - missing or invalid authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: "UNAUTHORIZED"
                  message:
                    type: string
                    example: "Authentication required"

    Forbidden:
      description: Forbidden - insufficient permissions (requires admin role)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: "FORBIDDEN"
                  message:
                    type: string
                    example: "Admin privileges required"

    NotFound:
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: "NOT_FOUND"
                  message:
                    type: string
                    example: "Resource not found"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: "INTERNAL_ERROR"
                  message:
                    type: string
                    example: "An internal error occurred"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from authentication endpoint
