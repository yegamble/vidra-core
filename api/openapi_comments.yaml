openapi: 3.0.3
info:
  title: Comments API
  version: 1.0.0
  description: API endpoints for video comments with threading and moderation support

tags:
  - name: PeerTube-Compat
    description: Endpoints intended to match PeerTube-style resource contracts.

paths:
  /api/v1/videos/{videoId}/comments:
    get:
      summary: Get comments for a video
      operationId: getVideoComments
      tags:
        - Comments
        - PeerTube-Compat
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the video
        - in: query
          name: parentId
          schema:
            type: string
            format: uuid
          description: Filter by parent comment ID for replies
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of comments to return
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of comments to skip
        - in: query
          name: orderBy
          schema:
            type: string
            enum: [newest, oldest]
            default: newest
          description: Sort order for comments
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommentWithUser'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          description: Video not found

    post:
      summary: Create a comment
      operationId: createVideoComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: Comment text
                parentId:
                  type: string
                  format: uuid
                  description: Parent comment ID for replies
      responses:
        '201':
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Video or parent comment not found

  /api/v1/comments/{commentId}:
    get:
      summary: Get a specific comment
      operationId: getComment
      tags:
        - Comments
        - PeerTube-Compat
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentWithUser'
        '404':
          description: Comment not found

    put:
      summary: Update a comment
      operationId: updateComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: Updated comment text
      responses:
        '204':
          description: Comment updated successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - can only edit own comments
        '404':
          description: Comment not found

    delete:
      summary: Delete a comment (soft delete)
      operationId: deleteComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      responses:
        '204':
          description: Comment deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
        '404':
          description: Comment not found

  /api/v1/comments/{commentId}/flag:
    post:
      summary: Flag a comment for moderation
      operationId: flagComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  enum:
                    - spam
                    - harassment
                    - hate_speech
                    - inappropriate
                    - misinformation
                    - other
                  description: Reason for flagging
                details:
                  type: string
                  maxLength: 500
                  description: Additional details about the flag
      responses:
        '201':
          description: Comment flagged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Comment not found

    delete:
      summary: Remove flag from a comment
      operationId: unflagComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      responses:
        '204':
          description: Flag removed successfully
        '401':
          description: Unauthorized
        '404':
          description: Flag not found

  /api/v1/comments/{commentId}/moderate:
    post:
      summary: Moderate a comment (admin/owner only)
      operationId: moderateComment
      tags:
        - Comments
        - PeerTube-Compat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - active
                    - hidden
                    - flagged
                  description: New status for the comment
      responses:
        '204':
          description: Comment moderated successfully
        '400':
          description: Invalid status
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
        '404':
          description: Comment not found

components:
  schemas:
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        body:
          type: string
        status:
          type: string
          enum:
            - active
            - deleted
            - flagged
            - hidden
        flag_count:
          type: integer
        edited_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replies:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
          description: First few replies (for top-level comments)

    CommentWithUser:
      allOf:
        - $ref: '#/components/schemas/Comment'
        - type: object
          properties:
            username:
              type: string
            avatar:
              type: string
              nullable: true
              description: User avatar IPFS CID

    CommentFlag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        comment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        reason:
          type: string
          enum:
            - spam
            - harassment
            - hate_speech
            - inappropriate
            - misinformation
            - other
        details:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
