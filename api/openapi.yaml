  /.well-known/atproto-did:
    get:
      tags: [Federation, ATProto]
      summary: ATProto DID well-known
      description: Returns the DID document for ATProto/BlueSky federation.
      operationId: wellKnownAtprotoDID
      security: []
      responses:
        '200':
          description: DID document
          content:
            application/json:
              schema: { type: object }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    UserBlock:
      type: object
      description: A per-user block of an account or server
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        blockType:
          type: string
          enum: [account, server]
        targetAccountId:
          type: string
          format: uuid
          nullable: true
        targetServerHost:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type:
          type: string
          enum: [new_video, video_processed, video_failed, new_subscriber, comment, mention, system, new_message, message_read]
        title: { type: string }
        message: { type: string }
        data:
          type: object
          additionalProperties: true
        read: { type: boolean }
        created_at: { type: string, format: date-time }
        read_at: { type: string, format: date-time, nullable: true }
      required: [id, user_id, type, title, message, read, created_at]

    NotificationStats:
      type: object
      properties:
        total_count: { type: integer }
        unread_count: { type: integer }
        by_type:
          type: object
          additionalProperties:
            type: integer
      required: [total_count, unread_count]

    TrendingData:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        updated_at:
          type: string
          format: date-time
        limit:
          type: integer
          description: Included for backward compatibility
      required: [videos, updated_at]

    WrappedTrendingResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TrendingData'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]

    WrappedNotificationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]
    OAuthClient:
      type: object
      properties:
        id: { type: string, format: uuid }
        client_id: { type: string }
        name: { type: string }
        grant_types: { type: array, items: { type: string } }
        scopes: { type: array, items: { type: string } }
        redirect_uris: { type: array, items: { type: string } }
        is_confidential: { type: boolean }
      required: [id, client_id, name, grant_types, scopes, redirect_uris, is_confidential]

    CreateOAuthClientRequest:
      type: object
      properties:
        client_id: { type: string }
        client_secret: { type: string, description: Required for confidential clients }
        name: { type: string }
        grant_types: { type: array, items: { type: string }, default: [password, refresh_token] }
        scopes: { type: array, items: { type: string }, default: [basic] }
        redirect_uris: { type: array, items: { type: string }, default: [] }
        is_confidential: { type: boolean, default: true }
      required: [client_id, name]
    RotateOAuthClientSecretRequest:
      type: object
      properties:
        client_secret: { type: string, description: Required if is_confidential=true }
        is_confidential: { type: boolean, default: true }
    ListMeta:
      type: object
      properties:
        total: { type: integer, format: int64 }
        limit: { type: integer }
        offset: { type: integer }
        page: { type: integer, nullable: true }
        pageSize: { type: integer, nullable: true }
      required: [total, limit, offset]

    Video:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thumbnail_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
        views:
          type: integer
          format: int64
        privacy:
          type: string
          enum: [public, unlisted, private]
        status:
          type: string
          enum: [uploading, queued, processing, completed, failed]
        upload_date:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        tags:
          type: array
          items: { type: string }
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the video category
        category:
          $ref: '#/components/schemas/VideoCategory'
          nullable: true
          description: Category details (when included)
        language:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - thumbnail_id
        - title
        - privacy
        - status
        - upload_date
        - user_id
        - created_at
        - updated_at

    WrappedVideosResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]

    WrappedVideoResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Video'
        success:
          type: boolean
          example: true
      required: [data, success]
    QualitiesData:
      type: object
      properties:
        qualities:
          type: array
          description: Supported quality labels (ascending by height)
          items:
            type: string
            enum: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
          example: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
        default:
          type: string
          description: Default stream quality
          example: "720p"
      required: [qualities, default]

    EncodingJob:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the encoding job
        video_id:
          type: string
          format: uuid
          description: ID of the video being encoded
        resolution:
          type: string
          description: Target resolution (e.g., "720p", "1080p")
        status:
          type: string
          enum: [pending, processing, completed, failed]
          description: Current status of the encoding job
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Progress percentage (0-100)
        error_message:
          type: string
          nullable: true
          description: Error message if job failed
        started_at:
          type: string
          format: date-time
          nullable: true
          description: When the job started processing
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the job completed
        created_at:
          type: string
          format: date-time
          description: When the job was created
        updated_at:
          type: string
          format: date-time
          description: When the job was last updated
      required:
        - id
        - video_id
        - resolution
        - status
        - progress
        - created_at
        - updated_at

    WrappedQualitiesResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QualitiesData'
        success:
          type: boolean
          example: true
      required: [data]
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique user identifier
          example: "user123"
        username:
          type: string
          description: Username (unique)
          example: "johndoe"
        email:
          type: string
          format: email
          description: User email address
          example: "john@example.com"
        display_name:
          type: string
          description: User's display name
          example: "John Doe"
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          type: string
          description: User biography
          example: "Software developer and video enthusiast"
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
          description: Whether the user account is active
          example: true
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
          example: "2024-01-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last account update timestamp
          example: "2024-01-01T12:00:00Z"
      required:
        - id
        - username
        - email
        - role
        - is_active
        - created_at
        - updated_at

    Avatar:
      type: object
      description: User avatar metadata
      properties:
        id:
          type: string
          format: uuid
          description: Avatar UUID
          example: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
        ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the original avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
        webp_ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the WebP-optimized avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Channel unique identifier
        accountId:
          type: string
          format: uuid
          description: ID of the user account that owns this channel
        handle:
          type: string
          pattern: '^[a-zA-Z0-9][a-zA-Z0-9-_]*$'
          minLength: 3
          maxLength: 50
          description: Unique channel handle/username
        displayName:
          type: string
          minLength: 1
          maxLength: 120
          description: Channel display name
        description:
          type: string
          maxLength: 1000
          description: Channel description
          nullable: true
        support:
          type: string
          maxLength: 1000
          description: Support/donation information
          nullable: true
        isLocal:
          type: boolean
          description: Whether this is a local channel (not federated)
        atprotoDid:
          type: string
          description: ATProto DID for federation (for example, did:plc:...)
          nullable: true
        atprotoPdsUrl:
          type: string
          format: uri
          description: Optional ATProto PDS base URL associated with the DID
          nullable: true
        avatarUrl:
          type: string
          format: uri
          description: Channel avatar URL
          nullable: true
        bannerUrl:
          type: string
          format: uri
          description: Channel banner URL
          nullable: true
        followersCount:
          type: integer
          minimum: 0
          description: Number of subscribers/followers
        followingCount:
          type: integer
          minimum: 0
          description: Number of channels this channel follows
        videosCount:
          type: integer
          minimum: 0
          description: Number of videos in this channel
        createdAt:
          type: string
          format: date-time
          description: Channel creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        account:
          $ref: '#/components/schemas/User'
          description: Owner account information when included in responses
      required:
        - id
        - accountId
        - handle
        - displayName
        - isLocal
        - followersCount
        - followingCount
