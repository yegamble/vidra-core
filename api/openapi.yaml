  # Upload endpoints
  /api/v1/uploads/initiate:
    post:
      tags:
        - Uploads
      summary: Initiate chunked upload
      description: Start a new chunked upload session
      operationId: initiateUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                fileSize:
                  type: integer
                  format: int64
                mimeType:
                  type: string
                videoId:
                  type: string
                  format: uuid
              required:
                - filename
                - fileSize
                - mimeType
      responses:
        '200':
          description: Upload session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  chunkSize:
                    type: integer
                  totalChunks:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
