openapi: 3.0.3
info:
  title: Athena Backend API (PeerTube‑Inspired)
  description: |
    Athena's API designed with PeerTube's patterns in mind — native resources and shapes without a compatibility facade.

    ## Additional API Documentation

    This specification covers core authentication, OAuth2, video management, and user messaging.
    For specialized features, see:

    - **Two-Factor Authentication (2FA):** See `openapi_auth_2fa.yaml` for TOTP setup, backup codes, and verification
    - **Video Uploads:** See `openapi_uploads.yaml` for chunked uploads and encoding status
    - **Analytics:** See `openapi_analytics.yaml` for view tracking and trending
    - **Live Streaming:** See `openapi_livestreaming.yaml` for RTMP ingest and HLS delivery
    - **Video Imports:** See `openapi_imports.yaml` for external URL imports
    - **Captions:** See `openapi_captions.yaml` for subtitle management
    - **Federation:** See `openapi_federation.yaml` and `openapi_federation_hardening.yaml`
    - **Plugins:** See `openapi_plugins.yaml` for plugin system
    - **Other Features:** See README at `/api/README.md` for complete documentation index
  version: 1.0.0
  contact:
    name: Athena Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.athena.example.com
    description: Production server

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with username, email, and password
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid_registration:
                summary: Valid registration request
                value:
                  username: "johndoe"
                  email: "john@example.com"
                  password: "securepassword123"
                  display_name: "John Doe"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                successful_registration:
                  summary: Successful registration response
                  value:
                    user:
                      id: "user20240101120000"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_in: 900
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    error:
                      code: "MISSING_FIELDS"
                      message: "Username, email, and password are required"
                      details: {}
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login with username or email and password to receive access and refresh tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid_login:
                summary: Valid login with email
                value:
                  email: "john@example.com"
                  password: "securepassword123"
              username_login:
                summary: Valid login with username
                value:
                  username: "johndoe"
                  password: "securepassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use refresh token to get a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              valid_refresh:
                summary: Valid refresh token request
                value:
                  refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate user session and tokens
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/videos/{id}/chapters:
    get:
      tags:
        - Videos
      summary: Get video chapters
      description: Returns ordered chapter markers for a video.
      operationId: getVideoChapters
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of chapters ordered by position
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        timecode:
                          type: integer
                          description: Start time in seconds
                        title:
                          type: string
                        position:
                          type: integer
    put:
      tags:
        - Videos
      summary: Replace video chapters
      description: Replace all chapter markers for a video. Only the video owner may call this.
      operationId: putVideoChapters
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapters]
              properties:
                chapters:
                  type: array
                  items:
                    type: object
                    required: [timecode, title]
                    properties:
                      timecode:
                        type: integer
                        minimum: 0
                      title:
                        type: string
      responses:
        '204':
          description: Chapters updated
        '400':
          description: Invalid JSON
        '401':
          description: Not authenticated
        '403':
          description: Not video owner
        '404':
          description: Video not found

  /api/v1/videos/{id}/description:
    get:
      tags:
        - Videos
      summary: Get video description
      description: Returns only the full description text for a video.
      operationId: getVideoDescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Video description
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      description:
                        type: string
        '404':
          description: Video not found

  /api/v1/blocklist/status:
    get:
      tags:
        - Moderation
      summary: Get instance blocklist status
      description: Returns a summary of the instance blocklist split by accounts and servers. Requires authentication.
      operationId: getBlocklistStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Blocklist status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accounts:
                        type: array
                        items:
                          $ref: '#/components/schemas/BlocklistEntry'
                      servers:
                        type: array
                        items:
                          $ref: '#/components/schemas/BlocklistEntry'
        '401':
          description: Not authenticated

  /api/v1/videos/{id}/blacklist:
    post:
      tags:
        - Moderation
      summary: Blacklist a video
      description: Add a video to the admin blacklist (admin/mod only). Hides it from public listings.
      operationId: addVideoToBlacklist
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for blacklisting
                unfederated:
                  type: boolean
                  default: false
                  description: Whether to prevent federation
      responses:
        '204':
          description: Video blacklisted
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (requires admin/mod)
        '409':
          description: Video already blacklisted
    delete:
      tags:
        - Moderation
      summary: Remove video from blacklist
      description: Remove a video from the admin blacklist (admin/mod only).
      operationId: removeVideoFromBlacklist
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Video removed from blacklist
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (requires admin/mod)
        '404':
          description: Video not found in blacklist

  /api/v1/videos/blacklist:
    get:
      tags:
        - Moderation
      summary: List blacklisted videos
      description: List all blacklisted videos with pagination (admin/mod only).
      operationId: listBlacklistedVideos
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          schema:
            type: integer
            default: 0
        - name: count
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of blacklisted videos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        video_id:
                          type: string
                          format: uuid
                        reason:
                          type: string
                        unfederated:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (requires admin/mod)

  /api/v1/users/ask-reset-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send a password reset email to the user. Always returns 204 to avoid leaking user existence.
      operationId: askResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '204':
          description: Email sent (or silently ignored if address not found)
        '400':
          description: Missing or invalid email field

  /api/v1/users/{id}/reset-password:
    post:
      tags:
        - Authentication
      summary: Confirm password reset
      description: Reset the user password using a valid reset token.
      operationId: resetPassword
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetPasswordToken, password]
              properties:
                resetPasswordToken:
                  type: string
                  description: Token received in the reset email
                password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '204':
          description: Password changed successfully
        '400':
          description: Missing required fields
        '403':
          description: Invalid or expired token

  /api/v1/search/videos:
    get:
      tags:
        - Search
      summary: Search videos
      description: Search public videos by keyword.
      operationId: searchVideosCompat
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: integer
            default: 0
        - name: count
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of matching videos
        '400':
          description: Missing query parameter

  /api/v1/search/video-channels:
    get:
      tags:
        - Search
      summary: Search video channels
      description: Search channels by name or description.
      operationId: searchVideoChannels
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: integer
            default: 0
        - name: count
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of matching channels
        '400':
          description: Missing query parameter

  /api/v1/search/video-playlists:
    get:
      tags:
        - Search
      summary: Search video playlists
      description: Search playlists by name or description.
      operationId: searchVideoPlaylists
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: integer
            default: 0
        - name: count
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of matching playlists
        '400':
          description: Missing query parameter

  /feeds/videos.atom:
    get:
      tags:
        - Feeds
      summary: Recent videos Atom feed
      description: Returns an Atom 1.0 feed of recently published public videos.
      operationId: getVideosFeedAtom
      security: []
      responses:
        '200':
          description: Atom feed XML
          content:
            application/atom+xml:
              schema:
                type: string

  /feeds/videos.rss:
    get:
      tags:
        - Feeds
      summary: Recent videos RSS feed
      description: Returns an RSS 2.0 feed of recently published public videos.
      operationId: getVideosFeedRSS
      security: []
      responses:
        '200':
          description: RSS feed XML
          content:
            application/rss+xml:
              schema:
                type: string

  /feeds/video-comments.atom:
    get:
      tags:
        - Feeds
      summary: Video comments Atom feed
      description: Returns an Atom 1.0 feed of video comments. Filter by videoId query param.
      operationId: getCommentsFeedAtom
      security: []
      parameters:
        - name: videoId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Atom feed XML
          content:
            application/atom+xml:
              schema:
                type: string

  /feeds/video-comments.rss:
    get:
      tags:
        - Feeds
      summary: Video comments RSS feed
      description: Returns an RSS 2.0 feed of video comments. Filter by videoId query param.
      operationId: getCommentsFeedRSS
      security: []
      parameters:
        - name: videoId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: RSS feed XML
          content:
            application/rss+xml:
              schema:
                type: string

  /feeds/subscriptions.atom:
    get:
      tags:
        - Feeds
      summary: Subscription Atom feed
      description: Returns an Atom 1.0 feed of videos from subscribed channels. Requires authentication.
      operationId: getSubscriptionFeedAtom
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Atom feed XML
          content:
            application/atom+xml:
              schema:
                type: string
        '401':
          description: Unauthorized

  /feeds/subscriptions.rss:
    get:
      tags:
        - Feeds
      summary: Subscription RSS feed
      description: Returns an RSS 2.0 feed of videos from subscribed channels. Requires authentication.
      operationId: getSubscriptionFeedRSS
      security:
        - bearerAuth: []
      responses:
        '200':
          description: RSS feed XML
          content:
            application/rss+xml:
              schema:
                type: string
        '401':
          description: Unauthorized

  /api/v1/admin/oauth/clients:
    get:
      tags: [Admin, OAuth]
      summary: List OAuth clients
      description: Admin-only list of registered OAuth clients (secret hashes are not returned).
      operationId: adminListOAuthClients
      responses:
        '200':
          description: List of OAuth clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OAuthClient'
                  success:
                    type: boolean
                    example: true
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
    post:
      tags: [Admin, OAuth]
      summary: Create OAuth client
      description: Admin-only endpoint to register a new OAuth client.
      operationId: adminCreateOAuthClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOAuthClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OAuthClient'
                  success:
                    type: boolean
                    example: true
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /api/v1/admin/oauth/clients/{clientId}:
    delete:
      tags: [Admin, OAuth]
      summary: Delete OAuth client
      description: Delete a client by its client_id.
      operationId: adminDeleteOAuthClient
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Client deleted }
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /api/v1/admin/oauth/clients/{clientId}/secret:
    put:
      tags: [Admin, OAuth]
      summary: Rotate OAuth client secret
      description: Set or clear a client's secret (set is_confidential=false to clear).
      operationId: adminRotateOAuthClientSecret
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateOAuthClientSecretRequest'
      responses:
        '200': { description: Secret updated }
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /oauth/token:
    post:
      tags:
        - OAuth
      summary: OAuth2 token endpoint
      description: Issue access tokens using password or refresh_token grants.
      operationId: oauthToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [password, refresh_token, authorization_code]
                username:
                  type: string
                  description: Username or email (for password grant)
                password:
                  type: string
                  description: User password (for password grant)
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
                code:
                  type: string
                  description: Authorization code (for authorization_code grant)
                redirect_uri:
                  type: string
                  format: uri
                  description: Redirect URI (for authorization_code grant, must match the one used in /oauth/authorize)
                code_verifier:
                  type: string
                  description: PKCE code verifier (for authorization_code grant with PKCE)
                client_id:
                  type: string
                  description: Optional if using HTTP Basic auth
                client_secret:
                  type: string
                  description: Optional if using HTTP Basic auth
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
        '401':
          description: Invalid client or credentials
          headers:
            WWW-Authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

  /oauth/authorize:
    get:
      tags:
        - OAuth
      summary: OAuth2 authorization endpoint (display form)
      description: Display authorization form for user to approve or deny client access
      operationId: oauthAuthorizeGet
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: OAuth client identifier
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: URI to redirect back to after authorization
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
          description: Must be 'code' for authorization code flow
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: Space-separated list of requested scopes
          example: "basic profile email"
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Opaque value used to maintain state between request and callback
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
          description: PKCE code challenge (base64url-encoded)
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [plain, S256]
          description: PKCE code challenge method
      responses:
        '200':
          description: Authorization form displayed
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to login if user not authenticated
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

    post:
      tags:
        - OAuth
      summary: OAuth2 authorization endpoint (grant access)
      description: Process user approval/denial and issue authorization code
      operationId: oauthAuthorizePost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - client_id
                - redirect_uri
                - response_type
                - approve
              properties:
                client_id:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
                response_type:
                  type: string
                  enum: [code]
                scope:
                  type: string
                state:
                  type: string
                code_challenge:
                  type: string
                code_challenge_method:
                  type: string
                  enum: [plain, S256]
                approve:
                  type: string
                  enum: ["true", "false"]
                  description: User approval decision
      responses:
        '302':
          description: Redirect to client redirect_uri with code or error
          headers:
            Location:
              schema:
                type: string
                example: "https://client.example.com/callback?code=AUTH_CODE&state=STATE"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

  /oauth/revoke:
    post:
      tags:
        - OAuth
      summary: OAuth2 token revocation
      description: Revoke an access or refresh token (RFC 7009)
      operationId: oauthRevoke
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: The token to revoke (access or refresh)
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  description: Hint about the type of token being revoked
                client_id:
                  type: string
                  description: Client ID (if not using HTTP Basic auth)
                client_secret:
                  type: string
                  description: Client secret (if not using HTTP Basic auth)
      responses:
        '200':
          description: Token revoked successfully (or already invalid)
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
        '401':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

  /oauth/introspect:
    post:
      tags:
        - OAuth
      summary: OAuth2 token introspection
      description: Query token metadata and validity (RFC 7662)
      operationId: oauthIntrospect
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: The token to introspect
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  description: Hint about the type of token
                client_id:
                  type: string
                  description: Client ID (if not using HTTP Basic auth)
                client_secret:
                  type: string
                  description: Client secret (if not using HTTP Basic auth)
      responses:
        '200':
          description: Token introspection response
          content:
            application/json:
              schema:
                type: object
                required:
                  - active
                properties:
                  active:
                    type: boolean
                    description: Whether the token is currently active
                  scope:
                    type: string
                    description: Space-separated list of scopes
                  client_id:
                    type: string
                    description: Client identifier
                  username:
                    type: string
                    description: User identifier
                  token_type:
                    type: string
                    example: "Bearer"
                  exp:
                    type: integer
                    format: int64
                    description: Expiration time (Unix timestamp)
                  iat:
                    type: integer
                    format: int64
                    description: Issued at time (Unix timestamp)
              examples:
                active_token:
                  summary: Active token
                  value:
                    active: true
                    scope: "basic profile email"
                    client_id: "my-client"
                    username: "user123"
                    token_type: "Bearer"
                    exp: 1704106800
                    iat: 1704105900
                inactive_token:
                  summary: Inactive or invalid token
                  value:
                    active: false
        '401':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

