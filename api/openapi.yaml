      responses:
        '200':
          description: E2EE setup successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/E2EESetupResponse'
              examples:
                success:
                  summary: E2EE setup success
                  value:
                    message: "E2EE setup completed successfully"
                    public_key: "base64-encoded-public-key"
                    signing_public_key: "base64-encoded-signing-key"
        '400':
          description: Invalid request or E2EE already setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/e2ee/unlock:
    post:
      tags:
        - E2EE
