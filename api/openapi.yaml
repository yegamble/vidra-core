                        last_message_at: "2024-01-01T12:00:00Z",
                        created_at: "2024-01-01T10:00:00Z",
                        updated_at: "2024-01-01T12:00:00Z",
                        unread_count: 2
                      },
                      {
                        id: "conv-123e4567-e89b-12d3-a456-426614174001",
                        participant_one_id: "user-123e4567-e89b-12d3-a456-426614174000",
                        participant_two_id: "user-123e4567-e89b-12d3-a456-426614174002",
                        is_secure_mode: true,
                        last_message_id: "msg-123e4567-e89b-12d3-a456-426614174001",
                        last_message_at: "2024-01-01T11:30:00Z",
                        created_at: "2024-01-01T09:00:00Z",
                        updated_at: "2024-01-01T11:30:00Z",
                        unread_count: 0
                      }
                    ],
                    total: 2,
                    has_more: false
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/conversations/unread-count:
    get:
      tags: [Messages]
      summary: Get unread message count
      description: Get the total number of unread messages for the authenticated user
      operationId: getUnreadCount
      responses:
        '200':
          description: Unread count retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count:
                    type: integer
                    example: 5
              examples:
                example:
                  value:
                    unread_count: 5
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/conversations/secure:
    post:
      tags: [Messages]
      summary: Start a secure conversation (requires PGP keys)
      operationId: startSecureConversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartSecureConversationRequest' }
            examples:
              example:
                summary: Start secure conversation
                value:
                  recipient_id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WrappedConversationResponse' }
              examples:
                example:
                  value:
                    success: true
                    data:
                      id: "conv-123e4567-e89b-12d3-a456-426614174001"
                      participant_one_id: "user-123e4567-e89b-12d3-a456-426614174000"
                      participant_two_id: "user-123e4567-e89b-12d3-a456-426614174001"
                      is_secure_mode: true
                      last_message_id: null
                      last_message_at: "2024-01-01T12:00:00Z",
                      created_at: "2024-01-01T12:00:00Z",
                      updated_at: "2024-01-01T12:00:00Z"
        '400': { description: Secure mode not allowed, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  schemas:
    EncodingStatusData:
      type: object
      properties:
        pending: { type: integer, format: int64 }
        processing: { type: integer, format: int64 }
        completed: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        scheduler_enabled: { type: boolean }
        scheduler_interval_seconds: { type: integer }
        scheduler_burst: { type: integer }
        scheduler_last_tick: { type: string, format: date-time, nullable: true }
        scheduler_last_processed: { type: string, format: date-time, nullable: true }

    WrappedEncodingStatusResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/EncodingStatusData'
        success:
          type: boolean
          example: true
      required: [data, success]

    InitiateUploadRequest:
      type: object
      properties:
        filename: { type: string }
        file_size: { type: integer, format: int64 }
        chunk_size: { type: integer, format: int64 }
        expected_checksum: { type: string }
      required: [filename, file_size]

    InitiateUploadResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        chunk_size: { type: integer, format: int64 }
        total_chunks: { type: integer }
        upload_url: { type: string }
      required: [session_id, chunk_size, total_chunks, upload_url]

    WrappedInitiateUploadResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/InitiateUploadResponse' }
        success: { type: boolean, example: true }
      required: [data, success]

    ChunkUploadResponse:
      type: object
      properties:
        chunk_index: { type: integer }
        uploaded: { type: boolean }
        remaining_chunks:
          type: array
          items: { type: integer }
      required: [chunk_index, uploaded, remaining_chunks]

    WrappedChunkUploadResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ChunkUploadResponse' }
        success: { type: boolean, example: true }
      required: [data, success]

    UploadSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        video_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        filename: { type: string }
        file_size: { type: integer, format: int64 }
        chunk_size: { type: integer, format: int64 }
        total_chunks: { type: integer }
        uploaded_chunks:
          type: array
          items: { type: integer }
        status: { type: string, enum: [active, completed, expired, failed] }
        temp_file_path: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
      required: [id, video_id, user_id, filename, file_size, chunk_size, total_chunks, uploaded_chunks, status, created_at, updated_at, expires_at]

    WrappedUploadSessionResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/UploadSession' }
        success: { type: boolean, example: true }
      required: [data, success]

    CompleteUploadResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        status: { type: string, example: "completed" }
        message: { type: string }
      required: [session_id, status]

    WrappedCompleteUploadResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/CompleteUploadResponse' }
        success: { type: boolean, example: true }
      required: [data, success]

    UploadResumeResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        total_chunks: { type: integer }
        uploaded_chunks:
          type: array
          items: { type: integer }
        remaining_chunks:
          type: array
          items: { type: integer }
        progress_percent: { type: number, format: float }
      required: [session_id, total_chunks, uploaded_chunks, remaining_chunks, progress_percent]

    WrappedUploadResumeResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/UploadResumeResponse' }
        success: { type: boolean, example: true }
      required: [data, success]

    SetPGPKeyRequest:
      type: object
      properties:
        pgp_public_key: { type: string }
      required: [pgp_public_key]

    PGPKeyResponse:
      type: object
      properties:
        has_pgp_key: { type: boolean }
        pgp_public_key: { type: string, nullable: true }
        pgp_fingerprint: { type: string, nullable: true }
      required: [has_pgp_key]

    WrappedPGPKeyResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/PGPKeyResponse' }
        success: { type: boolean, example: true }
      required: [data, success]

    SendSecureMessageRequest:
      type: object
      properties:
        recipient_id: { type: string, format: uuid }
        encrypted_content: { type: string, description: "Armored PGP encrypted content" }
        pgp_signature: { type: string, description: "Detached signature, verified against encrypted_content" }
        parent_message_id: { type: string, format: uuid, nullable: true }
      required: [recipient_id, encrypted_content, pgp_signature]

    StartSecureConversationRequest:
      type: object
      properties:
        recipient_id: { type: string, format: uuid }
      required: [recipient_id]

    SendMessageRequest:
      type: object
      properties:
        recipient_id: { type: string, format: uuid }
        content: { type: string, maxLength: 2000 }
        parent_message_id: { type: string, format: uuid, nullable: true }
      required: [recipient_id, content]

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        sender_id: { type: string, format: uuid }
        recipient_id: { type: string, format: uuid }
        content: { type: string, nullable: true }
        conversation_id: { type: string, format: uuid, nullable: true }
        encrypted_content: { type: string, nullable: true }
        pgp_signature: { type: string, nullable: true }
        message_type: { type: string, enum: [text, system] }
        is_read: { type: boolean }
        is_deleted_by_sender: { type: boolean }
        is_deleted_by_recipient: { type: boolean }
        parent_message_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        read_at: { type: string, format: date-time, nullable: true }
        is_secure: { type: boolean, nullable: true }
      required: [id, sender_id, recipient_id, created_at]

    MessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        total: { type: integer }
        has_more: { type: boolean }
      required: [messages, total, has_more]

    ConversationsResponse:
      type: object
      properties:
        conversations:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        total: { type: integer }
        has_more: { type: boolean }
      required: [conversations, total, has_more]

    Conversation:
      type: object
      properties:
        id: { type: string, format: uuid }
        participant_one_id: { type: string, format: uuid }
        participant_two_id: { type: string, format: uuid }
        is_secure_mode: { type: boolean }
        last_message_id: { type: string, format: uuid, nullable: true }
        last_message_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        unread_count: { type: integer, nullable: true }
      required: [id, participant_one_id, participant_two_id, is_secure_mode, last_message_at, created_at, updated_at]

    WrappedMessageResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Message' }
        success: { type: boolean, example: true }
      required: [data, success]

    WrappedConversationResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Conversation' }
        success: { type: boolean, example: true }
      required: [data, success]

    WrappedStatusResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
          example: { status: ok }
        success: { type: boolean, example: true }
      required: [data, success]
    ListMeta:
      type: object
      properties:
        total: { type: integer, format: int64 }
        limit: { type: integer }
        offset: { type: integer }
        page: { type: integer, nullable: true }
      required: [total, limit, offset]

    Video:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thumbnail_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
        views:
          type: integer
          format: int64
        privacy:
          type: string
          enum: [public, unlisted, private]
        status:
          type: string
          enum: [uploading, queued, processing, completed, failed]
        upload_date:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        tags:
          type: array
          items: { type: string }
        category:
          type: string
        language:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - thumbnail_id
        - title
        - privacy
        - status
        - upload_date
        - user_id
        - created_at
        - updated_at

    WrappedVideosResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]

    WrappedVideoResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Video'
        success:
          type: boolean
          example: true
      required: [data, success]
    QualitiesData:
      type: object
      properties:
        qualities:
          type: array
          description: Supported quality labels (ascending by height)
          items:
            type: string
            enum: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
          example: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
        default:
          type: string
          description: Default stream quality
          example: "720p"
      required: [qualities, default]

    WrappedQualitiesResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QualitiesData'
        success:
          type: boolean
          example: true
      required: [data]
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique user identifier
          example: "user123"
        username:
          type: string
          description: Username (unique)
          example: "johndoe"
        email:
          type: string
          format: email
          description: User email address
          example: "john@example.com"
        display_name:
          type: string
          description: User's display name
          example: "John Doe"
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          type: string
          description: User biography
          example: "Software developer and video enthusiast"
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
          description: Whether the user account is active
          example: true
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
          example: "2024-01-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last account update timestamp
          example: "2024-01-01T12:00:00Z"
      required:
        - id
        - username
        - email
        - role
        - is_active
        - created_at
        - updated_at

    Avatar:
      type: object
      description: User avatar metadata
      properties:
        id:
          type: string
          format: uuid
          description: Avatar UUID
          example: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
        ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the original avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
        webp_ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the WebP-optimized avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"

    UserRole:
      type: string
      enum:
        - user
        - admin
        - moderator
      description: User role determining permissions
      example: "user"

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          description: User's password
          example: "securepassword123"
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Unique username
          example: "johndoe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          description: User's password
          example: "securepassword123"
        display_name:
          type: string
          maxLength: 100
          description: User's display name
          example: "John Doe"
      required:
        - username
        - email
        - password

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      required:
        - refresh_token

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          example: 900
      required:
        - user
        - access_token
        - refresh_token
        - expires_in

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: New JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: New JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          example: 900
      required:
        - access_token
        - refresh_token
        - expires_in

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          description: Logout success message
          example: "Logged out successfully"
        user_id:
          type: string
          description: ID of the logged out user
          example: "user123"
      required:
        - message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["healthy"]
          example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
      required:
        - status
        - timestamp

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["ready", "not_ready"]
          example: "ready"
        checks:
          type: object
          properties:
            database:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
            redis:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
            ipfs:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
      required:
        - status
        - checks
        - timestamp

    WrappedUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        success:
          type: boolean
          example: true
      required:
        - data
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code identifier
              example: "INVALID_CREDENTIALS"
            message:
              type: string
              description: Human-readable error message
              example: "Invalid email or password"
            details:
              type: object
              additionalProperties: true
              description: Additional error details
              example: {}
          required:
            - code
            - message
            - details
        success:
          type: boolean
          example: false
      required:
        - error
        - success
