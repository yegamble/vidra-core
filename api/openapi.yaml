                like: { type: boolean }
                subscribe: { type: boolean }
                mention: { type: boolean }
                reply: { type: boolean }
                upload: { type: boolean }
                system: { type: boolean }
                email_enabled: { type: boolean }
      responses:
        '200':
          description: Updated notification preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user_id: { type: string, format: uuid }
                      comment: { type: boolean }
                      like: { type: boolean }
                      subscribe: { type: boolean }
                      mention: { type: boolean }
                      reply: { type: boolean }
                      upload: { type: boolean }
                      system: { type: boolean }
                      email_enabled: { type: boolean }
                  success: { type: boolean, example: true }
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/avatars/{cid}:
    get:
      tags: [Users]
