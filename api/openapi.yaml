        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Social, ATProto]
      summary: Unlike a post/video
      operationId: socialUnlike
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uri]
              properties:
                uri: { type: string }
      responses:
        '200':
