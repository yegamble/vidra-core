    # Message Schemas
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Message unique identifier
        sender_id:
          type: string
          format: uuid
          description: Sender user ID
        recipient_id:
          type: string
          format: uuid
          description: Recipient user ID
        content:
          type: string
          description: Message content (null for encrypted messages)
          nullable: true
        encrypted_content:
          type: string
          description: Encrypted message content (null for standard messages)
          nullable: true
        content_nonce:
          type: string
          description: Encryption nonce (for encrypted messages)
          nullable: true
        pgp_signature:
          type: string
          description: Ed25519 signature (for encrypted messages)
          nullable: true
        is_encrypted:
          type: boolean
          description: Whether message is end-to-end encrypted
        encryption_version:
          type: integer
          description: Encryption version used
          minimum: 0
        is_read:
          type: boolean
          description: Whether message has been read by recipient
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - sender_id
        - recipient_id
        - is_encrypted
        - encryption_version
        - is_read
        - created_at
        - updated_at

    Conversation:
