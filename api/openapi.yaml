      responses:
        '201':
          description: Message sent successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
              examples:
                example:
                  value:
                    message:
                      id: "msg-123e4567-e89b-12d3-a456-426614174000",
                      sender_id: "user-123e4567-e89b-12d3-a456-426614174000",
                      recipient_id: "user-123e4567-e89b-12d3-a456-426614174001",
                      content: "Hello! How are you doing?",
                      conversation_id: "conv-123e4567-e89b-12d3-a456-426614174000",
                      message_type: "text",
                      is_read: false,
                      created_at: "2024-01-01T12:00:00Z",
                      updated_at: "2024-01-01T12:00:00Z"
