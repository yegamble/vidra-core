  /api/v1/users/me/avatar:
    post:
      tags:
        - Users
      summary: Upload user avatar
      description: |
        Uploads a user avatar image with comprehensive format support and security validation.

        **Supported Formats:**
        - PNG - Standard format with WebP conversion
        - JPEG/JPG - Standard format with WebP conversion
        - WebP - Modern format (direct upload, no conversion needed)
        - HEIC/HEIF - Apple format with special file signature validation
        - GIF - Animation-capable format with WebP conversion
        - TIFF/TIF - High-quality format with WebP conversion

        **Security Features:**
        - Extension validation (only image extensions allowed)
        - MIME type verification via Content-Type header
        - File content validation through image decoding
        - HEIC special handling via file signature detection
        - Executable file detection and rejection
        - 5MB file size limit

        **Processing:**
        - Original image stored and uploaded to IPFS
        - WebP optimization automatically generated (except for WebP uploads)
        - Both original and WebP versions pinned in IPFS
        - User record updated with IPFS content identifiers

        Response includes an avatar object with fields:
        - id (UUID)
        - ipfs_cid (original)
        - webp_ipfs_cid (optimized)
      operationId: uploadUserAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Avatar image file. Must be a valid image in one of the supported formats:
                    PNG, JPEG, WebP, HEIC, GIF, or TIFF. Maximum size: 5MB.
              required: [file]
            examples:
              png_upload:
                summary: PNG image upload
                value:
                  file: "(binary PNG data)"
              jpeg_upload:
                summary: JPEG image upload
                value:
                  file: "(binary JPEG data)"
              webp_upload:
                summary: WebP image upload
                value:
                  file: "(binary WebP data)"
              heic_upload:
                summary: HEIC image upload (Apple format)
                value:
                  file: "(binary HEIC data)"
              gif_upload:
                summary: GIF image upload
                value:
                  file: "(binary GIF data)"
              tiff_upload:
                summary: TIFF image upload
                value:
                  file: "(binary TIFF data)"
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUserResponse'
              examples:
                successful_upload:
                  summary: Successful avatar upload
                  value:
                    success: true
                    data:
                      id: "user-123"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      avatar:
                        id: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
                        ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
                        webp_ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"
                      bio: null
                      bitcoin_wallet: null
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
        '400':
          description: Invalid request, unsupported format, or corrupted file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_file:
                  summary: No file provided
                  value:
                    success: false
                    error:
                      code: "MISSING_FILE"
                      message: "Missing file field in form"
                      details: {}
                invalid_extension:
                  summary: Invalid file extension
                  value:
                    success: false
                    error:
