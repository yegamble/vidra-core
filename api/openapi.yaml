                    message: "E2EE session unlocked"
                    expires_at: "2024-01-01T12:15:00Z"
        '400':
          description: Invalid password or E2EE not setup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

