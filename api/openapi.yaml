openapi: 3.0.3
info:
  title: Athena Backend API (PeerTube‑Inspired)
  description: Athena’s API designed with PeerTube’s patterns in mind — native resources and shapes without a compatibility facade.
  version: 1.0.0
  contact:
    name: Athena Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.athena.example.com
    description: Production server

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with username, email, and password
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid_registration:
                summary: Valid registration request
                value:
                  username: "johndoe"
                  email: "john@example.com"
                  password: "securepassword123"
                  display_name: "John Doe"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                successful_registration:
                  summary: Successful registration response
                  value:
                    user:
                      id: "user20240101120000"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_in: 900
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    error:
                      code: "MISSING_FIELDS"
                      message: "Username, email, and password are required"
                      details: {}
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login with email and password to receive access and refresh tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid_login:
                summary: Valid login request
                value:
                  email: "john@example.com"
                  password: "securepassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use refresh token to get a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              valid_refresh:
                summary: Valid refresh token request
                value:
                  refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate user session and tokens
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/oauth/clients:
    get:
      tags: [Admin, OAuth]
      summary: List OAuth clients
      description: Admin-only list of registered OAuth clients (secret hashes are not returned).
      operationId: adminListOAuthClients
      responses:
        '200':
          description: List of OAuth clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OAuthClient'
                  success:
                    type: boolean
                    example: true
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
    post:
      tags: [Admin, OAuth]
      summary: Create OAuth client
      description: Admin-only endpoint to register a new OAuth client.
      operationId: adminCreateOAuthClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOAuthClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OAuthClient'
                  success:
                    type: boolean
                    example: true
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /api/v1/admin/oauth/clients/{clientId}:
    delete:
      tags: [Admin, OAuth]
      summary: Delete OAuth client
      description: Delete a client by its client_id.
      operationId: adminDeleteOAuthClient
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Client deleted }
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /api/v1/admin/oauth/clients/{clientId}/secret:
    put:
      tags: [Admin, OAuth]
      summary: Rotate OAuth client secret
      description: Set or clear a client's secret (set is_confidential=false to clear).
      operationId: adminRotateOAuthClientSecret
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateOAuthClientSecretRequest'
      responses:
        '200': { description: Secret updated }
        '400': { description: Bad request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Server error }
  /oauth/token:
    post:
      tags:
        - OAuth
      summary: OAuth2 token endpoint
      description: Issue access tokens using password or refresh_token grants.
      operationId: oauthToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [password, refresh_token]
                username:
                  type: string
                  description: Username or email (for password grant)
                password:
                  type: string
                  description: User password (for password grant)
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
                client_id:
                  type: string
                  description: Optional if using HTTP Basic auth
                client_secret:
                  type: string
                  description: Optional if using HTTP Basic auth
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
        '401':
          description: Invalid client or credentials
          headers:
            WWW-Authenticate:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the service is alive
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Check if the service is ready to handle requests
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/subscriptions:
    get:
      tags:
        - Users
        - Subscriptions
      summary: List my subscriptions
      description: Returns the channels the authenticated user is subscribed to.
      operationId: listMySubscriptions
      parameters:
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1 }
          description: 1-based page index (preferred)
        - in: query
          name: pageSize
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Page size (preferred)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Deprecated; use pageSize
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0 }
          description: Deprecated; use page
      responses:
        '200':
          description: List of subscribed channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUsersResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/qualities:
    get:
      tags:
        - Videos
      summary: Get supported video qualities
      description: Returns the list of supported quality labels and the default quality used for streaming.
      operationId: getSupportedQualities
      security: []
      responses:
        '200':
          description: Supported qualities returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedQualitiesResponse'
              examples:
                example:
                  summary: Supported qualities
                  value:
                    success: true
                    data:
                      qualities: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
                      default: "720p"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos:
    get:
      tags:
        - Videos
      summary: List videos
      description: Returns a paginated list of public videos with optional filters.
      operationId: listVideos
      security: []
      parameters:
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: language
          required: false
          schema: { type: string }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [title, views, upload_date, duration]
          description: Sort field (defaults to upload_date)
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order (defaults to desc)
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1 }
          description: 1-based page index (preferred)
        - in: query
          name: pageSize
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Page size (preferred)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Deprecated; use pageSize
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0 }
          description: Deprecated; use page
      responses:
        '200':
          description: List of videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/subscriptions:
    get:
      tags:
        - Videos
        - Subscriptions
      summary: List videos from subscribed channels
      description: Returns public, completed videos from channels the authenticated user is subscribed to.
      operationId: listSubscriptionVideos
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: List of subscription videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/search:
    get:
      tags:
        - Videos
      summary: Search videos
      description: Full-text search over public, completed videos with optional filters and relevance sorting.
      operationId: searchVideos
      security: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
          description: Search query string
        - in: query
          name: tags
          required: false
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: Optional tags to filter by (repeatable)
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: language
          required: false
          schema: { type: string }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [relevance, title, views, upload_date, duration]
          description: Sort field (use relevance with a search query)
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order (defaults to desc)
        - in: query
          name: page
          required: false
          schema: { type: integer, minimum: 1 }
          description: 1-based page index (preferred)
        - in: query
          name: pageSize
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Page size (preferred)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Deprecated; use pageSize
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0 }
          description: Deprecated; use page
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '400':
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/{id}:
    get:
      tags:
        - Videos
      summary: Get video by ID
      description: Returns a single video by its ID.
      operationId: getVideo
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Video found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideoResponse'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}/subscribe:
    post:
      tags:
        - Subscriptions
        - Users
      summary: Subscribe to a user
      description: Subscribes the authenticated user to the given user ID.
      operationId: subscribeUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Subscribed successfully
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Subscriptions
        - Users
      summary: Unsubscribe from a user
      description: Unsubscribes the authenticated user from the given user ID.
      operationId: unsubscribeUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Unsubscribed successfully
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/avatar:
    post:
      tags:
        - Users
      summary: Upload user avatar
      description: |
        Uploads a user avatar image with comprehensive format support and security validation.
        
        **Supported Formats:**
        - PNG - Standard format with WebP conversion
        - JPEG/JPG - Standard format with WebP conversion  
        - WebP - Modern format (direct upload, no conversion needed)
        - HEIC/HEIF - Apple format with special file signature validation
        - GIF - Animation-capable format with WebP conversion
        - TIFF/TIF - High-quality format with WebP conversion
        
        **Security Features:**
        - Extension validation (only image extensions allowed)
        - MIME type verification via Content-Type header
        - File content validation through image decoding
        - HEIC special handling via file signature detection
        - Executable file detection and rejection
        - 5MB file size limit
        
        **Processing:**
        - Original image stored and uploaded to IPFS
        - WebP optimization automatically generated (except for WebP uploads)
        - Both original and WebP versions pinned in IPFS
        - User record updated with IPFS content identifiers
        
        Response includes an avatar object with fields:
        - id (UUID)
        - ipfs_cid (original)
        - webp_ipfs_cid (optimized)
      operationId: uploadUserAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Avatar image file. Must be a valid image in one of the supported formats:
                    PNG, JPEG, WebP, HEIC, GIF, or TIFF. Maximum size: 5MB.
              required: [file]
            examples:
              png_upload:
                summary: PNG image upload
                value:
                  file: "(binary PNG data)"
              jpeg_upload:
                summary: JPEG image upload  
                value:
                  file: "(binary JPEG data)"
              webp_upload:
                summary: WebP image upload
                value:
                  file: "(binary WebP data)"
              heic_upload:
                summary: HEIC image upload (Apple format)
                value:
                  file: "(binary HEIC data)"
              gif_upload:
                summary: GIF image upload
                value:
                  file: "(binary GIF data)"
              tiff_upload:
                summary: TIFF image upload
                value:
                  file: "(binary TIFF data)"
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUserResponse'
              examples:
                successful_upload:
                  summary: Successful avatar upload
                  value:
                    success: true
                    data:
                      id: "user-123"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      avatar:
                        id: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
                        ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
                        webp_ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"
                      bio: null
                      bitcoin_wallet: null
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
        '400':
          description: Invalid request, unsupported format, or corrupted file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_file:
                  summary: No file provided
                  value:
                    success: false
                    error:
                      code: "MISSING_FILE"
                      message: "Missing file field in form"
                      details: {}
                invalid_extension:
                  summary: Invalid file extension
                  value:
                    success: false
                    error:
                      code: "INVALID_FILE_EXTENSION" 
                      message: "invalid file extension: bad request"
                      details: {}
                unsupported_format:
                  summary: Unsupported image format
                  value:
                    success: false
                    error:
                      code: "UNSUPPORTED_FORMAT"
                      message: "unsupported image format: bad request"
                      details: {}
                corrupted_image:
                  summary: Invalid or corrupted image file
                  value:
                    success: false
                    error:
                      code: "INVALID_IMAGE"
                      message: "invalid or corrupted image file: bad request"
                      details: {}
                malicious_file:
                  summary: Executable file disguised as image
                  value:
                    success: false
                    error:
                      code: "INVALID_IMAGE"
                      message: "invalid or corrupted image file: bad request"
                      details: {}
                file_too_large:
                  summary: File exceeds size limit
                  value:
                    success: false
                    error:
                      code: "FILE_TOO_LARGE"
                      message: "File size exceeds 5MB limit"
                      details: {}
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_auth:
                  summary: Missing Authorization header
                  value:
                    success: false
                    error:
                      code: "UNAUTHORIZED"
                      message: "Missing or invalid authentication"
                      details: {}
        '503':
          description: IPFS service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ipfs_unavailable:
                  summary: IPFS upload failed
                  value:
                    success: false
                    error:
                      code: "IPFS_UPLOAD_FAILED"
                      message: "Failed to upload to IPFS"
                      details: {}

  /api/v1/videos/{id}/stream:
    get:
      tags:
        - Videos
      summary: Stream video as HLS playlist
      description: Returns an HLS playlist for the requested video ID at the desired quality. If no quality is provided, the default quality is used.
      operationId: streamVideo
      security: []
      parameters:
        - in: path
          name: id
          required: true
          description: Video ID (UUID)
          schema:
            type: string
            format: uuid
        - in: query
          name: quality
          required: false
          description: Desired stream quality label
          schema:
            type: string
            enum: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
      responses:
        '200':
          description: HLS playlist
          content:
