      description: Unlock E2EE session with password (15-minute timeout)
      operationId: unlockE2EE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/E2EEUnlockRequest'
            examples:
              unlock:
