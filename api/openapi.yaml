      tags:
        - Uploads
      summary: Upload chunk
      description: Upload a chunk for an active session
      operationId: uploadChunk
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
