          type: string
          format: uri
          maxLength: 200

    # E2EE Schemas (true client-side encryption model — server is ciphertext transport only)
    RegisterIdentityKeyRequest:
      type: object
      description: >
        Register the caller's long-term identity key bundle. Keys are generated
        client-side; the server stores only public material.
      properties:
        public_identity_key:
          type: string
          description: Base64-encoded X25519 public identity key (client-generated)
          maxLength: 256
        public_signing_key:
          type: string
          description: Base64-encoded Ed25519 public signing key (client-generated)
          maxLength: 256
      required:
        - public_identity_key
        - public_signing_key

    PublicKeyBundle:
      type: object
      description: Public key material for a user, returned by GET /api/v1/e2ee/keys/{userId}
      properties:
        public_identity_key:
          type: string
          description: Base64-encoded X25519 public identity key
        public_signing_key:
          type: string
          description: Base64-encoded Ed25519 public signing key
        key_version:
          type: integer
          description: Monotonically increasing version, incremented on each key rotation
          example: 1
      required:
        - public_identity_key
        - public_signing_key
        - key_version

    E2EEStatusResponse:
      type: object
      description: E2EE status for the authenticated user
      properties:
        has_identity_key:
          type: boolean
          description: Whether the user has registered an identity key
        key_version:
          type: integer
          description: Current key version (0 if no key registered)
          example: 1
        last_key_rotation:
          type: string
          format: date-time
          description: Timestamp of the last key rotation (omitted if no key registered)
          nullable: true

    InitiateKeyExchangeRequest:
      type: object
      description: >
        Sender initiates an out-of-band key exchange by uploading their ephemeral
        public key. The server relays this to the recipient without decrypting it.
      properties:
        recipient_id:
          type: string
          format: uuid
          description: UUID of the user to exchange keys with
        sender_public_key:
          type: string
          description: Base64-encoded ephemeral X25519 public key for this session
          maxLength: 256
      required:
        - recipient_id
        - sender_public_key

    AcceptKeyExchangeRequest:
      type: object
      description: >
        Recipient accepts a pending key exchange by uploading their own ephemeral
        public key. Both sides then derive the shared secret independently on their
        devices.
      properties:
        key_exchange_id:
          type: string
          format: uuid
          description: ID of the pending key exchange to accept
        public_key:
          type: string
          description: Base64-encoded ephemeral X25519 public key of the accepting party
          maxLength: 256
      required:
        - key_exchange_id
        - public_key

    KeyExchangeMessage:
      type: object
      description: A single key exchange relay record stored by the server
      properties:
        id:
          type: string
          format: uuid
          description: Unique key exchange record ID
        conversation_id:
          type: string
          format: uuid
          description: Conversation this key exchange belongs to
        sender_id:
          type: string
          format: uuid
          description: User who initiated the key exchange
        recipient_id:
          type: string
          format: uuid
          description: User who should respond to the key exchange
        exchange_type:
          type: string
          enum: [offer, accept, confirm]
          description: Stage of the key exchange handshake
        public_key:
          type: string
          description: Base64-encoded ephemeral public key for this exchange step
        signature:
          type: string
          description: Base64-encoded signature over the public key
        nonce:
          type: string
          description: Base64-encoded random nonce for this exchange step
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          description: After this time the offer expires and must be re-initiated
      required:
        - id
        - conversation_id
        - sender_id
        - recipient_id
        - exchange_type
        - public_key
        - created_at
        - expires_at

    KeyExchangeResponse:
      type: object
      description: Response returned after initiating or accepting a key exchange
      properties:
        key_exchange:
          $ref: '#/components/schemas/KeyExchangeMessage'
        status:
          type: string
          description: Current status of the key exchange (e.g. "pending", "accepted")
          example: "pending"
      required:
        - key_exchange
        - status

    StoreEncryptedMessageRequest:
      type: object
      description: >
        Store a ciphertext message. All encryption happens client-side; the server
        never sees plaintext. `encrypted_content` is an opaque blob from the client.
      properties:
        recipient_id:
          type: string
          format: uuid
          description: UUID of the message recipient
        encrypted_content:
          type: string
          description: >
            Base64-encoded ciphertext produced by the client using the shared session
            key derived during key exchange. Server stores and relays without decrypting.
          maxLength: 8192
        content_nonce:
          type: string
          description: Base64-encoded nonce used when encrypting this message (required for decryption)
          maxLength: 128
        signature:
          type: string
          description: Base64-encoded Ed25519 signature over `encrypted_content + content_nonce`
          maxLength: 128
        parent_message_id:
          type: string
          format: uuid
          description: Optional ID of the message being replied to
          nullable: true
      required:
        - recipient_id
        - encrypted_content
        - content_nonce
        - signature

    # Video Category Schemas
    VideoCategory:
