openapi: 3.0.3
info:
  title: Athena PeerTube Backend API
  description: Authentication endpoints for Athena PeerTube backend in Go
  version: 1.0.0
  contact:
    name: Athena Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.athena.example.com
    description: Production server

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with username, email, and password
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid_registration:
                summary: Valid registration request
                value:
                  username: "johndoe"
                  email: "john@example.com"
                  password: "securepassword123"
                  display_name: "John Doe"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                successful_registration:
                  summary: Successful registration response
                  value:
                    user:
                      id: "user20240101120000"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_in: 900
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    error:
                      code: "MISSING_FIELDS"
                      message: "Username, email, and password are required"
                      details: {}
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login with email and password to receive access and refresh tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid_login:
                summary: Valid login request
                value:
                  email: "john@example.com"
                  password: "securepassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use refresh token to get a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              valid_refresh:
                summary: Valid refresh token request
                value:
                  refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate user session and tokens
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the service is alive
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Check if the service is ready to handle requests
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/qualities:
    get:
      tags:
        - Videos
      summary: Get supported video qualities
      description: Returns the list of supported quality labels and the default quality used for streaming.
      operationId: getSupportedQualities
      security: []
      responses:
        '200':
          description: Supported qualities returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedQualitiesResponse'
              examples:
                example:
                  summary: Supported qualities
                  value:
                    success: true
                    data:
                      qualities: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
                      default: "720p"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos:
    get:
      tags:
        - Videos
      summary: List videos
      description: Returns a paginated list of public videos with optional filters.
      operationId: listVideos
      security: []
      parameters:
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: language
          required: false
          schema: { type: string }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [title, views, upload_date, duration]
          description: Sort field (defaults to upload_date)
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order (defaults to desc)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: List of videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/search:
    get:
      tags:
        - Videos
      summary: Search videos
      description: Full-text search over public, completed videos with optional filters and relevance sorting.
      operationId: searchVideos
      security: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
          description: Search query string
        - in: query
          name: tags
          required: false
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: Optional tags to filter by (repeatable)
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: language
          required: false
          schema: { type: string }
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [relevance, title, views, upload_date, duration]
          description: Sort field (use relevance with a search query)
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order (defaults to desc)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '400':
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/videos/{id}:
    get:
      tags:
        - Videos
      summary: Get video by ID
      description: Returns a single video by its ID.
      operationId: getVideo
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Video found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideoResponse'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/avatar:
    post:
      tags:
        - Users
      summary: Upload user avatar
      description: |
        Uploads a user avatar image with comprehensive format support and security validation.
        
        **Supported Formats:**
        - PNG - Standard format with WebP conversion
        - JPEG/JPG - Standard format with WebP conversion  
        - WebP - Modern format (direct upload, no conversion needed)
        - HEIC/HEIF - Apple format with special file signature validation
        - GIF - Animation-capable format with WebP conversion
        - TIFF/TIF - High-quality format with WebP conversion
        
        **Security Features:**
        - Extension validation (only image extensions allowed)
        - MIME type verification via Content-Type header
        - File content validation through image decoding
        - HEIC special handling via file signature detection
        - Executable file detection and rejection
        - 5MB file size limit
        
        **Processing:**
        - Original image stored and uploaded to IPFS
        - WebP optimization automatically generated (except for WebP uploads)
        - Both original and WebP versions pinned in IPFS
        - User record updated with IPFS content identifiers
        
        Response includes an avatar object with fields:
        - id (UUID)
        - ipfs_cid (original)
        - webp_ipfs_cid (optimized)
      operationId: uploadUserAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Avatar image file. Must be a valid image in one of the supported formats:
                    PNG, JPEG, WebP, HEIC, GIF, or TIFF. Maximum size: 5MB.
              required: [file]
            examples:
              png_upload:
                summary: PNG image upload
                value:
                  file: "(binary PNG data)"
              jpeg_upload:
                summary: JPEG image upload  
                value:
                  file: "(binary JPEG data)"
              webp_upload:
                summary: WebP image upload
                value:
                  file: "(binary WebP data)"
              heic_upload:
                summary: HEIC image upload (Apple format)
                value:
                  file: "(binary HEIC data)"
              gif_upload:
                summary: GIF image upload
                value:
                  file: "(binary GIF data)"
              tiff_upload:
                summary: TIFF image upload
                value:
                  file: "(binary TIFF data)"
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUserResponse'
              examples:
                successful_upload:
                  summary: Successful avatar upload
                  value:
                    success: true
                    data:
                      id: "user-123"
                      username: "johndoe"
                      email: "john@example.com"
                      display_name: "John Doe"
                      avatar:
                        id: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
                        ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
                        webp_ipfs_cid: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"
                      bio: null
                      bitcoin_wallet: null
                      role: "user"
                      is_active: true
                      created_at: "2024-01-01T12:00:00Z"
                      updated_at: "2024-01-01T12:00:00Z"
        '400':
          description: Invalid request, unsupported format, or corrupted file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_file:
                  summary: No file provided
                  value:
                    success: false
                    error:
                      code: "MISSING_FILE"
                      message: "Missing file field in form"
                      details: {}
                invalid_extension:
                  summary: Invalid file extension
                  value:
                    success: false
                    error:
                      code: "INVALID_FILE_EXTENSION" 
                      message: "invalid file extension: bad request"
                      details: {}
                unsupported_format:
                  summary: Unsupported image format
                  value:
                    success: false
                    error:
                      code: "UNSUPPORTED_FORMAT"
                      message: "unsupported image format: bad request"
                      details: {}
                corrupted_image:
                  summary: Invalid or corrupted image file
                  value:
                    success: false
                    error:
                      code: "INVALID_IMAGE"
                      message: "invalid or corrupted image file: bad request"
                      details: {}
                malicious_file:
                  summary: Executable file disguised as image
                  value:
                    success: false
                    error:
                      code: "INVALID_IMAGE"
                      message: "invalid or corrupted image file: bad request"
                      details: {}
                file_too_large:
                  summary: File exceeds size limit
                  value:
                    success: false
                    error:
                      code: "FILE_TOO_LARGE"
                      message: "File size exceeds 5MB limit"
                      details: {}
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_auth:
                  summary: Missing Authorization header
                  value:
                    success: false
                    error:
                      code: "UNAUTHORIZED"
                      message: "Missing or invalid authentication"
                      details: {}
        '503':
          description: IPFS service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ipfs_unavailable:
                  summary: IPFS upload failed
                  value:
                    success: false
                    error:
                      code: "IPFS_UPLOAD_FAILED"
                      message: "Failed to upload to IPFS"
                      details: {}

  /api/v1/videos/{id}/stream:
    get:
      tags:
        - Videos
      summary: Stream video as HLS playlist
      description: Returns an HLS playlist for the requested video ID at the desired quality. If no quality is provided, the default quality is used.
      operationId: streamVideo
      security: []
      parameters:
        - in: path
          name: id
          required: true
          description: Video ID (UUID)
          schema:
            type: string
            format: uuid
        - in: query
          name: quality
          required: false
          description: Desired stream quality label
          schema:
            type: string
            enum: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
      responses:
        '200':
          description: HLS playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
              examples:
                hls:
                  summary: Sample HLS playlist
                  value: |
                    #EXTM3U
                    #EXT-X-VERSION:3
                    # QUALITY:720p
                    #EXT-X-TARGETDURATION:10
                    #EXT-X-MEDIA-SEQUENCE:0
                    #EXTINF:10.0,
                    segment-00000.ts
                    #EXTINF:10.0,
                    segment-00001.ts
                    #EXTINF:10.0,
                    segment-00002.ts
                    #EXT-X-ENDLIST
        '400':
          description: Invalid quality parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/encoding/status:
    get:
      tags:
        - Encoding
      summary: Get encoding job status counts
      description: Returns counts of encoding jobs by status and scheduler info if enabled.
      operationId: getEncodingStatus
      security: []
      responses:
        '200':
          description: Status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedEncodingStatusResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/uploads/initiate:
    post:
      tags:
        - Uploads
      summary: Initiate chunked upload
      description: Creates an upload session for a new video and returns session parameters.
      operationId: initiateUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateUploadRequest'
      responses:
        '201':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedInitiateUploadResponse'
        '400': { description: Invalid request, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/uploads/{sessionId}/chunks:
    post:
      tags:
        - Uploads
      summary: Upload a chunk
      description: Uploads a single chunk for the given session. Supports checksum validation.
      operationId: uploadChunk
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: X-Chunk-Index
          required: true
          schema: { type: integer, minimum: 0 }
        - in: header
          name: X-Chunk-Checksum
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Chunk accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedChunkUploadResponse'
        '400': { description: Invalid request, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/uploads/{sessionId}/complete:
    post:
      tags:
        - Uploads
      summary: Complete upload
      description: Marks the upload session as complete, assembles the file, and queues encoding.
      operationId: completeUpload
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Upload completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedCompleteUploadResponse'
        '400': { description: Invalid request, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/uploads/{sessionId}/status:
    get:
      tags:
        - Uploads
      summary: Get upload status
      operationId: getUploadStatus
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUploadSessionResponse'
        '400': { description: Invalid request, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/uploads/{sessionId}/resume:
    get:
      tags:
        - Uploads
      summary: Get resume info
      operationId: getUploadResume
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Resume info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUploadResumeResponse'
        '400': { description: Invalid request, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/users/me/pgp:
    post:
      tags: [Users]
      summary: Set current user's PGP public key
      operationId: setPGPKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetPGPKeyRequest' }
      responses:
        '200':
          description: PGP key set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WrappedStatusResponse' }
              examples:
                ok:
                  value:
                    success: true
                    data:
                      status: ok
        '400': { description: Invalid key, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetPGPKeyRequest' }
            examples:
              example:
                summary: Example PGP public key
                value:
                  pgp_public_key: |
                    -----BEGIN PGP PUBLIC KEY BLOCK-----
                    ...
                    -----END PGP PUBLIC KEY BLOCK-----
    delete:
      tags: [Users]
      summary: Remove current user's PGP key
      operationId: removePGPKey
      responses:
        '200': { description: Removed, content: { application/json: { schema: { $ref: '#/components/schemas/WrappedStatusResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/users/{id}/pgp:
    get:
      tags: [Users]
      summary: Get user's PGP key status
      operationId: getUserPGP
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WrappedPGPKeyResponse' }
              examples:
                has_key:
                  summary: User has a PGP key
                  value:
                    success: true
                    data:
                      has_pgp_key: true
                      pgp_public_key: "-----BEGIN PGP PUBLIC KEY BLOCK-----..."
                      pgp_fingerprint: "ABCD 1234 EFGH 5678 ..."
                no_key:
                  summary: User has no PGP key
                  value:
                    success: true
                    data:
                      has_pgp_key: false
        '404': { description: User not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/messages:
    get:
      tags: [Messages]
      summary: Get messages in a conversation
      description: Retrieve messages between the authenticated user and another user
      operationId: getMessages
      parameters:
        - in: query
          name: conversation_with
          required: true
          schema: { type: string, format: uuid }
          description: ID of the user to get conversation with
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Number of messages to return
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Number of messages to skip
        - in: query
          name: before
          required: false
          schema: { type: string, format: uuid }
          description: Get messages before this message ID
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessagesResponse' }
              examples:
                regular_conversation:
                  summary: Regular conversation messages
