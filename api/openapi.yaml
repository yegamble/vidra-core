components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  schemas:
    OAuthClient:
      type: object
      properties:
        id: { type: string, format: uuid }
        client_id: { type: string }
        name: { type: string }
        grant_types: { type: array, items: { type: string } }
        scopes: { type: array, items: { type: string } }
        redirect_uris: { type: array, items: { type: string } }
        is_confidential: { type: boolean }
      required: [id, client_id, name, grant_types, scopes, redirect_uris, is_confidential]

    CreateOAuthClientRequest:
      type: object
      properties:
        client_id: { type: string }
        client_secret: { type: string, description: Required for confidential clients }
        name: { type: string }
        grant_types: { type: array, items: { type: string }, default: [password, refresh_token] }
        scopes: { type: array, items: { type: string }, default: [basic] }
        redirect_uris: { type: array, items: { type: string }, default: [] }
        is_confidential: { type: boolean, default: true }
      required: [client_id, name]
    RotateOAuthClientSecretRequest:
      type: object
      properties:
        client_secret: { type: string, description: Required if is_confidential=true }
        is_confidential: { type: boolean, default: true }
    ListMeta:
      type: object
      properties:
        total: { type: integer, format: int64 }
        limit: { type: integer }
        offset: { type: integer }
        page: { type: integer, nullable: true }
        pageSize: { type: integer, nullable: true }
      required: [total, limit, offset]

    Video:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thumbnail_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
        views:
          type: integer
          format: int64
        privacy:
          type: string
          enum: [public, unlisted, private]
        status:
          type: string
          enum: [uploading, queued, processing, completed, failed]
        upload_date:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        tags:
          type: array
          items: { type: string }
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the video category
        category:
          $ref: '#/components/schemas/VideoCategory'
          nullable: true
          description: Category details (when included)
        language:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - thumbnail_id
        - title
        - privacy
        - status
        - upload_date
        - user_id
        - created_at
        - updated_at

    WrappedVideosResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]

    WrappedVideoResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Video'
        success:
          type: boolean
          example: true
      required: [data, success]
    QualitiesData:
      type: object
      properties:
        qualities:
          type: array
          description: Supported quality labels (ascending by height)
          items:
            type: string
            enum: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
          example: ["240p","360p","480p","720p","1080p","1440p","2160p","4320p"]
        default:
          type: string
          description: Default stream quality
          example: "720p"
      required: [qualities, default]

    WrappedQualitiesResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QualitiesData'
        success:
          type: boolean
          example: true
      required: [data]
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique user identifier
          example: "user123"
        username:
          type: string
          description: Username (unique)
          example: "johndoe"
        email:
          type: string
          format: email
          description: User email address
          example: "john@example.com"
        display_name:
          type: string
          description: User's display name
          example: "John Doe"
        avatar:
          $ref: '#/components/schemas/Avatar'
        bio:
          type: string
          description: User biography
          example: "Software developer and video enthusiast"
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
          description: Whether the user account is active
          example: true
        subscriber_count:
          type: integer
          format: int64
          description: Number of subscribers to this user (channel)
          example: 42
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
          example: "2024-01-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last account update timestamp
          example: "2024-01-01T12:00:00Z"
      required:
        - id
        - username
        - email
        - role
        - is_active
        - subscriber_count
        - created_at
        - updated_at

    Avatar:
      type: object
      description: User avatar metadata
      properties:
        id:
          type: string
          format: uuid
          description: Avatar UUID
          example: "3b94528c-7a2f-4d9b-9b8d-2d90d3f5a111"
        ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the original avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0x"
        webp_ipfs_cid:
          type: string
          nullable: true
          description: IPFS CID for the WebP-optimized avatar image
          example: "bafybeigdyrzt5n3q4h7v6s6l4xgk7g6v7m3kz7l2o3q4r5s6t7u8v9w0y"

    UserRole:
      type: string
      enum:
        - user
        - admin
        - moderator
      description: User role determining permissions
      example: "user"

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          description: User's password
          example: "securepassword123"
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Unique username
          example: "johndoe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          description: User's password
          example: "securepassword123"
        display_name:
          type: string
          maxLength: 100
          description: User's display name
          example: "John Doe"
      required:
        - username
        - email
        - password

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      required:
        - refresh_token

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          example: 900
      required:
        - user
        - access_token
        - refresh_token
        - expires_in

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: New JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: New JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          example: 900
      required:
        - access_token
        - refresh_token
        - expires_in

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          description: Logout success message
          example: "Logged out successfully"
        user_id:
          type: string
          description: ID of the logged out user
          example: "user123"
      required:
        - message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["healthy"]
          example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
      required:
        - status
        - timestamp

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["ready", "not_ready"]
          example: "ready"
        checks:
          type: object
          properties:
            database:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
            redis:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
            ipfs:
              type: string
              enum: ["healthy", "unhealthy"]
              example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
      required:
        - status
        - checks
        - timestamp

    WrappedUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        success:
          type: boolean
          example: true
      required:
        - data
        - success

    WrappedUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required: [data, meta, success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code identifier
              example: "INVALID_CREDENTIALS"
            message:
              type: string
              description: Human-readable error message
              example: "Invalid email or password"
            details:
              type: object
              additionalProperties: true
              description: Additional error details
              example: {}
          required:
            - code
            - message
            - details
        success:
          type: boolean
          example: false
      required:
        - error
        - success
    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 900
        refresh_token:
          type: string
        scope:
          type: string

    # Message Schemas
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Message unique identifier
        sender_id:
          type: string
          format: uuid
          description: Sender user ID
        recipient_id:
          type: string
          format: uuid
          description: Recipient user ID
        content:
          type: string
          description: Message content (null for encrypted messages)
          nullable: true
        encrypted_content:
          type: string
          description: Encrypted message content (null for standard messages)
          nullable: true
        content_nonce:
          type: string
          description: Encryption nonce (for encrypted messages)
          nullable: true
        pgp_signature:
          type: string
          description: Ed25519 signature (for encrypted messages)
          nullable: true
        is_encrypted:
          type: boolean
          description: Whether message is end-to-end encrypted
        encryption_version:
          type: integer
          description: Encryption version used
          minimum: 0
        is_read:
          type: boolean
          description: Whether message has been read by recipient
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - sender_id
        - recipient_id
        - is_encrypted
        - encryption_version
        - is_read
        - created_at
        - updated_at

    Conversation:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          description: Other user in conversation
        user_username:
          type: string
          description: Other user's username
        user_display_name:
          type: string
          description: Other user's display name
        last_message:
          $ref: '#/components/schemas/Message'
        unread_count:
          type: integer
          description: Number of unread messages
          minimum: 0
        last_activity:
          type: string
          format: date-time
      required:
        - user_id
        - user_username
        - user_display_name
        - last_message
        - unread_count
        - last_activity

    SendMessageRequest:
      type: object
      properties:
        recipient_id:
          type: string
          format: uuid
          description: Recipient user ID
        content:
          type: string
          description: Message content
          minLength: 1
          maxLength: 10000
      required:
        - recipient_id
        - content

    MessageResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Message'
        success:
          type: boolean
          example: true
      required:
        - data
        - success

    MessagesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required:
        - data
        - meta
        - success

    ConversationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        meta:
          $ref: '#/components/schemas/ListMeta'
        success:
          type: boolean
          example: true
      required:
        - data
        - meta
        - success

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
        success:
          type: boolean
          example: true
      required:
        - message
        - success

    # Request/Response Schemas for new endpoints
    CreateVideoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, private, unlisted]
          default: public
        tags:
          type: array
          items:
            type: string
          maxItems: 10
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the video category
        language:
          type: string
      required:
        - title

    UpdateVideoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, private, unlisted]
        tags:
          type: array
          items:
            type: string
          maxItems: 10
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the video category
        language:
          type: string

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          maxLength: 100
        role:
          type: string
          enum: [user, admin]
          default: user
      required:
        - username
        - email
        - password

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 100
        bio:
          type: string
          maxLength: 1000
        website:
          type: string
          format: uri
          maxLength: 200

    # E2EE Schemas
    E2EESetupRequest:
      type: object
      properties:
        password:
          type: string
          description: Master password for E2EE key derivation
          minLength: 8
          maxLength: 128
      required:
        - password

    E2EESetupResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "E2EE setup completed successfully"
        public_key:
          type: string
          description: Base64-encoded X25519 public key for key exchange
        signing_public_key:
          type: string
          description: Base64-encoded Ed25519 public key for signatures
        success:
          type: boolean
          example: true
      required:
        - message
        - public_key
        - signing_public_key
        - success

    E2EEUnlockRequest:
      type: object
      properties:
        password:
          type: string
          description: Master password to unlock E2EE session
          minLength: 8
          maxLength: 128
      required:
        - password

    E2EEUnlockResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "E2EE session unlocked"
        expires_at:
          type: string
          format: date-time
          description: When the unlocked session expires
        success:
          type: boolean
          example: true
      required:
        - message
        - expires_at
        - success

    KeyExchangeRequest:
      type: object
      properties:
        recipient_id:
          type: string
          format: uuid
          description: Recipient user ID to exchange keys with
      required:
        - recipient_id

    KeyExchangeResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: "Key exchange completed"
        conversation_id:
          type: string
          format: uuid
          description: Conversation ID for the key exchange
        success:
          type: boolean
          example: true
      required:
        - message
        - conversation_id
        - success

    SecureMessageRequest:
      type: object
      properties:
        recipient_id:
          type: string
          format: uuid
          description: Recipient user ID
        encrypted_content:
          type: string
          description: Client-side encrypted message content
          minLength: 1
        pgp_signature:
          type: string
          description: Base64-encoded Ed25519 signature of the message
          minLength: 1
      required:
        - recipient_id
        - encrypted_content
        - pgp_signature

    # Video Category Schemas
    VideoCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique category identifier
        name:
          type: string
          description: Display name of the category
          example: "Music"
        slug:
          type: string
          description: URL-friendly slug for the category
          example: "music"
        description:
          type: string
          nullable: true
          description: Detailed description of the category
          example: "Music videos, concerts, and audio content"
        icon:
          type: string
          nullable: true
          description: Icon emoji or class name for UI display
          example: "🎵"
        color:
          type: string
          nullable: true
          description: Hex color code for UI theming
          example: "#FF0000"
        display_order:
          type: integer
          description: Sort order for display
          example: 1
        is_active:
          type: boolean
          description: Whether the category is active
          example: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        created_by:
          type: string
          format: uuid
          nullable: true
          description: ID of the admin who created this category
      required:
        - id
        - name
        - slug
        - display_order
        - is_active
        - created_at
        - updated_at

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Display name of the category
          example: "Music"
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9-]+$'
          description: URL-friendly slug (lowercase letters, numbers, hyphens)
          example: "music"
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Detailed description of the category
          example: "Music videos, concerts, and audio content"
        icon:
          type: string
          maxLength: 50
          nullable: true
          description: Icon emoji or class name
          example: "🎵"
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$'
          nullable: true
          description: Hex color code
          example: "#FF0000"
        display_order:
          type: integer
          minimum: 0
          default: 0
          description: Sort order for display
          example: 1
        is_active:
          type: boolean
          default: true
          description: Whether the category is active
          example: true
      required:
        - name
        - slug

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: Display name of the category
          example: "Music & Audio"
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9-]+$'
          nullable: true
          description: URL-friendly slug
          example: "music-audio"
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Detailed description
          example: "All music and audio content"
        icon:
          type: string
          maxLength: 50
          nullable: true
          description: Icon emoji or class name
          example: "🎶"
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$'
          nullable: true
          description: Hex color code
          example: "#FF6600"
        display_order:
          type: integer
          minimum: 0
          nullable: true
          description: Sort order for display
          example: 2
        is_active:
          type: boolean
          nullable: true
          description: Whether the category is active
          example: false
