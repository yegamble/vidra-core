      responses:
        '200':
          description: Key exchange successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyExchangeResponse'
              examples:
                success:
                  summary: Key exchange success
                  value:
                    message: "Key exchange completed"
                    conversation_id: "660f9500-f39c-52e5-b827-557766551111"
        '400':
          description: Invalid request or E2EE session locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

