      responses:
        '200':
          description: List of videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedVideosResponse'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/views/history:
    get:
      tags: [Views]
      summary: Get view history
      description: Returns the authenticated user's view history with optional filtering. Admins can view any user's history via user_id parameter.
      operationId: getViewHistory
      parameters:
        - in: query
          name: video_id
          required: false
          schema: { type: string, format: uuid }
          description: Filter by video ID
        - in: query
          name: user_id
          required: false
          schema: { type: string, format: uuid }
          description: Filter by user ID (admin only for other users)
        - in: query
          name: start_date
          required: false
          schema: { type: string, format: date }
          description: Start date filter (YYYY-MM-DD)
        - in: query
          name: end_date
          required: false
          schema: { type: string, format: date }
          description: End date filter (YYYY-MM-DD)
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
          description: Number of records to return
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Number of records to skip
      responses:
        '200':
          description: View history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      views:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            user_id: { type: string, format: uuid }
                            video_id: { type: string, format: uuid }
                            created_at: { type: string, format: date-time }
                      count:
                        type: integer
                        description: Number of view records returned
                  success: { type: boolean, example: true }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - cannot access another user's history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/notification-preferences:
