        '404': { description: Recipient not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/messages/{messageId}:
    put:
      tags: [Messages]
      summary: Mark message as read
      description: Mark a specific message as read by the authenticated user
      operationId: markMessageRead
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string, format: uuid }
          description: ID of the message to mark as read
      responses:
        '200': { description: Message marked as read, content: { application/json: { schema: { $ref: '#/components/schemas/WrappedStatusResponse' } } } }
        '400': { description: Invalid message ID, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '404': { description: Message not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
    delete:
      tags: [Messages]
      summary: Delete a message
      description: Delete a message (soft delete - only for the authenticated user)
      operationId: deleteMessage
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string, format: uuid }
          description: ID of the message to delete
      responses:
        '200': { description: Message deleted, content: { application/json: { schema: { $ref: '#/components/schemas/WrappedStatusResponse' } } } }
        '400': { description: Invalid message ID, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '404': { description: Message not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/messages/secure:
    post:
      tags: [Messages]
      summary: Send secure message (PGP encrypted)
      operationId: sendSecureMessage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendSecureMessageRequest' }
            examples:
              example:
                summary: Secure message
                value:
                  recipient_id: "123e4567-e89b-12d3-a456-426614174000"
                  encrypted_content: "-----BEGIN PGP MESSAGE-----..."
                  pgp_signature: "-----BEGIN PGP SIGNATURE-----..."
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WrappedMessageResponse' }
              examples:
                example:
                  value:
                    success: true
                    data:
                      id: "msg-123e4567-e89b-12d3-a456-426614174000"
                      sender_id: "123e4567-e89b-12d3-a456-426614174000"
                      recipient_id: "123e4567-e89b-12d3-a456-426614174001"
                      encrypted_content: "-----BEGIN PGP MESSAGE-----..."
                      pgp_signature: "-----BEGIN PGP SIGNATURE-----..."
                      conversation_id: "conv-123e4567-e89b-12d3-a456-426614174001"
                      message_type: "text",
                      is_read: false,
                      is_secure: true,
                      created_at: "2024-01-01T12:00:00Z"
        '400': { description: Invalid request or secure mode not allowed, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /api/v1/conversations:
    get:
      tags: [Messages]
      summary: Get user conversations
      description: Retrieve all conversations for the authenticated user
      operationId: getConversations
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
          description: Number of conversations to return
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Number of conversations to skip
      responses:
        '200':
          description: Conversations retrieved successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationsResponse' }
              examples:
                example:
                  value:
                    conversations: [
                      {
                        id: "conv-123e4567-e89b-12d3-a456-426614174000",
                        participant_one_id: "user-123e4567-e89b-12d3-a456-426614174000",
