  /api/v1/admin/users:
    get:
      tags: [Admin, Users]
      summary: List all users (admin)
      description: Admin-only endpoint to list all users with search, filtering, and pagination.
      operationId: adminListUsers
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Number of users to return
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Number of users to skip
        - in: query
          name: search
          required: false
          schema: { type: string }
          description: Search by username or email
        - in: query
          name: role
          required: false
          schema: { type: string, enum: [user, moderator, admin] }
          description: Filter by role
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUsersResponse'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/users/{id}:
    put:
      tags: [Admin, Users]
      summary: Update user (admin)
      description: Admin-only endpoint to update a user's role or active status.
      operationId: adminUpdateUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [user, moderator, admin]
                  description: New role for the user
                is_active:
                  type: boolean
                  description: Whether the user account is active
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedUserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/videos:
    get:
      tags: [Admin, Videos]
      summary: List all videos (admin)
      description: Admin-only endpoint to list all videos with search and pagination.
      operationId: adminListVideos
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Number of videos to return
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Number of videos to skip
        - in: query
          name: search
          required: false
          schema: { type: string }
