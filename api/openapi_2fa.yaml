openapi: 3.0.3
info:
  title: Athena - Two-Factor Authentication API
  description: |
    Two-Factor Authentication (2FA) management endpoints for Athena video platform.
    All endpoints require authentication via JWT token.
  version: 1.0.0
  contact:
    name: Athena Support
    email: support@athena.example

servers:
  - url: /api/v1
    description: API v1

paths:
  /auth/2fa/setup:
    post:
      summary: Initiate 2FA setup
      description: |
        Generates a new TOTP secret and backup codes for the authenticated user.
        Returns the secret as both a QR code URI and a base32-encoded string for manual entry.
      operationId: setupTwoFA
      tags:
        - Two-Factor Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA setup initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFASetupResponse'
              example:
                secret: "JBSWY3DPEHPK3PXP"
                qr_code_uri: "otpauth://totp/Athena:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Athena"
                backup_codes:
                  - "12345678"
                  - "23456789"
                  - "34567890"
                  - "45678901"
                  - "56789012"
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Missing or invalid authentication"
        '409':
          description: Conflict - 2FA is already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "TWOFA_ALREADY_ENABLED"
                message: "Two-factor authentication is already enabled"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_ERROR"
                message: "Failed to setup two-factor authentication"

  /auth/2fa/verify-setup:
    post:
      summary: Verify and enable 2FA
      description: |
        Verifies the TOTP code from the user's authenticator app and enables 2FA.
        Must be called after /auth/2fa/setup to complete the setup process.
      operationId: verifyTwoFASetup
      tags:
        - Two-Factor Authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFAVerifySetupRequest'
            example:
              code: "123456"
      responses:
        '200':
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFAVerifySetupResponse'
              example:
                enabled: true
        '400':
          description: Bad request - invalid or missing code, or setup incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    error: "INVALID_CODE"
                    message: "Invalid two-factor authentication code"
                missingCode:
                  value:
                    error: "MISSING_CODE"
                    message: "Two-factor authentication code is required"
                setupIncomplete:
                  value:
                    error: "TWOFA_SETUP_INCOMPLETE"
                    message: "Two-factor authentication setup is incomplete. Please restart the setup process."
                invalidJson:
                  value:
                    error: "INVALID_JSON"
                    message: "Invalid JSON payload"
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Missing or invalid authentication"
        '409':
          description: Conflict - 2FA is already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "TWOFA_ALREADY_ENABLED"
                message: "Two-factor authentication is already enabled"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_ERROR"
                message: "Failed to verify two-factor authentication"

  /auth/2fa/disable:
    post:
      summary: Disable 2FA
      description: |
        Disables two-factor authentication for the authenticated user.
        Requires both the user's password and a valid 2FA code (or backup code) for security.
      operationId: disableTwoFA
      tags:
        - Two-Factor Authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFADisableRequest'
            example:
              password: "mySecurePassword123"
              code: "123456"
      responses:
        '200':
          description: 2FA disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFADisableResponse'
              example:
                disabled: true
        '400':
          description: Bad request - invalid code, missing fields, or 2FA not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    error: "INVALID_CODE"
                    message: "Invalid two-factor authentication code"
                missingFields:
                  value:
                    error: "MISSING_FIELDS"
                    message: "Password and two-factor code are required"
                notEnabled:
                  value:
                    error: "TWOFA_NOT_ENABLED"
                    message: "Two-factor authentication is not enabled"
                invalidJson:
                  value:
                    error: "INVALID_JSON"
                    message: "Invalid JSON payload"
        '401':
          description: Unauthorized - missing/invalid auth token or invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: "UNAUTHORIZED"
                    message: "Missing or invalid authentication"
                invalidPassword:
                  value:
                    error: "INVALID_PASSWORD"
                    message: "Invalid password"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_ERROR"
                message: "Failed to disable two-factor authentication"

  /auth/2fa/regenerate-backup-codes:
    post:
      summary: Regenerate backup codes
      description: |
        Generates a new set of backup codes for the authenticated user.
        Old backup codes will be invalidated. Requires a valid 2FA code.
      operationId: regenerateBackupCodes
      tags:
        - Two-Factor Authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFARegenerateBackupCodesRequest'
            example:
              code: "123456"
      responses:
        '200':
          description: Backup codes regenerated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFARegenerateBackupCodesResponse'
              example:
                backup_codes:
                  - "12345678"
                  - "23456789"
                  - "34567890"
                  - "45678901"
                  - "56789012"
        '400':
          description: Bad request - invalid or missing code, or 2FA not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    error: "INVALID_CODE"
                    message: "Invalid two-factor authentication code"
                missingCode:
                  value:
                    error: "MISSING_CODE"
                    message: "Two-factor authentication code is required"
                notEnabled:
                  value:
                    error: "TWOFA_NOT_ENABLED"
                    message: "Two-factor authentication is not enabled"
                invalidJson:
                  value:
                    error: "INVALID_JSON"
                    message: "Invalid JSON payload"
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Missing or invalid authentication"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_ERROR"
                message: "Failed to regenerate backup codes"

  /auth/2fa/status:
    get:
      summary: Get 2FA status
      description: |
        Returns the current two-factor authentication status for the authenticated user,
        including when 2FA was confirmed if it is enabled.
      operationId: getTwoFAStatus
      tags:
        - Two-Factor Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFAStatusResponse'
              examples:
                disabled:
                  summary: 2FA is disabled
                  value:
                    enabled: false
                enabled:
                  summary: 2FA is enabled
                  value:
                    enabled: true
                    confirmed_at: "2025-11-06T12:34:56Z"
        '401':
          description: Unauthorized - missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "UNAUTHORIZED"
                message: "Missing or invalid authentication"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "INTERNAL_ERROR"
                message: "Failed to get two-factor authentication status"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login

  schemas:
    TwoFASetupResponse:
      type: object
      required:
        - secret
        - qr_code_uri
        - backup_codes
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret for manual entry into authenticator apps
          example: "JBSWY3DPEHPK3PXP"
        qr_code_uri:
          type: string
          format: uri
          description: otpauth:// URI for generating QR codes
          example: "otpauth://totp/Athena:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Athena"
        backup_codes:
          type: array
          description: One-time backup codes (shown only once, store securely)
          items:
            type: string
          minItems: 5
          maxItems: 10
          example: ["12345678", "23456789", "34567890", "45678901", "56789012"]

    TwoFAVerifySetupRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: 6-digit TOTP code from authenticator app
          pattern: '^\d{6}$'
          minLength: 6
          maxLength: 6
          example: "123456"

    TwoFAVerifySetupResponse:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: Indicates that 2FA has been successfully enabled
          example: true

    TwoFADisableRequest:
      type: object
      required:
        - password
        - code
      properties:
        password:
          type: string
          description: User's account password for verification
          format: password
          minLength: 1
          example: "mySecurePassword123"
        code:
          type: string
          description: Current 6-digit TOTP code or backup code
          minLength: 6
          example: "123456"

    TwoFADisableResponse:
      type: object
      required:
        - disabled
      properties:
        disabled:
          type: boolean
          description: Indicates that 2FA has been successfully disabled
          example: true

    TwoFARegenerateBackupCodesRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: Current 6-digit TOTP code from authenticator app
          pattern: '^\d{6}$'
          minLength: 6
          maxLength: 6
          example: "123456"

    TwoFARegenerateBackupCodesResponse:
      type: object
      required:
        - backup_codes
      properties:
        backup_codes:
          type: array
          description: Newly generated backup codes
          items:
            type: string
          minItems: 5
          maxItems: 10
          example: ["12345678", "23456789", "34567890", "45678901", "56789012"]

    TwoFAStatusResponse:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: Whether 2FA is currently enabled for this user
          example: false
        confirmed_at:
          type: string
          format: date-time
          description: Timestamp when 2FA was confirmed and enabled (only present if enabled is true)
          example: "2025-11-06T12:34:56Z"

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: "INVALID_CODE"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid two-factor authentication code"

tags:
  - name: Two-Factor Authentication
    description: Endpoints for managing two-factor authentication (TOTP)
