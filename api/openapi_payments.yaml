openapi: 3.0.3
info:
  title: Athena IOTA Payments API
  description: IOTA cryptocurrency payment integration for Athena video platform
  version: 1.0.0
servers:
  - url: /api/v1
    description: API v1
tags:
  - name: payments
    description: IOTA payment wallet and transaction management
security:
  - bearerAuth: []

paths:
  /payments/wallet:
    post:
      tags:
        - payments
      summary: Create IOTA wallet
      description: Creates a new IOTA wallet for the authenticated user with encrypted seed storage
      operationId: createWallet
      responses:
        '201':
          description: Wallet created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IOTAWallet'
                  success: { type: boolean, example: true }
                required: [data, success]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Wallet already exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - payments
      summary: Get user wallet
      description: Retrieves the IOTA wallet for the authenticated user
      operationId: getWallet
      responses:
        '200':
          description: Wallet retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IOTAWallet'
                  success: { type: boolean, example: true }
                required: [data, success]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/intents:
    post:
      tags:
        - payments
      summary: Create payment intent
      description: Creates a new payment intent for video tips, subscriptions, or other payments
      operationId: createPaymentIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: Payment intent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IOTAPaymentIntent'
                  success: { type: boolean, example: true }
                required: [data, success]
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Referenced video was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/intents/{id}:
    get:
      tags:
        - payments
      summary: Get payment intent
      description: Retrieves a specific payment intent by ID
      operationId: getPaymentIntent
      parameters:
        - name: id
          in: path
          required: true
          description: Payment intent UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment intent retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IOTAPaymentIntent'
                  success: { type: boolean, example: true }
                required: [data, success]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Payment intent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/transactions:
    get:
      tags:
        - payments
      summary: Get transaction history
      description: Retrieves transaction history for the authenticated user's wallet
      operationId: getTransactionHistory
      parameters:
        - name: limit
          in: query
          description: Maximum number of transactions to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of transactions to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Transaction history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IOTATransaction'
                  success: { type: boolean, example: true }
                required: [data, success]
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/refresh

  schemas:
    IOTAWallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Wallet UUID
        user_id:
          type: string
          format: uuid
          description: User UUID
        address:
          type: string
          description: IOTA address for receiving payments
          example: "iota1qp..."
        balance_iota:
          type: integer
          format: int64
          description: Balance in IOTA base units (i)
          example: 1000000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - address
        - balance_iota

    CreatePaymentIntentRequest:
      type: object
      properties:
        video_id:
          type: string
          format: uuid
          description: Optional video UUID for video-specific payments (tips, PPV)
          nullable: true
        amount_iota:
          type: integer
          format: int64
          minimum: 1
          description: Payment amount in IOTA base units (i)
          example: 1000000
        metadata:
          type: object
          description: Optional metadata (product info, user notes)
          additionalProperties: true
      required:
        - amount_iota

    IOTAPaymentIntent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
          nullable: true
        amount_iota:
          type: integer
          format: int64
          description: Payment amount in IOTA base units
        payment_address:
          type: string
          description: IOTA address to send payment to
        status:
          type: string
          enum: [pending, paid, expired, refunded]
          description: Payment status
        expires_at:
          type: string
          format: date-time
          description: Payment intent expiration time
        paid_at:
          type: string
          format: date-time
          nullable: true
          description: Time when payment was confirmed
        transaction_id:
          type: string
          format: uuid
          nullable: true
          description: Associated transaction ID if paid
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - amount_iota
        - payment_address
        - status
        - expires_at

    IOTATransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        wallet_id:
          type: string
          format: uuid
          nullable: true
        transaction_hash:
          type: string
          description: IOTA blockchain transaction hash
        amount_iota:
          type: integer
          format: int64
          description: Transaction amount in IOTA base units
        tx_type:
          type: string
          enum: [deposit, withdrawal, payment]
          description: Transaction type
        status:
          type: string
          enum: [pending, confirmed, failed]
          description: Transaction status
        confirmations:
          type: integer
          description: Number of blockchain confirmations
        from_address:
          type: string
          nullable: true
          description: Sender IOTA address
        to_address:
          type: string
          nullable: true
          description: Recipient IOTA address
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - transaction_hash
        - amount_iota
        - tx_type
        - status
        - confirmations

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Error message
      required:
        - error

  responses:
    UnauthorizedError:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Authentication required"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "INTERNAL_SERVER_ERROR"
              message: "An unexpected error occurred"
