openapi: 3.0.3
info:
  title: Athena API - Video Passwords
  description: Endpoints for managing password-protected video access
  version: 1.0.0

tags:
  - name: Video Passwords
    description: Password protection for videos
  - name: PeerTube-Compat
    description: Endpoints intended to match PeerTube-style resource contracts.

paths:
  /api/v1/videos/{id}/passwords:
    get:
      tags:
        - Video Passwords
        - PeerTube-Compat
      summary: List video passwords
      description: List all passwords for a video. Only the video owner can view passwords.
      operationId: listVideoPasswords
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VideoId'
      responses:
        '200':
          description: List of video passwords
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoPasswordListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - not the video owner
    put:
      tags:
        - Video Passwords
        - PeerTube-Compat
      summary: Replace all video passwords
      description: Replace all passwords for a video with a new set.
      operationId: replaceVideoPasswords
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VideoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passwords
              properties:
                passwords:
                  type: array
                  items:
                    type: string
                  description: Plain-text passwords (will be bcrypt-hashed on storage)
      responses:
        '200':
          description: Passwords replaced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoPasswordListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      tags:
        - Video Passwords
        - PeerTube-Compat
      summary: Add a video password
      description: Add a single password to a video.
      operationId: addVideoPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VideoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  description: Plain-text password
      responses:
        '200':
          description: Password added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoPasswordResponse'
        '400':
          description: Bad request - missing password
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/videos/{id}/passwords/{passwordId}:
    delete:
      tags:
        - Video Passwords
        - PeerTube-Compat
      summary: Delete a video password
      description: Delete a specific password from a video.
      operationId: deleteVideoPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VideoId'
        - name: passwordId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Password deleted
        '400':
          description: Invalid password ID
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Password not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VideoId:
      name: id
      in: path
      required: true
      description: Video ID
      schema:
        type: string
  schemas:
    VideoPassword:
      type: object
      properties:
        id:
          type: integer
          format: int64
        videoId:
          type: string
        createdAt:
          type: string
          format: date-time
    VideoPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/VideoPassword'
    VideoPasswordListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/VideoPassword'
