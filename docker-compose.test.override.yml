version: '3.8'

services:
  app-test:
    image: golang:1.24
    working_dir: /app
    volumes:
      - ./:/app
    command: ["bash", "-lc", "apt-get update -y && apt-get install -y curl && go run ./cmd/server"]
    # healthcheck inherits from base; keep
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      ipfs-test:
        condition: service_started
    networks:
      - test-network
