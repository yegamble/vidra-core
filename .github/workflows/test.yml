name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write  # Required for golangci-lint-action annotations

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.9"
  GOPROXY: "https://proxy.golang.org,direct"  # Official Go proxy with direct fallback
  # Runner configuration: uses ubuntu-latest by default, falls back to self-hosted via vars.RUNNER
  DEFAULT_RUNNER: "ubuntu-latest"

jobs:
  # ============================================================================
  # FAST TESTS - Run in parallel
  # ============================================================================
  shell-tests:
    name: Shell Script Tests
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Run install.sh tests
        run: bash scripts/install_test.sh

      - name: Run nginx script tests
        run: bash nginx/scripts/nginx_test.sh

  unit:
    name: Unit Tests
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Run unit tests
        run: COVERAGE_OUT=coverage.out make test-unit

      - name: Enforce coverage baseline
        run: ./scripts/check-coverage-threshold.sh coverage.out 35.0

      - name: Enforce per-package coverage thresholds
        run: ./scripts/check-per-package-coverage.sh coverage.out

  lint:
    name: Code Quality (Lint & Format)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Check formatting
        run: |
          # Ensure GOPATH/bin is in PATH for installed tools
          export PATH="$(go env GOPATH)/bin:$PATH"

          # Use go list to get only actual Go source directories (excludes .git, vendor, etc.)
          UNFORMATTED=$(gofmt -l $(go list -f '{{.Dir}}' ./...) 2>/dev/null || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "Go files are not formatted. Run: gofmt -w ."
            echo "$UNFORMATTED"
            exit 1
          fi

          if ! command -v goimports &> /dev/null; then
            go install golang.org/x/tools/cmd/goimports@latest
          fi

          BADIMPORTS=$(goimports -l $(go list -f '{{.Dir}}' ./...) 2>/dev/null || true)
          if [ -n "$BADIMPORTS" ]; then
            echo "Go files have incorrect imports. Run: goimports -w ."
            echo "$BADIMPORTS"
            exit 1
          fi

      - name: Run golangci-lint (GitHub Actions)
        if: ${{ !env.ACT }}
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=10m
          skip-cache: false

      - name: Run golangci-lint (act local)
        if: ${{ env.ACT == 'true' }}
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          if ! command -v golangci-lint &> /dev/null; then
            echo "Installing golangci-lint via binary..."
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
              | sh -s -- -b "$(go env GOPATH)/bin"
          fi
          golangci-lint run --timeout=10m

  # ============================================================================
  # INTEGRATION TESTS - Run after unit tests pass
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [unit]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Start services with docker compose
        run: |
          # Start all CI services; wait only for critical ones (postgres, redis, ipfs).
          # ClamAV is started but not --wait'ed because it needs time to download
          # virus definitions on first run (no persistent volume in CI).
          docker compose --profile ci up -d postgres-ci redis-ci ipfs-ci clamav-ci
          echo "=== Waiting for postgres, redis, ipfs ==="
          docker compose --profile ci up -d --wait postgres-ci redis-ci ipfs-ci
          echo "=== Service status ==="
          docker compose --profile ci ps

      - name: Wait for ClamAV (best-effort)
        run: |
          echo "Waiting up to 120s for ClamAV..."
          for i in $(seq 1 60); do
            if docker compose --profile ci exec -T clamav-ci clamdscan --version >/dev/null 2>&1; then
              echo "ClamAV is ready"
              exit 0
            fi
            [ $((i % 15)) -eq 0 ] && echo "ClamAV not ready yet (attempt $i/60)..."
            sleep 2
          done
          echo "WARNING: ClamAV not ready after 120s, proceeding anyway"
          docker compose --profile ci logs --tail=30 clamav-ci
        continue-on-error: true

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/vidra_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: |
          echo "=== Service status before tests ==="
          docker compose --profile ci ps
          echo "=== Running tests ==="
          make test-integration-ci 2>&1 | tee /tmp/integration-test-output.log || {
            echo "=== FAILED: Last 100 lines ==="
            tail -100 /tmp/integration-test-output.log
            echo "=== Service status after failure ==="
            docker compose --profile ci ps
            echo "=== Service logs ==="
            docker compose --profile ci logs --tail=30
            exit 1
          }

      - name: Cleanup services
        if: always()
        run: |
          docker compose --profile ci down --remove-orphans
          docker compose --profile ci ps

  # ============================================================================
  # BUILD - Run after lint and unit tests pass
  # ============================================================================
  build:
    name: Build
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [lint, unit]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Build binaries
        run: |
          echo "🔨 Building server..."
          go build -v -o bin/vidra ./cmd/server
          ls -lh bin/vidra
          echo "✅ Build successful"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidra-binary
          path: bin/vidra
          retention-days: 7

  # ============================================================================
  # RACE DETECTION TESTS - Run last (slowest tests)
  # ============================================================================
  unit-race:
    name: Unit Tests (Race)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [unit, lint]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Run unit tests with race detector
        env:
          CGO_ENABLED: "1"
        run: make test-unit-race

  integration-race:
    name: Integration Tests (Race)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [integration]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Start services with docker compose
        run: |
          docker compose --profile ci up -d postgres-ci redis-ci ipfs-ci clamav-ci
          echo "=== Waiting for postgres, redis, ipfs ==="
          docker compose --profile ci up -d --wait postgres-ci redis-ci ipfs-ci
          echo "=== Service status ==="
          docker compose --profile ci ps

      - name: Wait for ClamAV (best-effort)
        run: |
          echo "Waiting up to 120s for ClamAV..."
          for i in $(seq 1 60); do
            if docker compose --profile ci exec -T clamav-ci clamdscan --version >/dev/null 2>&1; then
              echo "ClamAV is ready"
              exit 0
            fi
            [ $((i % 15)) -eq 0 ] && echo "ClamAV not ready yet (attempt $i/60)..."
            sleep 2
          done
          echo "WARNING: ClamAV not ready after 120s, proceeding anyway"
          docker compose --profile ci logs --tail=30 clamav-ci
        continue-on-error: true

      - name: Run integration tests with race detector
        env:
          CGO_ENABLED: "1"
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/vidra_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: |
          echo "=== Service status before tests ==="
          docker compose --profile ci ps
          echo "=== Running race tests ==="
          make test-integration-ci-race 2>&1 | tee /tmp/integration-race-output.log || {
            echo "=== FAILED: Last 100 lines ==="
            tail -100 /tmp/integration-race-output.log
            echo "=== Failing tests ==="
            grep -E "^--- FAIL:" /tmp/integration-race-output.log || true
            grep -E "DATA RACE" /tmp/integration-race-output.log || true
            echo "=== Service status after failure ==="
            docker compose --profile ci ps
            exit 1
          }

      - name: Cleanup services
        if: always()
        run: |
          docker compose --profile ci down --remove-orphans
          docker compose --profile ci ps
