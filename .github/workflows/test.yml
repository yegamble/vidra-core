name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write  # Required for golangci-lint-action annotations

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  GOPROXY: "direct"  # Bypass proxy to avoid DNS issues with storage.googleapis.com

jobs:
  # ============================================================================
  # SETUP - Downloads modules once, shares with all other jobs via cache
  # ============================================================================
  setup:
    name: Setup Dependencies
    uses: ./.github/workflows/_setup-go-environment.yml
    with:
      go-version: "1.24"
      download-modules: true

  # ============================================================================
  # FAST TESTS - Run in parallel after setup completes
  # ============================================================================
  unit:
    name: Unit Tests
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 10

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run unit tests
        run: make test-unit

  lint:
    name: Code Quality (Lint & Format)
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 10

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
      GOLANGCI_LINT_CACHE: /home/runner/.cache/golangci-lint

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run: gofmt -w ."
            gofmt -l .
            exit 1
          fi

          if ! command -v goimports &> /dev/null; then
            go install golang.org/x/tools/cmd/goimports@latest
          fi

          if [ -n "$(goimports -l .)" ]; then
            echo "Go files have incorrect imports. Run: goimports -w ."
            goimports -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=10m
          skip-cache: true  # We manage cache ourselves

  # ============================================================================
  # INTEGRATION TESTS - Run after unit tests pass
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [setup, unit]
    timeout-minutes: 15

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Start services with docker compose
        run: |
          docker compose -f docker compose.ci.yml up -d
          echo "Waiting for services to be healthy..."
          docker compose -f docker compose.ci.yml ps

      - name: Wait for services to be ready
        run: |
          # Wait for postgres
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q postgres-ci) pg_isready -U test_user -d athena_test; do sleep 2; done'

          # Wait for redis
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q redis-ci) redis-cli ping | grep PONG; do sleep 2; done'

          # Wait for IPFS
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q ipfs-ci) ipfs version; do sleep 2; done'

          # Wait for ClamAV (longer timeout due to signature loading)
          timeout 300 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q clamav-ci) /usr/local/bin/clamdcheck.sh; do sleep 5; done'

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: make test-integration-ci

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker compose.ci.yml down -v
          docker compose -f docker compose.ci.yml ps

  # ============================================================================
  # BUILD - Run after lint and unit tests pass
  # ============================================================================
  build:
    name: Build
    runs-on: self-hosted
    needs: [setup, lint, unit]
    timeout-minutes: 10

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build binaries
        run: |
          echo "🔨 Building server..."
          go build -v -o bin/athena ./cmd/server
          ls -lh bin/athena
          echo "✅ Build successful"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-binary
          path: bin/athena
          retention-days: 7

  # ============================================================================
  # RACE DETECTION TESTS - Run last (slowest tests)
  # ============================================================================
  unit-race:
    name: Unit Tests (Race)
    runs-on: self-hosted
    needs: [setup, unit, lint]
    timeout-minutes: 15

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run unit tests with race detector
        env:
          CGO_ENABLED: "1"
        run: make test-unit-race

  integration-race:
    name: Integration Tests (Race)
    runs-on: self-hosted
    needs: [setup, integration]
    timeout-minutes: 20

    env:
      GOPATH: /home/runner/go
      GOMODCACHE: /home/runner/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build

    steps:
      - uses: actions/checkout@v4

      - name: Restore module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Start services with docker compose
        run: |
          docker compose -f docker compose.ci.yml up -d
          echo "Waiting for services to be healthy..."
          docker compose -f docker compose.ci.yml ps

      - name: Wait for services to be ready
        run: |
          # Wait for postgres
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q postgres-ci) pg_isready -U test_user -d athena_test; do sleep 2; done'

          # Wait for redis
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q redis-ci) redis-cli ping | grep PONG; do sleep 2; done'

          # Wait for IPFS
          timeout 60 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q ipfs-ci) ipfs version; do sleep 2; done'

          # Wait for ClamAV (longer timeout due to signature loading)
          timeout 300 bash -c 'until docker exec $(docker compose -f docker compose.ci.yml ps -q clamav-ci) /usr/local/bin/clamdcheck.sh; do sleep 5; done'

      - name: Run integration tests with race detector
        env:
          CGO_ENABLED: "1"
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: make test-integration-ci-race

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker compose.ci.yml down -v
          docker compose -f docker compose.ci.yml ps
