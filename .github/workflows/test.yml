name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write  # Required for golangci-lint-action annotations

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  GOPROXY: "direct"  # Bypass proxy to avoid DNS issues with storage.googleapis.com

jobs:
  # ============================================================================
  # FAST TESTS - Run in parallel
  # ============================================================================
  unit:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Run unit tests
        run: make test-unit

  lint:
    name: Code Quality (Lint & Format)
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run: gofmt -w ."
            gofmt -l .
            exit 1
          fi

          if ! command -v goimports &> /dev/null; then
            go install golang.org/x/tools/cmd/goimports@latest
          fi

          if [ -n "$(goimports -l .)" ]; then
            echo "Go files have incorrect imports. Run: goimports -w ."
            goimports -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=10m
          skip-cache: true  # We manage cache ourselves

  # ============================================================================
  # INTEGRATION TESTS - Run after unit tests pass
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [unit]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Start services with docker compose
        run: |
          docker compose -f docker-compose.ci.yml up -d --wait
          docker compose -f docker-compose.ci.yml ps

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: make test-integration-ci

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v
          docker compose -f docker-compose.ci.yml ps

  # ============================================================================
  # BUILD - Run after lint and unit tests pass
  # ============================================================================
  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, unit]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Build binaries
        run: |
          echo "🔨 Building server..."
          go build -v -o bin/athena ./cmd/server
          ls -lh bin/athena
          echo "✅ Build successful"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-binary
          path: bin/athena
          retention-days: 7

  # ============================================================================
  # RACE DETECTION TESTS - Run last (slowest tests)
  # ============================================================================
  unit-race:
    name: Unit Tests (Race)
    runs-on: self-hosted
    needs: [unit, lint]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Run unit tests with race detector
        env:
          CGO_ENABLED: "1"
        run: make test-unit-race

  integration-race:
    name: Integration Tests (Race)
    runs-on: self-hosted
    needs: [integration]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/install-gcc

      - name: Start services with docker compose
        run: |
          docker compose -f docker-compose.ci.yml up -d --wait
          docker compose -f docker-compose.ci.yml ps

      - name: Run integration tests with race detector
        env:
          CGO_ENABLED: "1"
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          IPFS_API: http://localhost:5001
          CLAMAV_HOST: localhost:3310
          JWT_SECRET: test-jwt-secret
        run: make test-integration-ci-race

      - name: Cleanup services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v
          docker compose -f docker-compose.ci.yml ps
