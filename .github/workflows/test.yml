name: CI

on:
  push:
    branches: [ main, develop ]  # Only run on push for deployed branches
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/blue-green-deploy.yml'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.24"
  GO111MODULE: on
  # Note: Integration tests run in container and use service names (postgres, redis, ipfs)
  CI_DATABASE_URL: postgres://test_user:test_password@postgres:5432/athena_test?sslmode=disable
  CI_REDIS_URL: redis://redis:6379/0
  CI_JWT_SECRET: test-jwt-secret-for-ci

jobs:
  unit:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      CGO_ENABLED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: make test-unit

  integration:
    name: Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15

    # Run in container to access services via Docker network (no port mapping needed)
    container:
      image: golang:1.24
      options: --user root

    env:
      CGO_ENABLED: "1"

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "sh -c 'redis-cli ping | grep PONG'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      ipfs:
        image: ipfs/kubo:v0.29.0
        options: >-
          --health-cmd "ipfs version"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install PostgreSQL client
        run: |
          apt-get update -qq
          apt-get install -y postgresql-client

      - name: Apply test migrations
        env:
          DATABASE_URL: postgres://test_user:test_password@postgres:5432/athena_test?sslmode=disable
        run: make migrate-custom

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test_user:test_password@postgres:5432/athena_test?sslmode=disable
          REDIS_URL: redis://redis:6379/0
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          IPFS_API: http://ipfs:5001
          REQUIRE_IPFS: false
          VALIDATION_TEST_MODE: true
          LOG_LEVEL: debug
        run: make test-integration-ci

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=10m
          skip-cache: false
          skip-pkg-cache: false
          skip-build-cache: false

  format-check:
    name: Format Check
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Check formatting
        run: make fmt-check

  build:
    name: Build
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [unit, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build binary
        run: go build -v -o bin/athena ./cmd/server

      - name: Test binary
        run: ./bin/athena --help || true

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-binary
          path: bin/athena
          retention-days: 7

  postman-e2e:
    name: Postman E2E Tests
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Postman E2E via Makefile
        env:
          DOCKER_COMPOSE: docker compose
        run: make postman-e2e

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results-e2e
          path: postman/newman-results.xml
          retention-days: 14

      - name: Collect docker compose logs
        if: failure()
        run: |
          mkdir -p artifacts
          COMPOSE_PROJECT_NAME=athena-test docker compose -f docker-compose.test.yml logs --no-color > artifacts/compose-logs.txt 2>/dev/null || echo "Unable to collect logs"

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs-e2e
          path: artifacts/compose-logs.txt
          retention-days: 7

  all-tests-passed:
    name: All Tests Passed
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [unit, integration, lint, format-check, build, postman-e2e]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Linting failed"
            exit 1
          fi
          if [ "${{ needs.format-check.result }}" != "success" ]; then
            echo "Format check failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          if [ "${{ needs.postman-e2e.result }}" != "success" ]; then
            echo "Postman E2E tests failed"
            exit 1
          fi
          echo "All tests passed successfully!"
