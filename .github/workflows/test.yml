name: Test

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24.6"
  # Force Go modules mode globally to avoid GOPATH issues
  GO111MODULE: on

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed file groups
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'scripts/**'
              - '.github/workflows/**'

  unit:
    runs-on: ubuntu-latest
    needs: changes
    env:
      # Configure Go for better network reliability
      GOPROXY: https://proxy.golang.org,direct
      GOSUMDB: sum.golang.org
      GOTOOLCHAIN: auto
      # Force Go modules mode to avoid GOPATH issues
      GO111MODULE: on
      # Increase timeouts for network operations
      GOPROXY_TIMEOUT: 600s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          # Configure Go timeouts and retries for network issues
          export GOPROXY_TIMEOUT=600s
          for i in {1..5}; do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              echo "Download attempt $i failed, retrying in 30 seconds..."
              if [ $i -lt 5 ]; then sleep 30; fi
            fi
          done

      - name: Check formatting
        run: |
          # Force Go modules mode and disable GOPATH completely
          unset GOPATH
          export GO111MODULE=on
          export GOPROXY=https://proxy.golang.org,direct
          # Verify we're in modules mode
          go env GO111MODULE
          go env GOPATH
          go env GOMOD
          # Download and verify modules
          go mod download
          go mod verify
          # Check formatting with explicit modules mode
          GO111MODULE=on make fmt-check

      - name: Run unit tests (Makefile)
        run: make test-unit

  integration:
    runs-on: ubuntu-latest
    needs: [unit, changes]
    env:
      # Force Go modules mode to avoid GOPATH issues
      GO111MODULE: on

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      ipfs:
        image: ipfs/kubo:latest
        ports:
          - 5001:5001
        options: >-
          --health-cmd "wget -qO- http://localhost:5001/api/v0/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          # Configure Go timeouts and retries for network issues
          export GOPROXY_TIMEOUT=600s
          for i in {1..5}; do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              echo "Download attempt $i failed, retrying in 30 seconds..."
              if [ $i -lt 5 ]; then sleep 30; fi
            fi
          done

      - name: Initialize test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d athena_test -f init-test-db.sql

      - name: Run integration tests (Makefile)
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-key
          IPFS_API: http://localhost:5001
        run: make test-integration-ci

  lint:
    runs-on: ubuntu-latest
    env:
      # Force Go modules mode to avoid GOPATH issues
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.61.0
          args: --timeout=10m --out-format=colored-line-number

  build:
    runs-on: ubuntu-latest
    needs: [unit, integration, lint, changes]
    env:
      # Force Go modules mode to avoid GOPATH issues  
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-
            ${{ runner.os }}-go-

      - name: Build binary
        run: |
          go build -v -o bin/athena ./cmd/server

      - name: Test binary
        run: |
          ./bin/athena --help || true

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-binary
          path: bin/athena
          retention-days: 7

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Apply SQL migrations
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
        run: make migrate-migrations
      - name: Smoke check tables
        env:
          PGPASSWORD: test_password
        run: psql -h localhost -U test_user -d athena_test -c '\dt'

  docker:
    runs-on: ubuntu-latest
    needs: [integration, lint, changes]
    if: needs.changes.outputs.docker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: athena:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test Docker Compose
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 10
          docker compose -f docker-compose.test.yml ps
          docker compose -f docker-compose.test.yml down -v
