name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: "1.24.6"

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      # Configure Go for better network reliability
      GOPROXY: https://proxy.golang.org,direct
      GOSUMDB: sum.golang.org
      GOTOOLCHAIN: auto
      # Increase timeouts for network operations
      GOPROXY_TIMEOUT: 600s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          # Configure Go timeouts and retries for network issues
          export GOPROXY_TIMEOUT=600s
          for i in {1..5}; do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              echo "Download attempt $i failed, retrying in 30 seconds..."
              if [ $i -lt 5 ]; then sleep 30; fi
            fi
          done

      - name: Run unit tests (exclude integration packages)
        run: |
          set -e
          PKGS=$(go list ./... | grep -v "/internal/repository$")
          for p in $PKGS; do
            echo "Running unit tests in $p"
            go test -v -race -skip Integration $p
          done

  integration:
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          # Configure Go timeouts and retries for network issues
          export GOPROXY_TIMEOUT=600s
          for i in {1..5}; do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              echo "Download attempt $i failed, retrying in 30 seconds..."
              if [ $i -lt 5 ]; then sleep 30; fi
            fi
          done

      - name: Initialize test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d athena_test -f init-test-db.sql

      - name: Run repository integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go test -v -race ./internal/repository

      - name: Run httpapi integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-key
          IPFS_API: http://localhost:5001
        run: |
          go test -v -race ./internal/httpapi -run Integration

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=10m --out-format=colored-line-number

  build:
    runs-on: ubuntu-latest
    needs: [unit, integration, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          go build -v -o bin/athena ./cmd/server

      - name: Test binary
        run: |
          ./bin/athena --help || true

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: athena-binary
          path: bin/athena
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: [integration, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: athena:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 10
          docker compose -f docker-compose.test.yml ps
          docker compose -f docker-compose.test.yml down -v
