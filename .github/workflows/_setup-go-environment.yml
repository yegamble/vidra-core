name: Setup Go Environment (Reusable)

# Reusable workflow that handles all common setup:
# - Checkout code
# - Setup Go
# - Download/cache modules
# Can be called from other workflows to avoid duplication

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.24'
      download-modules:
        description: 'Whether to download modules (false to skip if already cached)'
        required: false
        type: boolean
        default: true

    outputs:
      cache-key:
        description: 'The cache key used for Go modules'
        value: ${{ jobs.setup.outputs.cache-key }}
      modules-cached:
        description: 'Whether modules were restored from cache'
        value: ${{ jobs.setup.outputs.cache-hit }}
      go-mod-path:
        description: 'Path to Go module cache (container-aware)'
        value: ${{ jobs.setup.outputs.go-mod-path }}
      go-build-path:
        description: 'Path to Go build cache (container-aware)'
        value: ${{ jobs.setup.outputs.go-build-path }}

jobs:
  setup:
    name: Setup Go Environment
    runs-on: self-hosted
    timeout-minutes: 15

    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      cache-hit: ${{ steps.go-cache.outputs.cache-hit }}
      go-mod-path: ${{ steps.detect-env.outputs.go-mod-path }}
      go-build-path: ${{ steps.detect-env.outputs.go-build-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect environment
        id: detect-env
        run: |
          # Detect if running in container
          if [ -f /.dockerenv ] || grep -q 'docker\|lxc' /proc/1/cgroup 2>/dev/null; then
            echo "container=true" >> $GITHUB_OUTPUT
            echo "go-mod-path=/go/pkg/mod" >> $GITHUB_OUTPUT
            echo "go-build-path=/root/.cache/go-build" >> $GITHUB_OUTPUT
            echo "Container environment detected"
            echo "  Go mod cache: /go/pkg/mod"
            echo "  Go build cache: /root/.cache/go-build"
          else
            echo "container=false" >> $GITHUB_OUTPUT
            echo "go-mod-path=~/go/pkg/mod" >> $GITHUB_OUTPUT
            echo "go-build-path=~/.cache/go-build" >> $GITHUB_OUTPUT
            echo "Bare-metal/VM environment detected"
            echo "  Go mod cache: ~/go/pkg/mod"
            echo "  Go build cache: ~/.cache/go-build"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: false  # We manage cache manually

      - name: Verify Go environment
        run: |
          echo "Verifying Go installation..."
          go version
          echo "GOPATH=$(go env GOPATH)"
          echo "GOMODCACHE=$(go env GOMODCACHE)"
          echo "GOCACHE=$(go env GOCACHE)"

      - name: Generate cache key
        id: cache-key
        run: |
          CACHE_KEY="go-mod-${{ runner.os }}-${{ inputs.go-version }}-${{ hashFiles('go.sum') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

      - name: Restore Go module cache
        id: go-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.detect-env.outputs.go-mod-path }}
            ${{ steps.detect-env.outputs.go-build-path }}
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            go-mod-${{ runner.os }}-${{ inputs.go-version }}-
            go-mod-${{ runner.os }}-

      - name: Download Go modules
        if: inputs.download-modules == true && steps.go-cache.outputs.cache-hit != 'true'
        env:
          GOMODCACHE_PATH: ${{ steps.detect-env.outputs.go-mod-path }}
        run: |
          echo "Downloading Go modules..."

          # Count modules
          TOTAL=$(go list -m -f '{{.Path}}' all 2>/dev/null | wc -l || echo "unknown")
          echo "Total modules: $TOTAL"

          # Dynamic timeout based on module count
          if [ "$TOTAL" != "unknown" ] && [ "$TOTAL" -gt 150 ]; then
            TIMEOUT="15m"
            echo "Large module count detected, using ${TIMEOUT} timeout"
          else
            TIMEOUT="10m"
          fi

          # Download with timeout
          if timeout $TIMEOUT go mod download; then
            echo "Modules downloaded successfully"

            # Show cache size (expand tilde for bare-metal environments)
            CACHE_PATH="${GOMODCACHE_PATH/#\~/$HOME}"
            if [ -d "$CACHE_PATH" ]; then
              CACHE_SIZE=$(du -sh "$CACHE_PATH" 2>/dev/null | cut -f1 || echo "unknown")
              echo "Cache size: $CACHE_SIZE"
            fi
          else
            EXIT_CODE=$?
            echo "Module download failed (exit code: $EXIT_CODE)"
            exit $EXIT_CODE
          fi

      - name: Verify modules
        run: |
          echo "Verifying module integrity..."
          go mod verify
          echo "All modules verified successfully"

      - name: Cache summary
        env:
          IS_CONTAINER: ${{ steps.detect-env.outputs.container }}
        run: |
          echo "========================================="
          echo "Cache Summary"
          echo "========================================="
          echo "Environment: $([ "$IS_CONTAINER" = "true" ] && echo "Container" || echo "Bare-metal/VM")"
          echo "Go version: $(go version | awk '{print $3}')"
          echo "Cache key: ${{ steps.cache-key.outputs.key }}"
          echo "Cache hit: ${{ steps.go-cache.outputs.cache-hit }}"
          echo "Modules downloaded: ${{ steps.go-cache.outputs.cache-hit != 'true' }}"
          echo "Go mod path: ${{ steps.detect-env.outputs.go-mod-path }}"
          echo "Go build path: ${{ steps.detect-env.outputs.go-build-path }}"
          echo "========================================="
