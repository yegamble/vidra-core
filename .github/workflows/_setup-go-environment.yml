name: Setup Go Environment (Reusable)

# Reusable workflow that handles all common setup:
# - Checkout code
# - Setup Go
# - Download/cache modules
# Can be called from other workflows to avoid duplication

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.24'
      download-modules:
        description: 'Whether to download modules (false to skip if already cached)'
        required: false
        type: boolean
        default: true

    outputs:
      cache-key:
        description: 'The cache key used for Go modules'
        value: ${{ jobs.setup.outputs.cache-key }}
      modules-cached:
        description: 'Whether modules were restored from cache'
        value: ${{ jobs.setup.outputs.cache-hit }}
      go-mod-path:
        description: 'Path to Go module cache (container-aware)'
        value: ${{ jobs.setup.outputs.go-mod-path }}
      go-build-path:
        description: 'Path to Go build cache (container-aware)'
        value: ${{ jobs.setup.outputs.go-build-path }}

jobs:
  setup:
    name: Setup Go Environment
    runs-on: self-hosted
    timeout-minutes: 15

    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      cache-hit: ${{ steps.module-cache.outputs.cache-hit }}
      go-mod-path: ${{ steps.detect-env.outputs.go-mod-path }}
      go-build-path: ${{ steps.detect-env.outputs.go-build-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: false  # We manage cache manually for cross-job sharing

      - name: Generate cache key
        id: cache-key
        run: |
          CACHE_KEY="go-mod-${{ runner.os }}-${{ inputs.go-version }}-${{ hashFiles('go.sum') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Generated cache key: $CACHE_KEY"

      - name: Detect environment
        id: detect-env
        run: |
          # Detect if running in container
          if [ -f /.dockerenv ] || grep -q 'docker\|lxc' /proc/1/cgroup 2>/dev/null; then
            echo "container=true" >> $GITHUB_OUTPUT
            echo "go-mod-path=/go/pkg/mod" >> $GITHUB_OUTPUT
            echo "go-build-path=/root/.cache/go-build" >> $GITHUB_OUTPUT
            echo "Environment: Container"
          else
            echo "container=false" >> $GITHUB_OUTPUT
            # Use actual paths, not tilde
            echo "go-mod-path=$HOME/go/pkg/mod" >> $GITHUB_OUTPUT
            echo "go-build-path=$HOME/.cache/go-build" >> $GITHUB_OUTPUT
            echo "Environment: Bare-metal/VM"
          fi

      - name: Cache Go modules
        id: module-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.detect-env.outputs.go-mod-path }}
            ${{ steps.detect-env.outputs.go-build-path }}
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            go-mod-${{ runner.os }}-${{ inputs.go-version }}-
            go-mod-${{ runner.os }}-

      - name: Download modules
        if: inputs.download-modules == true && steps.module-cache.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Go modules..."
          echo "GOPATH: $(go env GOPATH)"
          echo "GOMODCACHE: $(go env GOMODCACHE)"

          # Download with timeout
          timeout 15m go mod download || {
            echo "Module download failed or timed out"
            exit 1
          }

          echo "Modules downloaded successfully"
          du -sh "$(go env GOMODCACHE)" 2>/dev/null || echo "Cache size: unknown"

      - name: Verify modules
        if: inputs.download-modules == true
        run: |
          echo "Verifying module integrity..."
          go mod verify
          echo "All modules verified"

      - name: Setup summary
        run: |
          echo "========================================="
          echo "Setup Complete"
          echo "========================================="
          echo "Go version: $(go version | awk '{print $3}')"
          echo "Cache key: ${{ steps.cache-key.outputs.key }}"
          echo "Cache hit: ${{ steps.module-cache.outputs.cache-hit }}"
          echo "GOMODCACHE: $(go env GOMODCACHE)"
          echo "========================================="
