name: Deploy to Production

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GO_VERSION: "1.24.6"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Run linting
        run: make lint

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/athena
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  deploy-production:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd /opt/athena
            echo "Pulling latest changes..."
            git pull origin main
            
            echo "Updating environment variables..."
            cp .env.example .env
            # Update with production secrets
            sed -i 's/your-super-secret-jwt-key-change-in-production/${{ secrets.JWT_SECRET }}/g' .env
            sed -i 's/athena_password/${{ secrets.DB_PASSWORD }}/g' .env
            sed -i 's/your-hls-signing-secret/${{ secrets.HLS_SECRET }}/g' .env
            
            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.prod.yml pull
            
            echo "Deploying application..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "Waiting for services to be healthy..."
            timeout 300 bash -c 'until docker compose -f docker-compose.prod.yml ps | grep -q "healthy"; do sleep 10; done'
            
            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T app make migrate-up
            
            echo "Performing health check..."
            sleep 30
            curl -f http://localhost:8080/health || exit 1
            
            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-staging:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: staging
    if: github.event.inputs.environment == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            cd /opt/athena-staging
            echo "Pulling latest changes..."
            git pull origin main
            
            echo "Updating environment variables..."
            cp .env.example .env
            # Update with staging secrets
            sed -i 's/your-super-secret-jwt-key-change-in-production/${{ secrets.STAGING_JWT_SECRET }}/g' .env
            sed -i 's/athena_password/${{ secrets.STAGING_DB_PASSWORD }}/g' .env
            
            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.prod.yml pull
            
            echo "Deploying application..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "Waiting for services to be healthy..."
            timeout 300 bash -c 'until docker compose -f docker-compose.prod.yml ps | grep -q "healthy"; do sleep 10; done'
            
            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T app make migrate-up
            
            echo "Performing health check..."
            sleep 30
            curl -f http://localhost:8080/health || exit 1
            
            echo "Staging deployment completed successfully!"

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'