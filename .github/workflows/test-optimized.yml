name: CI (Optimized)

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.24"
  GO111MODULE: on
  CI_DATABASE_URL: postgres://test_user:test_password@postgres:5432/athena_test?sslmode=disable
  CI_REDIS_URL: redis://redis:6379/0
  CI_JWT_SECRET: test-jwt-secret-for-ci

jobs:
  # ============================================================================
  # SETUP JOB - Downloads modules once, caches for all other jobs
  # ============================================================================
  setup:
    name: Setup Dependencies
    runs-on: self-hosted
    timeout-minutes: 15

    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      go-cache-hit: ${{ steps.go-cache.outputs.cache-hit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: |
          CACHE_KEY="go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

      - name: Check Go module cache
        id: go-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Set up Go
        if: steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false  # We manage cache manually for cross-job sharing

      - name: Download modules (if not cached)
        if: steps.go-cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading Go modules (this will be cached for other jobs)..."

          # Count modules
          TOTAL=$(go list -m -f '{{.Path}}' all 2>/dev/null | wc -l || echo "unknown")
          echo "Total modules: $TOTAL"

          # Set timeout based on count
          if [ "$TOTAL" != "unknown" ] && [ "$TOTAL" -gt 150 ]; then
            TIMEOUT="15m"
          else
            TIMEOUT="10m"
          fi

          echo "Using timeout: $TIMEOUT"
          timeout $TIMEOUT go mod download

          echo "✅ Modules downloaded and cached"
          echo "Cache size:"
          du -sh ~/go/pkg/mod 2>/dev/null || echo "N/A"

      - name: Verify modules
        run: |
          echo "🔍 Verifying module integrity..."
          go mod verify
          echo "✅ All modules verified"

  # ============================================================================
  # TEST JOBS - All depend on setup, use cached modules
  # ============================================================================

  unit:
    name: Unit Tests (Fast)
    runs-on: self-hosted
    timeout-minutes: 10
    needs: setup
    env:
      CGO_ENABLED: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run unit tests
        run: make test-unit

  unit-race:
    name: Unit Tests (Race Detection)
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [setup, unit]

    container:
      image: golang:1.24
      options: --user root
      volumes:
        - /home/runner/go/pkg/mod:/go/pkg/mod:ro  # Mount cached modules read-only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache (in container)
        uses: actions/cache/restore@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install GCC for race detector
        uses: ./.github/actions/install-gcc

      - name: Run unit tests with race detection
        env:
          CGO_ENABLED: "1"
        run: make test-unit-race

  integration:
    name: Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [setup, unit]

    container:
      image: golang:1.24
      options: --user root

    env:
      CGO_ENABLED: "0"

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "sh -c 'redis-cli ping | grep PONG'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      ipfs:
        image: ipfs/kubo:v0.29.0
        options: >-
          --health-cmd "ipfs version"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Set up PostgreSQL test environment
        id: postgres
        uses: ./.github/actions/setup-postgres-test

      - name: Set up Redis test environment
        id: redis
        uses: ./.github/actions/setup-redis-test

      - name: Set up IPFS test environment
        id: ipfs
        uses: ./.github/actions/setup-ipfs-test

      - name: Apply test migrations
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database-url }}
        run: make migrate-custom

      - name: Run integration tests
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database-url }}
          REDIS_URL: ${{ steps.redis.outputs.redis-url }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          IPFS_API: ${{ steps.ipfs.outputs.ipfs-api }}
          REQUIRE_IPFS: false
          VALIDATION_TEST_MODE: true
          LOG_LEVEL: debug
        run: make test-integration-ci

  integration-race:
    name: Integration Tests (Race Detection)
    runs-on: self-hosted
    timeout-minutes: 20
    needs: [setup, integration]

    container:
      image: golang:1.24
      options: --user root

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_DB: athena_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "sh -c 'redis-cli ping | grep PONG'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      ipfs:
        image: ipfs/kubo:v0.29.0
        options: >-
          --health-cmd "ipfs version"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install GCC for race detector
        uses: ./.github/actions/install-gcc

      - name: Set up PostgreSQL test environment
        id: postgres
        uses: ./.github/actions/setup-postgres-test

      - name: Set up Redis test environment
        id: redis
        uses: ./.github/actions/setup-redis-test

      - name: Set up IPFS test environment
        id: ipfs
        uses: ./.github/actions/setup-ipfs-test

      - name: Apply test migrations
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database-url }}
        run: make migrate-custom

      - name: Run integration tests with race detection
        env:
          CGO_ENABLED: "1"
          DATABASE_URL: ${{ steps.postgres.outputs.database-url }}
          REDIS_URL: ${{ steps.redis.outputs.redis-url }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          IPFS_API: ${{ steps.ipfs.outputs.ipfs-api }}
          REQUIRE_IPFS: false
          VALIDATION_TEST_MODE: true
          LOG_LEVEL: debug
        run: make test-integration-ci-race

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v1.61.0
          args: --timeout=10m

  build:
    name: Build
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [setup, lint, unit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build server binary
        run: |
          echo "🔨 Building server..."
          go build -v -o bin/athena ./cmd/server
          ls -lh bin/athena
          echo "✅ Build successful"
