name: Video Import Tests

on:
  push:
    branches: [main, develop]  # Only run on push for deployed branches
    paths:
      - 'internal/domain/import*.go'
      - 'internal/repository/import*.go'
      - 'internal/usecase/import/**'
      - 'internal/importer/**'
      - 'internal/httpapi/import*.go'
      - 'migrations/043_*.sql'
      - '.github/workflows/video-import.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'internal/domain/import*.go'
      - 'internal/repository/import*.go'
      - 'internal/usecase/import/**'
      - 'internal/importer/**'
      - 'internal/httpapi/import*.go'
      - 'migrations/043_*.sql'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CGO_ENABLED: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.25.9'
          cache-dependency-path: go.sum

      - name: Run domain tests
        run: go test -v -coverprofile=domain-coverage.out ./internal/domain -run TestImport

      - name: Run repository tests
        run: go test -v -coverprofile=repository-coverage.out ./internal/repository -run TestImportRepository

      - name: Run service tests
        run: go test -v -coverprofile=service-coverage.out ./internal/usecase/import -run TestImportService

      - name: Run API handler tests
        run: go test -v -coverprofile=handlers-coverage.out ./internal/httpapi -run TestImportHandlers

      - name: Run importer tests
        continue-on-error: true
        run: go test -v -coverprofile=importer-coverage.out ./internal/importer/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./domain-coverage.out,./repository-coverage.out,./service-coverage.out,./handlers-coverage.out,./importer-coverage.out
          flags: unit
          name: unit-tests
          token: ${{ env.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}

  integration-tests:
    name: Integration Tests
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      CGO_ENABLED: "0"

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: vidra_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client make

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.25.9'
          cache-dependency-path: go.sum

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run migrations
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5436/vidra_test?sslmode=disable
        run: |
          goose -dir migrations postgres "$DATABASE_URL" up

      - name: Verify migration
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -p 5436 -U test_user -d vidra_test -c "SELECT COUNT(*) FROM video_imports;" || echo "Table not created yet"

      - name: Run repository integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5436/vidra_test?sslmode=disable
          REDIS_URL: redis://localhost:6381/0
        run: |
          go test -v -tags=integration ./internal/repository -run TestImport

      - name: Run API integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5436/vidra_test?sslmode=disable
          REDIS_URL: redis://localhost:6381/0
        run: |
          go test -v -tags=integration ./internal/httpapi -run TestImportIntegration || echo "Note: Some integration tests may skip if yt-dlp not available"

  unit-tests-race:
    name: Unit Tests (Race Detection)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    needs: unit-tests
    # Only run on main branch or manual trigger to save CI time
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    container:
      image: golang:1.25.9
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GCC for race detector
        uses: ./.github/actions/install-gcc

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.25.9'
          cache-dependency-path: go.sum

      - name: Run domain tests with race detection
        env:
          CGO_ENABLED: "1"
        run: go test -v -race -coverprofile=domain-race-coverage.out ./internal/domain -run TestImport

      - name: Run service tests with race detection
        env:
          CGO_ENABLED: "1"
        run: go test -v -race -coverprofile=service-race-coverage.out ./internal/usecase/import -run TestImportService

      - name: Upload race coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-race-coverage
          path: "*-race-coverage.out"
          retention-days: 14

  build:
    name: Build Check
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.25.9'
          cache-dependency-path: go.sum

      - name: Build
        run: go build -v ./...

      - name: Check for go.mod/go.sum changes
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum changed, please run 'go mod tidy'" && exit 1)
