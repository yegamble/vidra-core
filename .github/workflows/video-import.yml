name: Video Import Tests

on:
  push:
    branches: [main, develop]  # Only run on push for deployed branches
    paths:
      - 'internal/domain/import*.go'
      - 'internal/repository/import*.go'
      - 'internal/usecase/import/**'
      - 'internal/importer/**'
      - 'internal/httpapi/import*.go'
      - 'migrations/043_*.sql'
      - '.github/workflows/video-import.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'internal/domain/import*.go'
      - 'internal/repository/import*.go'
      - 'internal/usecase/import/**'
      - 'internal/importer/**'
      - 'internal/httpapi/import*.go'
      - 'migrations/043_*.sql'

concurrency:
  group: postgres-workflows-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Import Code
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker cleanup
        uses: ./.github/actions/docker-cleanup

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m ./internal/domain/... ./internal/repository/... ./internal/usecase/import/... ./internal/importer/... ./internal/httpapi/...

  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: |
          # Download dependencies with retry logic and exponential backoff
          export GOPROXY_TIMEOUT=600s
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              if [ $i -lt $max_attempts ]; then
                delay=$((2 ** (i - 1) * 2))
                echo "Download attempt $i failed, retrying in ${delay} seconds..."
                sleep $delay
              else
                echo "All $max_attempts attempts failed"
                exit 1
              fi
            fi
          done

      - name: Run domain tests
        run: go test -v -race -coverprofile=domain-coverage.out ./internal/domain -run TestImport

      - name: Run repository tests
        run: go test -v -race -coverprofile=repository-coverage.out ./internal/repository -run TestImportRepository

      - name: Run service tests
        run: go test -v -race -coverprofile=service-coverage.out ./internal/usecase/import -run TestImportService

      - name: Run API handler tests
        run: go test -v -race -coverprofile=handlers-coverage.out ./internal/httpapi -run TestImportHandlers

      - name: Run importer tests
        run: go test -v -race -coverprofile=importer-coverage.out ./internal/importer/... || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./domain-coverage.out,./repository-coverage.out,./service-coverage.out,./handlers-coverage.out,./importer-coverage.out
          flags: unit
          name: unit-tests
          token: ${{ env.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}

  integration-tests:
    name: Integration Tests
    runs-on: self-hosted
    env:
      CGO_ENABLED: "1"
    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: athena_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client make

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: |
          # Download dependencies with retry logic and exponential backoff
          export GOPROXY_TIMEOUT=600s
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            if timeout 600 go mod download; then
              echo "Dependencies downloaded successfully on attempt $i"
              break
            else
              if [ $i -lt $max_attempts ]; then
                delay=$((2 ** (i - 1) * 2))
                echo "Download attempt $i failed, retrying in ${delay} seconds..."
                sleep $delay
              else
                echo "All $max_attempts attempts failed"
                exit 1
              fi
            fi
          done

      - name: Run migrations
        env:
          PGPASSWORD: test_password
        run: |
          for migration in migrations/*.sql; do
            echo "Applying: $(basename "$migration")"
            psql -h localhost -p 5436 -U test_user -d athena_test -f "$migration" > /dev/null 2>&1 || echo "  -> Already applied or error (continuing...)"
          done

      - name: Verify migration
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -p 5436 -U test_user -d athena_test -c "SELECT COUNT(*) FROM video_imports;" || echo "Table not created yet"

      - name: Run repository integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5436/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6381/0
        run: |
          go test -v -race -tags=integration ./internal/repository -run TestImport

      - name: Run API integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5436/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6381/0
        run: |
          go test -v -race -tags=integration ./internal/httpapi -run TestImportIntegration || echo "Note: Some integration tests may skip if yt-dlp not available"

  build:
    name: Build Check
    runs-on: self-hosted
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go (cached)
        uses: ./.github/actions/setup-go-cached
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Build
        run: go build -v ./...

      - name: Check for go.mod/go.sum changes
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum changed, please run 'go mod tidy'" && exit 1)
