name: API Tests with Postman

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: athena_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run database migrations
      run: |
        # Install atlas CLI
        curl -sSf https://atlasgo.sh | sh
        # Run migrations (adjust path as needed)
        # atlas migrate apply --dir "file://migrations" --url "postgres://testuser:testpass@localhost:5432/athena_test?sslmode=disable"
      env:
        DATABASE_URL: postgres://testuser:testpass@localhost:5432/athena_test?sslmode=disable

    - name: Build and start server
      run: |
        go build -o athena-server ./cmd/server
        ./athena-server &
        echo $! > server.pid
        sleep 5
      env:
        DATABASE_URL: postgres://testuser:testpass@localhost:5432/athena_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-key
        PORT: 8080

    - name: Wait for server to be ready
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:8080/health; do sleep 1; done'

    - name: Install Newman (Postman CLI)
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run Postman collection tests
      run: |
        newman run postman/athena-auth.postman_collection.json \
          --environment postman/athena-auth.postman_environment.json \
          --env-var "base_url=http://localhost:8080" \
          --reporters cli,json,htmlextra \
          --reporter-htmlextra-export reports/newman-report.html \
          --reporter-json-export reports/newman-results.json \
          --bail \
          --timeout-request 30000
      continue-on-error: false

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: postman-test-results
        path: |
          reports/newman-report.html
          reports/newman-results.json

    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          // Read Newman results
          let testResults = '';
          try {
            const results = JSON.parse(fs.readFileSync('reports/newman-results.json', 'utf8'));
            const stats = results.run.stats;
            
            testResults = `
            ## 🧪 API Test Results
            
            - **Total Tests**: ${stats.assertions.total}
            - **Passed**: ${stats.assertions.passed} ✅
            - **Failed**: ${stats.assertions.failed} ${stats.assertions.failed > 0 ? '❌' : ''}
            - **Requests**: ${stats.requests.total}
            - **Average Response Time**: ${results.run.timings.responseAverage}ms
            
            ${stats.assertions.failed > 0 ? '⚠️ Some tests failed. Check the detailed report in artifacts.' : '✅ All tests passed!'}
            `;
          } catch (error) {
            testResults = '❌ Could not parse test results';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testResults
          });

    - name: Cleanup
      if: always()
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) || true
          rm server.pid
        fi

    - name: Create reports directory
      run: mkdir -p reports