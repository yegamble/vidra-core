  penetration-testing:
    name: Penetration Testing (SSRF)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build application
        run: |
          go build -o athena-server ./cmd/server

      - name: Run SSRF Attack Simulation Tests
        run: |
          echo "::group::SSRF Attack Simulation"
          # Run tests that attempt common SSRF attack vectors
          go test -v -tags=pentest ./tests/integration/ssrf_protection_test.go
          echo "::endgroup::"

      - name: Test URL Validation Edge Cases
        run: |
          echo "::group::URL Validation Edge Cases"
          go test -v ./internal/security/... -run TestValidateURL
          echo "::endgroup::"

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [ssrf-protection-tests, url-validation-tests, activitypub-security-tests, dependency-scanning, static-analysis]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate Security Summary
        run: |
          cat << 'EOF' > security-summary.md
          # Security Test Results

          ## Test Execution Summary

          - ✅ SSRF Protection Tests: ${{ needs.ssrf-protection-tests.result }}
          - ✅ URL Validation Tests: ${{ needs.url-validation-tests.result }}
          - ✅ ActivityPub Security: ${{ needs.activitypub-security-tests.result }}
          - ✅ Dependency Scanning: ${{ needs.dependency-scanning.result }}
          - ✅ Static Analysis: ${{ needs.static-analysis.result }}

          ## Coverage Reports

          Coverage reports are available in the artifacts section.

          ## Security Recommendations

          1. Review SSRF protection for all external URL fetching
          2. Ensure HTTP clients have redirect limits configured
          3. Validate all user-supplied URLs before processing
          4. Implement rate limiting on external URL fetches
          5. Monitor for DNS rebinding attacks

          EOF

      - name: Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 90

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
