name: Database Migration Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'migrations/**'
      - '.github/workflows/goose-migrate.yml'

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'migrations/**'
      - '.github/workflows/goose-migrate.yml'

  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  POSTGRES_VERSION: '16'

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Goose
        run: |
          # Install Goose with retry logic and exponential backoff
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            if go install github.com/pressly/goose/v3/cmd/goose@latest; then
              echo "Goose installed successfully on attempt $i"
              break
            else
              if [ $i -lt $max_attempts ]; then
                delay=$((2 ** (i - 1) * 2))
                echo "Install attempt $i failed, retrying in ${delay} seconds..."
                sleep $delay
              else
                echo "All $max_attempts attempts failed"
                exit 1
              fi
            fi
          done
          goose -version

      - name: Setup test database
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db?sslmode=disable
        run: |
          echo "Creating test database schema..."
          PGPASSWORD=test_pass psql -h localhost -U test_user -d test_db -c "SELECT version();"

      - name: Validate migration files
        run: |
          echo "Validating migration file format..."
          goose -dir migrations validate

      - name: Test migrations up
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db?sslmode=disable
        run: |
          echo "Running migrations..."
          goose -dir migrations postgres "$DATABASE_URL" up

      - name: Check migration status
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db?sslmode=disable
        run: |
          echo "Current migration status:"
          goose -dir migrations postgres "$DATABASE_URL" status

      - name: Test migration rollback
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db?sslmode=disable
        run: |
          echo "Testing rollback of last migration..."
          # Only test rollback if we have more than one migration
          CURRENT_VERSION=$(goose -dir migrations postgres "$DATABASE_URL" version 2>/dev/null || echo "0")
          if [ "$CURRENT_VERSION" -gt "0" ]; then
            goose -dir migrations postgres "$DATABASE_URL" down
            echo "Rollback successful"
            # Re-apply the migration
            goose -dir migrations postgres "$DATABASE_URL" up
          else
            echo "No migrations to rollback"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const success = ${{ job.status == 'success' }};
            if (success) {
              const body = `## ✅ Database Migration Validation Successful

              All migrations have been validated and tested successfully.

              **Validation Results:**
              - ✅ Migration files are valid
              - ✅ Migrations apply cleanly
              - ✅ Rollback tested (where applicable)

              You can safely merge these migration changes.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              const body = `## ❌ Database Migration Validation Failed

              Migration validation encountered errors. Please review the logs above and:

              1. Check migration file syntax (must have Goose directives)
              2. Ensure migrations are reversible where required
              3. Validate SQL syntax
              4. Check for data-dependent changes

              Run locally:
              \`\`\`bash
              make migrate-validate
              make migrate-up
              \`\`\`

              See docs/MIGRATION_TO_GOOSE.md for more information.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: migration-logs
          retention-days: 7
          path: |
            migrations/
            *.log
