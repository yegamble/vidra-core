name: API Tests (Comprehensive Newman Suite)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'internal/httpapi/**'
      - 'internal/handlers/**'
      - 'internal/repository/**'
      - 'postman/**'
      - '.github/workflows/api-tests-comprehensive.yml'
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch:
    inputs:
      collection:
        description: 'Specific collection to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - auth
          - uploads
          - analytics
          - imports
          - registration-edge-cases
          - edge-cases-security

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: api-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"

jobs:
  setup-test-env:
    name: Setup Test Environment
    runs-on: ubuntu-latest
    outputs:
      collections: ${{ steps.matrix.outputs.collections }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine collections to test
        id: matrix
        run: |
          if [ -n "${{ inputs.collection }}" ]; then
            echo "collections=[\"${{ inputs.collection }}\"]" >> $GITHUB_OUTPUT
          else
            echo "collections=[\"auth\",\"uploads\",\"analytics\",\"imports\",\"registration-edge-cases\",\"edge-cases-security\"]" >> $GITHUB_OUTPUT
          fi

  api-tests:
    name: API Tests - ${{ matrix.collection }}
    runs-on: ubuntu-latest
    needs: setup-test-env
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        collection: ${{ fromJson(needs.setup-test-env.outputs.collections) }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: athena
          POSTGRES_PASSWORD: athena_pass
          POSTGRES_DB: athena_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://athena:athena_pass@localhost:5432/athena_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-key-for-api-tests-${{ matrix.collection }}
      PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run database migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          cd migrations
          goose postgres "$DATABASE_URL" up

      - name: Build and start API server
        run: |
          go build -o athena-server ./cmd/server
          ./athena-server &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PORT: ${{ env.PORT }}

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/health; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Verify API health
        run: |
          response=$(curl -s http://localhost:8080/health)
          echo "Health check response: $response"

      - name: Run Newman collection (with retry)
        id: newman
        run: |
          max_attempts=3
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "Newman attempt $attempt/$max_attempts..."

            if newman run postman/athena-${{ matrix.collection }}.postman_collection.json \
              --environment postman/test-local.postman_environment.json \
              --reporters cli,htmlextra,json \
              --reporter-htmlextra-export newman-${{ matrix.collection }}.html \
              --reporter-json-export newman-${{ matrix.collection }}.json \
              --color on \
              --delay-request 100 \
              --timeout-request 10000 \
              --verbose; then
              echo "Newman tests passed on attempt $attempt"
              exit 0
            else
              if [ $attempt -lt $max_attempts ]; then
                echo "Newman tests failed on attempt $attempt, retrying..."
                sleep 5
                attempt=$((attempt + 1))
              else
                echo "Newman tests failed after $max_attempts attempts"
                exit 1
              fi
            fi
          done

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-html-${{ matrix.collection }}
          path: newman-${{ matrix.collection }}.html
          retention-days: 30

      - name: Upload Newman JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-json-${{ matrix.collection }}
          path: newman-${{ matrix.collection }}.json
          retention-days: 30

      - name: Parse Newman results and check for critical failures
        if: always()
        id: parse-results
        run: |
          if [ -f newman-${{ matrix.collection }}.json ]; then
            TOTAL=$(jq '.run.stats.tests.total' newman-${{ matrix.collection }}.json)
            FAILED=$(jq '.run.stats.tests.failed' newman-${{ matrix.collection }}.json)
            PASSED=$(jq '.run.stats.tests.passed' newman-${{ matrix.collection }}.json)

            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT

            echo "### Newman Test Results - ${{ matrix.collection }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY

            # Check for critical security test failures
            if [[ "${{ matrix.collection }}" == *"security"* ]] || [[ "${{ matrix.collection }}" == *"edge-cases"* ]]; then
              CRITICAL_FAILURES=$(jq -r '.run.executions[] | select(.assertions[].error) | .item.name' newman-${{ matrix.collection }}.json | grep -iE "sql injection|xss|csrf|auth bypass" | wc -l || echo "0")

              if [ "$CRITICAL_FAILURES" -gt 0 ]; then
                echo "::error::CRITICAL SECURITY TESTS FAILED in ${{ matrix.collection }}"
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "⚠️ **CRITICAL SECURITY FAILURES DETECTED**" >> $GITHUB_STEP_SUMMARY
                exit 1
              fi
            fi

            if [ "$FAILED" -gt 0 ]; then
              echo "::error::$FAILED tests failed in ${{ matrix.collection }}"
              exit 1
            fi
          else
            echo "::error::Newman report not found"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi

  aggregate-results:
    name: Aggregate API Test Results
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all Newman reports
        uses: actions/download-artifact@v4
        with:
          pattern: newman-report-json-*
          path: newman-results/

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate comprehensive summary
        run: |
          echo "# 🧪 API Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_collections=0
          total_tests=0
          total_passed=0
          total_failed=0
          total_assertions=0
          failed_collections=()

          for json_file in newman-results/newman-report-json-*/newman-*.json; do
            if [ -f "$json_file" ]; then
              collection=$(basename "$json_file" .json | sed 's/newman-//')
              tests=$(jq '.run.stats.tests.total' "$json_file")
              passed=$(jq '.run.stats.tests.passed' "$json_file")
              failed=$(jq '.run.stats.tests.failed' "$json_file")
              assertions=$(jq '.run.stats.assertions.total' "$json_file")

              total_collections=$((total_collections + 1))
              total_tests=$((total_tests + tests))
              total_passed=$((total_passed + passed))
              total_failed=$((total_failed + failed))
              total_assertions=$((total_assertions + assertions))

              status="✅"
              if [ "$failed" -gt 0 ]; then
                status="❌"
                failed_collections+=("$collection")
              fi

              echo "- $status **$collection**: $passed/$tests tests passed ($assertions assertions)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Collections:** $total_collections" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** $total_passed/$total_tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Assertions:** $total_assertions total" >> $GITHUB_STEP_SUMMARY
          echo "- **Success Rate:** $(awk "BEGIN {printf \"%.1f\", ($total_passed/$total_tests)*100}")%" >> $GITHUB_STEP_SUMMARY

          if [ ${#failed_collections[@]} -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ Failed Collections" >> $GITHUB_STEP_SUMMARY
            for fc in "${failed_collections[@]}"; do
              echo "- $fc" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Comment on PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            let comment = '## 🧪 API Test Results\n\n';

            const resultsDir = 'newman-results';
            const jsonFiles = fs.readdirSync(resultsDir, { recursive: true })
              .filter(f => f.endsWith('.json'))
              .map(f => path.join(resultsDir, f));

            let totalTests = 0;
            let totalPassed = 0;
            let totalFailed = 0;
            const results = [];

            for (const file of jsonFiles) {
              try {
                const report = JSON.parse(fs.readFileSync(file, 'utf8'));
                const collection = path.basename(file).replace('newman-', '').replace('.json', '');
                const stats = report.run.stats;

                totalTests += stats.tests.total;
                totalPassed += stats.tests.passed;
                totalFailed += stats.tests.failed;

                const status = stats.tests.failed > 0 ? '❌' : '✅';
                results.push(`${status} **${collection}**: ${stats.tests.passed}/${stats.tests.total} passed`);
              } catch (e) {
                console.error(`Error parsing ${file}:`, e);
              }
            }

            comment += results.join('\n') + '\n\n';
            comment += '### Summary\n';
            comment += `- **Total Tests:** ${totalPassed}/${totalTests}\n`;
            comment += `- **Success Rate:** ${(totalPassed/totalTests*100).toFixed(1)}%\n\n`;

            if (totalFailed > 0) {
              comment += '⚠️ Some tests failed. Please review the [workflow run](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ') for details.';
            } else {
              comment += '🎉 All API tests passed!';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if any tests failed
        if: always()
        run: |
          failed_count=0
          for json_file in newman-results/newman-report-json-*/newman-*.json; do
            if [ -f "$json_file" ]; then
              failed=$(jq '.run.stats.tests.failed' "$json_file")
              failed_count=$((failed_count + failed))
            fi
          done

          if [ $failed_count -gt 0 ]; then
            echo "::error::$failed_count total API tests failed"
            exit 1
          fi

          echo "All API tests passed!"
