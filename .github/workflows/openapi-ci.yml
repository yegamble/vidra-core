name: OpenAPI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-test:
    name: Validate OpenAPI and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: athena_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Swagger CLI
        run: npm install -g @apidevtools/swagger-cli

      - name: Validate OpenAPI spec
        run: swagger-cli validate api/openapi.yaml

      - name: Initialize database
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U testuser -d athena_test -f init-test-db.sql

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://testuser:testpass@localhost:5432/athena_test?sslmode=disable
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/athena_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-key
          IPFS_API: http://localhost:5001
        run: |
          go test -v ./...

      - name: Build application
        run: go build -o bin/athena-server ./cmd/server

  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: validate-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Redoc CLI
        run: npm install -g @redocly/cli

      - name: Create docs directory
        run: mkdir -p docs

      - name: Generate HTML documentation
        run: redocly build-docs api/openapi.yaml -o docs/api-docs.html

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: docs/

      # Skipping GitHub Pages setup and deployment as requested.
