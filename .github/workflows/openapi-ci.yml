name: OpenAPI Validation

on:
  push:
    branches: [ main, develop ]  # Only run on push for deployed branches
    paths:
      - 'api/openapi.yaml'
      - 'api/*.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'api/openapi.yaml'
      - 'api/*.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate OpenAPI Spec
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js with Swagger CLI
        uses: ./.github/actions/setup-node-tools
        with:
          node-version: '20'
          packages: '@apidevtools/swagger-cli'
          cache-key-suffix: 'openapi'

      - name: Validate OpenAPI spec
        run: |
          echo "Validating OpenAPI specification..."
          make validate-openapi

      - name: Generate API Documentation Preview
        if: github.event_name == 'pull_request'
        run: |
          echo "OpenAPI validation complete"
          echo "Documentation can be generated from validated spec"

  generate-docs:
    name: Generate API Documentation
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: validate
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js with documentation tools
        uses: ./.github/actions/setup-node-tools
        with:
          node-version: '20'
          packages: '@redocly/cli @apidevtools/swagger-cli'
          cache-key-suffix: 'openapi-docs'

      - name: Generate documentation
        run: |
          echo "Generating API documentation from OpenAPI spec..."
          make generate-docs

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 30
