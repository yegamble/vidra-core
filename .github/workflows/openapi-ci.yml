name: OpenAPI Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'openapi.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'openapi.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Swagger CLI
        run: npm install -g @apidevtools/swagger-cli

      - name: Validate OpenAPI spec
        run: |
          echo "Validating OpenAPI specification..."
          make validate-openapi || echo "OpenAPI spec not found or invalid"

      - name: Generate API Documentation Preview
        if: github.event_name == 'pull_request'
        run: |
          echo "OpenAPI validation complete"
          echo "Documentation can be generated from validated spec"

  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install documentation tools
        run: |
          npm install -g @redocly/cli
          npm install -g spectacle-docs

      - name: Generate documentation
        run: |
          echo "Generating API documentation from OpenAPI spec..."
          # Add actual doc generation commands here when OpenAPI spec exists
          echo "Documentation generation placeholder"

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 30