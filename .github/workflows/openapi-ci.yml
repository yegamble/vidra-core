name: OpenAPI Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'api/openapi.yaml'
      - 'api/*.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'api/openapi.yaml'
      - 'api/*.yaml'
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Use Node 20 for consistency

      - name: Install Swagger CLI
        run: npm install -g @apidevtools/swagger-cli@latest

      - name: Validate OpenAPI spec
        run: |
          echo "Validating OpenAPI specification..."
          make validate-openapi || echo "OpenAPI spec not found or invalid"

      - name: Generate API Documentation Preview
        if: github.event_name == 'pull_request'
        run: |
          echo "OpenAPI validation complete"
          echo "Documentation can be generated from validated spec"

  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Use Node 20 for better compatibility

      - name: Install documentation tools
        run: |
          # Only install modern, maintained tools
          npm install -g @redocly/cli@latest
          npm install -g @apidevtools/swagger-cli@latest
          
      - name: Generate documentation
        run: |
          echo "Generating API documentation from OpenAPI spec..."
          # Check if OpenAPI spec exists
          if [ -f "openapi.yaml" ]; then
            echo "Found openapi.yaml, generating documentation..."
            # Use Redocly to build documentation
            npx @redocly/cli build-docs openapi.yaml -o docs/api/index.html || echo "Documentation generation failed"
          elif [ -f "openapi.json" ]; then
            echo "Found openapi.json, generating documentation..."
            npx @redocly/cli build-docs openapi.json -o docs/api/index.html || echo "Documentation generation failed"
          else
            echo "No OpenAPI specification found, skipping documentation generation"
            mkdir -p docs/api
            echo "<html><body><h1>API Documentation</h1><p>OpenAPI specification not found</p></body></html>" > docs/api/index.html
          fi

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v5
        with:
          name: api-docs
          path: docs/api/
          retention-days: 30
