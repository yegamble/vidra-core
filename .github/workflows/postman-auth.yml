name: Postman Auth E2E

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  newman-auth:
    name: Run Postman auth collection (Makefile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Postman E2E via Makefile
        env:
          DOCKER_COMPOSE: docker compose
        run: make postman-e2e

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: postman/newman-results.xml
