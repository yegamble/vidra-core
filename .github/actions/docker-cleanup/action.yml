name: 'Docker Cleanup'
description: 'Cleans up lingering containers and networks to avoid port conflicts without deleting reusable cache volumes'

runs:
  using: 'composite'
  steps:
    - name: Cleanup previous containers and networks
      shell: bash
      run: |
        echo "Cleaning up any lingering containers and networks..."
        docker ps -aq | xargs -r docker rm -f || true
        docker network prune -f || true
