services:
  postgres-test:
    image: postgres:15-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: athena_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d athena_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    tmpfs:
      - /data
    ports:
      - "6380:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  ipfs-test:
    image: ipfs/kubo:latest
    tmpfs:
      - /export
      - /data/ipfs
    environment:
      - IPFS_PROFILE=server
    ports:
      - "15001:5001" # API (avoid host 5001 conflicts)
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q -T 3 http://127.0.0.1:5001/api/v0/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - test-network

  clamav-test:
    image: clamav/clamav:latest
    container_name: athena_test_clamav
    ports:
      - "3310:3310"
    environment:
      - CLAMAV_NO_FRESHCLAM=false
      - CLAMD_STARTUP_TIMEOUT=300
    volumes:
      # Persist virus signatures to speed up subsequent runs
      - clamav-test-signatures:/var/lib/clamav
      # Mount test files (read-only)
      - ./testdata/virus_scanner:/testdata:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s  # ClamAV needs time to load signatures
    mem_limit: 2g
    networks:
      - test-network

  app-test:
    image: athena:latest
    build: .
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      ipfs-test:
        condition: service_started
      clamav-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://test_user:test_password@postgres-test:5432/athena_test?sslmode=disable
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: test-jwt-secret
      IPFS_API: http://ipfs-test:5001
      REQUIRE_IPFS: "false"
      PORT: 8080
      VALIDATION_TEST_MODE: "true"
      LOG_LEVEL: debug
      STORAGE_DIR: /tmp/storage
      # ClamAV configuration
      CLAMAV_ADDRESS: clamav-test:3310
      CLAMAV_TIMEOUT: "60"
      CLAMAV_FALLBACK_MODE: strict
      TEST_QUARANTINE_DIR: /tmp/quarantine
    tmpfs:
      - /tmp/storage:uid=1000,gid=1000
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    networks:
      - test-network

  newman:
    image: postman/newman:alpine
    depends_on:
      app-test:
        condition: service_healthy
    volumes:
      - ./postman:/etc/newman
    entrypoint: [
      "newman", "run", "/etc/newman/athena-auth.postman_collection.json",
      "-e", "/etc/newman/athena.local.postman_environment.json",
      "--env-var", "baseUrl=http://app-test:8080",
      "--reporters", "cli,junit",
      "--reporter-junit-export", "/etc/newman/newman-results.xml"
    ]
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  clamav-test-signatures:
    driver: local
