version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_DB: athena_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - ./init-shared-db.sql:/docker-entrypoint-initdb.d/init-shared-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d athena_test"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  redis-test:
    image: redis:7-alpine
    tmpfs:
      - /data
    ports:
      - "6380:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5